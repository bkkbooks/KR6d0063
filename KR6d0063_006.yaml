body:
  text: 妙經文句文句記永嘉沙門釋從義撰記云大種所起新譯諸論皆云大種即四大種也今之音聲即色大種是故云也亦如小乘發智論說如來咽喉微妙大種從此能生妙語音聲婆沙問曰何名大種答大而是種故名大種如言大地及大王等能減能增能損能益是為種義體相形量遍諸方域能成大事是為大義金光明亦云水火風種散滅壞時難陀持戒如止觀第四記前已指引今更不云經云盡諸苦際婆沙問云苦際為在苦中為在苦外若在苦中不應言苦際若在苦外世間現喻云何通耶猶如金籌初中後等皆悉是金苦亦如是初中後等皆悉是苦何名苦際耶答曰或有說者阿羅漢最後陰是苦際或云滅盡涅槃是苦際最後陰是苦際者更不生苦故不與苦相續故不造苦因故滅盡涅槃與現喻相違者此不須通以三藏中不云此故記云若例聲聞須明行相逆順推見愛十二因緣具如四念處中以小乘中無十方佛若準大論引阿含云東方世界有無量等是故小乘亦不言有亦不言無若言有者衆生懈怠不求度故大論又說聲聞但於一佛身心見十方佛菩薩乃於無量佛土中念十方佛若薩婆多云無十方佛若僧祇中說有十方佛若成實論云一世界無多世界有當知此皆所計不同耳今以大小對辨小乘中則無大乘中則有又見佛子故云見準經合云於此悉見又覩諸佛故云見矣殑伽河殑其升切經云恆沙或云恆迦河又云強伽河此云天堂來以西竺外書云本入摩醯首羅天頂從耳中流出地上以此天化身在雪山頂故作此云以見從高處來乃云天堂來也今且順彼之說是故云也信度河亦言辛頭河此云驗河也縛芻河亦言博叉河此云生丹河也徙多河亦言私多又言悉陀或言私陀此云冷河也經云金銀珊瑚大論云金出山沙石赤銅中銀出燒石中珊瑚珠名也說文云生海中其色赤真珠摩尼大論云真珠出魚腹中竹中蛇腦中摩尼亦云末尼此翻離垢硨磲碼瑙硨磲色青白碼瑙色或白或青如馬之腦故以為名後人或加石或加玉而作耳金剛諸珍天竺國金生剛中百鍊不銷可以切玉也車乘乘字去聲此方乃夏后氏奚仲所作即輿輪之都名也車齒邪切舍也行者所處舍也又居音言以居人也乘駕也載也輦輿輦說文云挽車也人在前引之也古者卿大夫所乘自漢已來天子乘之天子皇后所乘車曰輦也輿與庶與諸二切說文云車輿也有輪曰車無輪曰輿今車輿形別制於古也或謂玉篇云衆也載也舉也多也欄楯攔釣攔也遮也楯攔檻也縱曰攔橫曰楯華蓋華胡瓜切黃帝與尤戰于涿鹿之野有五色雲氣金枝玉葉止於帝上有華葩之象因而作於華蓋焉華亦呼瓜切西竺暑熱人多持蓋皆以華而飾之諸經或云幢幡華蓋斯之謂也軒飾安車也以皮物而莊飾之即軒車也記云具出其相如止觀第二記諸大乘經及首楞嚴大品大論皆明六度如大品相攝品云樓那白佛我今欲說菩薩之行佛言隨汝意說樓那於是廣明六度更互相攝六六三十六度等故云或以施為名說諸波羅蜜乃至或以般若為名說諸波羅蜜又攝大乘論互顯章大瓔珞無斷品並與首楞嚴意同經云而被法服被平義切服也覆也記云龍得一縷牛角一觸海龍王經龍王白佛如此海中無數種龍有四金翅常來食之願佛擁護令得安隱於是世尊脫身皂衣告龍王云汝取是衣分與諸龍皆令周遍於中有值一縷之者金翅鳥王不能觸犯持禁戒者所願必得法苑中引悲華經文釋迦如來昔於寶藏佛所願云成佛之時袈裟所感五種功德如今記中引者略同文句云初禪一品乃至九品禪波羅蜜云修諸禪時有下中上三品離三為九品淺深若細論者有無量品禪禪皆然修羅琴大論云法身菩薩化無量身度生說法而菩薩心無所分別如修羅琴常自出聲隨意而作無能彈者又緊那羅所彈之琴閻浮檀金華葉莊嚴善淨業報之所造作彈時聲遍三千世界宣說無生寂滅之法記云四降魔相及八魔十魔等如止觀第八記三藏初伏四魔坐道場破煩惱魔又得法性身破陰魔此兩共破死魔樹下得不動三昧破天子魔通教初得無生忍至六地得菩提道如前八地道觀雙流是不動三昧破天子魔兩處聲聞只破三魔別教十住已破界內四魔初地分得菩提破煩惱魔分得法身破陰魔分得赤色三昧破天子魔圓教初住俱破八魔得菩提道破煩惱魔乃至妙覺永盡言四魔者煩惱魔陰魔死魔天子魔此約界內而說若約界外者分段諸魔悉過唯有無常等四倒此是界外煩惱魔煩惱魔故即有無等等色即是界外陰魔陰魔故即有死魔三賢十聖住果報而無第六天子魔但以赤色三昧未究竟名天子魔耳凡界內名至界外者並是義立故赤色三昧觀於他化自在天有破彼天有三惑未盡故通為天子魔此謂八魔也十魔者華嚴云一陰魔生諸取故二煩惱魔生雜染故三業魔能障礙故四心魔起高慢故五死魔捨生處故六天魔自憍縱故七善根魔恆執取故八三昧魔久耽味故九善知識魔起著心故十菩提法智魔常不捨故經云處林放光處字上聲前獨處間靜常處空間皆上聲以至下文準義思之記云華嚴如止觀第七記引舊譯華嚴經云又放光明名無慳彼光覺悟除貪惜又放光明名清涼彼光覺悟毀禁者又放光名忍莊嚴彼光覺悟嗔恚者又放光明名轉勝彼光覺悟懈怠者又放光明名寂靜彼光覺悟亂意者又放光名慧莊嚴彼光覺悟愚癡者然止觀第七記但引思益蒙光得益之相耳未見引華嚴此文後人請尋輔行又云地持六度各九者六度皆云一自性二一切三難四一切門五善人六一切行七除惱八此世他世九清淨九名雖同但以施等簡之則成六度各九却不見說蒙光得益更請尋之未嘗睡眠如止觀第四記經中既云未嘗睡眠此必須指棄五蓋中棄睡眠文也心神昏昏為睡六識暗塞四支倚放為眠大論云眠為大暗無所見日日欺誑奪人明亦如臨陳白刃間如共毒蛇同室睡故知不指調五事中調眠之事也次文云那律等如第四記者前通序中已具引彼注之經云惡罵捶打捶之藥切打音頂以杖而擊之謂也記云五蓋如止觀第四卷一貪欲二嗔恚三睡眠四掉悔五疑通稱蓋者覆也蓋覆纏綿心神昏暗使定慧不明者也大乘頓制何論楞伽前後制耶大乘頓制即梵網云夫食肉者斷大慈悲性種子若食肉者得無量罪楞伽前制即鹿苑施小但開三種淨肉耳餘不得食也楞伽後制即涅槃所禁也釋籤第十引楞伽中大慧問佛外道尚遮不許食肉何況如來大悲含育而許自他令食肉耶若大乘中梵網已制猶作此說當知楞伽四含之後為漸制之始下佛答中乃云菩薩不應食肉故知仍存小教中開今謂釋籤其文恐誤何者楞伽經中佛答大慧經文具云一切諸肉有無量緣菩薩於中當生悲愍不應食之所謂衆生從無始來生死輪回曾作父母兄弟眷屬云何於中而取食之乃至云我若聽許聲聞食肉我則非是住慈心者大慧我於諸處說遮千種許三種者是漸禁斷令其修學今此經中自死他殺凡是肉者一切悉斷大慧我不曾許弟子食肉亦不現許亦不當許大慧凡是肉者於出家人悉是不淨若有癡人謗言如來聽許食肉亦自食者當知是人惡業所纏必當永墮不饒益處大慧二乘菩薩尚唯法食豈況如來乃至偈中云食肉無慚愧生生常顛狂諸佛及菩薩二乘所嫌惡象腋與大雲涅槃勝鬘等及此楞伽經我皆制斷肉先說見聞疑已斷一切肉十卷楞伽四卷楞伽與此大同但是其文有廣略耳故知釋籤判於楞伽但制菩薩仍存小教中開者誤矣大經第四四相品云從今日始不聽聲聞弟子食肉若受檀越信施之時應觀是肉如子肉想迦葉問云如來何故先聽比丘食三淨肉佛言是三淨肉隨事漸制迦葉又問若不食肉者五種牛味乳酪等亦不應受佛言佛所制戒各有異意異意故聽食三種淨肉異想故一切悉斷及自死者是故我從今日制諸弟子不得復食一切肉也若乞食時得雜肉食當以水洗令與肉別但使無味然後可食由是而知但是大乘咸制三乘不應食肉非謂楞伽但制藏通菩薩而許二乘之開也然楞伽是方等所收而文指於涅槃經者此是後分之意耳又大經云佛先聽食五種牛味及以油蜜又云我唯聽食五種味等聽著革屣憍奢耶衣我說四大無有壽命若有經律作此說者是名佛說若不爾者則是魔說又楞嚴中斷五牛味故云若諸比丘不服東方絲綿絹帛靴履裘毳乳酪醍醐如是比丘於世真脫不游三界何以故服其身分皆為彼緣又大經云我滅度後聲聞弟子愚癡破戒乃云如是大涅槃經非佛所說是六師說所以者何一切諸佛悉說無常無我等法若言諸法常樂我淨云何當是佛之所說諸佛菩薩不制弟子斷五牛味及以食肉六師不聽食五牛味及以脂血若斷是者云何當是佛之正典由是而知涅槃楞嚴諸大乘經並皆不許食五牛味然楞嚴經亦是方等之後分耳如下具辨此方南嶽思大禪師南山律師並皆不服絲綿絹帛南山歎云唯有南嶽慈行可歸言三種淨肉者小乘毗尼並云不見為我殺不聞為我殺不疑為我殺皆得食也若楞嚴云五種淨肉者於前三上更加自死及以鳥殘是為五也若涅槃云九種淨肉者於前三中各有根本前後方便而為九也況復經云悉我神力之所化成斯乃鹿苑諸比丘得三五淨肉悉是如來神力化作非的食于衆生身分矣良以小根未任頓制故以方便而接引耳迦葉袈裟直十萬兩金阿含經云摩訶迦葉欲出家時選擇家中最下衣裳得一斃衣其價猶直十萬兩金即便取之作僧伽梨時彼王舍大地中間有羅羅揵陀羅羅揵陀中間有多子塔迦葉於此值佛世尊乃求出家即以此衣而為其座持以奉佛佛即授其𧶜那納衣大論亦云迦葉袈裟直十萬兩金袈裟兩字既皆梵音只應作加沙而並加衣者人而不思也袈裟此云染從色立名耳復次應知跋難陀死衣物直四十萬兩金國王大臣及諸親里各欲收取佛言王賜諸臣比丘不得又如陳如於空林中入般涅槃時放牧人送衣上王王乃評之只直五錢更有天須菩提面王比丘等因便須知止觀補注具引天須菩提面王比丘也經云種種教詔教詔兩字並去聲呼訓也誨也告也示也云記離合不同如止觀第七記如禪有願智力開出泥滓波羅蜜有神通力開出婆羅波羅蜜如般若有道種智開出漚和俱舍羅波羅蜜有一切種智開出闍那波羅蜜是故離則有十合但六也雖復雙泯而說而照故云說不可說等此與文句少異學者宜細詳之以佛舍利此順長行是故云耳俱尸此云角城城有三角故也經云縱廣正等縱即容切長也廣去聲橫也南北曰縱東西名廣珠交露幔珠交以珠而交之也露不覆也幔莫半切幕也在傍曰帷在上曰幕幕覆也交結珠珍覆露其上也諸經亦云珠交露蓋珠交露車同其事也寶鈴和鳴音樂調和也蓋以寶為鈴音聲和調而鳴者也詩云和鈴央央是也春秋桓公二年左傳云錫鸞和鈴昭其聲也注云和在衡鈴在旗動皆有聲焉錫音羊記云具如釋籤引大經文波利質多羅此云圓生其根入地深五由旬高百由旬枝葉四布五十由旬香氣周遍五十由旬光明遠照八十由旬三十三天夏三月時在下受樂文句云倉卒倉茫也大遠不明之貌也卒暴也李陵與蘇子卿書云前書倉卒未盡所懷論語云造次必於是注云造次謂急遽也正義云造次猶草木次鄭玄云倉卒也皆急速迫促之義耳踟蹰行不進之貌也若言躊躇者即猶豫之貌也猶豫之心顏氏家訓云禮記曰定猶豫決嫌疑離騷曰心猶豫而狐疑先儒未有釋者案尸子曰五尺犬為猶說文云隴西謂犬子為猶吾以為人將行犬好豫在人前待人不得又來迎候如此往還至于終日斯乃豫之所以為未定也或以爾雅中猶如麂善登木猶獸名也既聞人聲乃豫登木如此上下故云猶豫或以為獸又多猜疑故聽河水無流水聲然後乃渡今俗中云狐疑虎卜則其義矣猶平聲亦去聲亦作猷字亦作冘冘豫不定耳言謙光者易謙卦云天道下濟而光明地道卑而上行乃至云謙尊而光卑而不可踰君子之終也釗師梁南冥寺慧釗法師也姓徐氏次師光宅如玄籤補注中委辨記云支遁字道林也標幟幟人志切標頭上幟也通俗文徽號曰標私記曰幟謂以絳帛等書著背上曰徽廣雅云幡也墨子云長丈五廣半幅標正作幖或云標識識音志五不男生劇妬變半解釋如下文才堪為受聲聞無作一緣等將為殺小乘戒先問十三難此五不男即其一矣十三難者一邊罪二犯比丘尼三賊心四破內外道五非黃門即五不男是六殺父七殺母八殺羅漢九破僧十出佛血十一非人十二畜生十三二形有十三難不得受小乘戒若大乘戒淫男淫女黃門皆得受也若有七遮逆罪亦不得受大乘戒七逆即殺父殺母殺聖人殺阿闍梨出佛血殺和尚破羯磨轉法輪僧經云無量無邊偈中又云無量無數劫般若經中須菩提白佛無量無數無邊有何等異佛言無數者名不墮數中若有為性中若無為性中無量者量不可得若過去若未來若現在無邊者諸法邊不可得故新譯四十卷華嚴第十卷中具說無量等數須者應尋經文如來應供至世尊應字去聲舊作平呼然此十號下第二經文句自釋光明文句引釋論云佛是第九號輔行云大經解釋為十一句大論合無上士與調御丈夫以為一句乃至世尊為第十句涅槃疏云成論阿含以無上士與調御丈夫合為一號至世尊句十號方足涅槃釋論以無上士與調御丈夫開為二號至佛字則十號足耳總結上十號足故為世所尊故云世尊此與光明文句及輔行不同恐章安誤耳記云然釋法號須從法立如止觀第二記乘無二智來契正境故曰如來以無二理遍入諸法名為應供了不二智智體無偏名正遍知知無二法互通法界雖無來往遍入三世名明行足無二之法性冥三德名為善逝理遍一切具三世間解此理故名世間解能解此理無復過上名無上士解此理故能調難調調十法界名為調御了法界法名為丈夫契此理故一切宗仰過於三教人天之上名天人師覺此理故名之為佛達此理故而為三世之所宗敬名為世尊智契法身具法界號故能垂示應身十號法應十號一體無二又引淨名云若我分別此三句義窮劫不盡證十號中初三號者此恐訛略以彼初號名三藐三佛陀即第三號也次號名多陀阿伽度第一號也次號名佛陀即第九號也彼經但云佛告阿難若我廣說此三句義汝以劫壽不能盡受十號功德如育王經香口比丘育王請僧入宮供養有一比丘名優鉢羅年在盛壯端正殊特口中乃作優鉢羅華之香育王自行水次聞此比丘口香如是乃作念言而此比丘端正年少口中含香將無不欲動我宮人之心乎王即語云以水洗口洗已倍香王乃問之久近含此香耶答云過去有佛號曰迦葉人壽二萬我於爾時為高座法師讚歎佛法故四十九億歲生於天人不墮八難口中恆作如此之香育王聞已益加恭敬涉法師云日能破暗等慈恩亦云日有二能一導明二成熟月有二能一除熱二清涼燈有二能一破暗二傳照此顯佛能導迷至覺成器根除煩惱熱得涅槃涼永破愚癡化生傳法當知此說稍同涉師有人云初句總六句別離七為十慈恩云初中後為三瑜伽論云四文巧此云其語巧妙五義妙此云其義深遠六純一此云純一無雜七圓滿此云具足八清淨九鮮白十梵行又文句中引金光明前心如來不思議等文出真諦翻金光明學者尋之經云說應四諦法應字平聲當也稱也法與機相當相稱義也次文準此記中問云問前問中以菩薩為三藏大乘三藏之後方云種種即指二酥今何以將菩薩六度答種種耶答凡諸問答乃至三意又下文中文句謂之後引一佛但舉開漸同記中乃云以中後指前初一佛等請後學者子細將文句及記對詳經文自見其訛略也即文句及記有訛略耳記中又引真諦翻頗羅墮乃婆羅門之一姓者若最後佛未出家有八王子豈非乃是剎利姓耶更請思之文句云從今得三菩提去今字誤也應云令得記云此八子名作四對釋但得觀心餘三全無慈恩云一大智大悲雙二了有了空雙三進善破惡雙四達僞知真雙如其次第而配對之故此四雙只是四對耳以今家意觀此四對義同觀心若乃因緣約教本迹三科則闕故云全無記中又引有云金輪必不值佛等者若俱舍中乃云人壽八萬時輪王出世已後則無者由身壽減衆惡增故華嚴十種不出四弘如止觀第一卷止觀云或推理發心或覩佛相發心或覩神通發心或聞法發心或遊土發心或覩衆發心或見修行發心或見法滅發心或見種種過發心或見他受苦發心故此十種與彼華嚴其相略同華嚴云或見佛相好或覩神變或聞佛說法或聽佛教誡等云云文句云從六十小下越州新板從字誤為後字也經云多陀阿伽度等多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知然今經云燈明如來授德藏菩薩記次當作佛與下文云彌勒菩薩釋迦牟尼佛之所授記次後作佛不亦同乎況前明時節同亦將下文五十小劫謂如半日例同六十小劫謂如食頃又舍利弗成佛號華光如來授堅滿菩薩記次當作佛號華足安行多陀阿伽度阿羅訶三藐三佛陀故知燈明如來授德藏菩薩記次當作佛即是補處成道耳今文句云昔事已成故言授菩薩記等者此由前文對告妙光乃是菩薩一往相帶來此中耳況龍樹釋經每於一文存於衆解敬請詳之記云後分雖有授記事乖舊譯華嚴第三十八入法界品列衆云五百聲聞故曰後分雖有也不曾與記故曰事乖焉清涼觀師謂華嚴經亦記二乘及明如來久成正覺謂與法華本迹兩門其意無別破此具如玄籤補注楞伽乃密對菩薩楞伽經第六變化品云大慧菩薩白佛言世尊如來何故授阿羅漢三菩提記何故復說無般涅槃法衆生得成佛道佛告大慧我為無餘涅槃界故密勸令彼修菩薩行此界他土有諸菩薩心樂求於聲聞涅槃令捨是心進修大行又變化佛與化聲聞而授記莂非法性佛大慧當知授聲聞記是祕密記輔行判云此有三意一為入無餘界者密勸令修菩薩行故二為此界他土菩薩樂求聲聞涅槃之者勸捨此心修大行故三變化佛授聲聞記非法性佛初意自為已入滅者次意乃是斥鈍菩薩對彼說記非關二乘第三判非法性佛者此是以實而隔於權況法性之佛尚不記菩薩何獨聲聞以此觀之今文中云密對菩薩正屬第二若據密字亦兼第一故楞伽三意並異法華顯露彰灼授聲聞記方等為斥奪聲聞方等陀羅尼經授記品云佛告五百大弟子汝等各各作佛俱同一號號寶月王如來文殊白佛言昔於王舍大城授聲聞記今復於舍衛國授聲聞記昔於波羅奈授大弟子記我今少疑欲有所問唯佛聽許時舍利弗問文殊言世尊授我等記不久得三菩提各於世界如今世尊攝諸衆生世尊不虗所言至誠故能第二第三授我等記文殊師利於汝意云何文殊語舍利弗言於汝意云何猶如枯樹更生枝不猶如山水還本處不折石還合不焦種生芽不舍利弗言不也文殊語言若不可得云何問我得菩提記生歡喜心是授記法無形無相無我無有言語如水聚沫無有實處如是觀者乃名得記此之經文乃是文殊破舍利弗得記之相亦同彈訶是故今云方等乃斥奪聲聞也然金光明文句及以妙玄判是方等後分如彼具示此一段記文學者雖多誦得而解義頗疏故今注之請加詳悉經云名曰然燈大論云然燈佛生時一切身邊如燈故曰然燈太子作佛亦名然燈也舊云定光者定應作錠錠都定切豆有足曰錠無足曰鐙燈正作鐙錠若作徒徑切錫屬耳非也然燈即定光是八百弟子以父兄之禮而事於師故曰弟子又生在師後名之曰弟解從師生名之曰子記云宿智頗忘頗字恐誤應作叵字不可也請詳之十住斷結經云慈氏菩薩積行恆沙數劫先以誓願成就正覺吾方習行而在其後佛告彌勒現佛光相翼從多少爾時彌勒隱菩薩身還現佛形剎土國界弟子菩薩不可思議衆會皆見歎未曾有菩薩處胎經云文殊自言本為能仁師今乃為弟子佛道極廣大清淨無增減我欲現佛身二尊不並立本迹難思議其若如是也經云琉璃頗梨色具云吠琉璃此翻不遠山寶以去波羅奈國不遠有山出此寶故也頗梨此云水玉其色多紅也記云尚滅至一生等滅字恐誤應云減至須約別圓故注云云準此應於現形字下而注云云文句無者或恐脫落或恐指於前文之中注云云耳波羅提木叉四分律鈔云此翻處處解脫也波羅奢華章安云此是樹名其葉青色華有三色日未出時照則黑色日正照時其華赤色日沒照時其華黃色今取赤色如血義耳經音中云赤華樹者失於黑黃之色也若我又住又應作久釋迦牟尼種種訶責等文出彌勒成佛經也經云多遊族姓家尚書云方命圮族族類也周禮四閭為族鄭玄云百家也族亦聚也記云故知上之五句合云六句宜細詳之文句云聯翩上連音下篇音文選陸仕衡文賦云浮藻聯翩若翰鳥纓繳而墜曾雲之峻注云藻文也聯翩鳥飛貌也謂文思將來聯翩然若翰鳥纓繳而墜自高雲之峻言速也纓纏也繳射也曾高也今亦例然數百年三百年也論語云子曰加我數年學易可以無大過矣正義云孔子年四十七時讀易數年即至五十者也記云當知法護西晉時月支國沙門曇摩羅剎此云法護本姓支解三十六國語次居燉煌乃稱竺氏後居長安青門之外立寺行道精勤異常南山經序云燉煌菩薩者蓋美其人云耳僧祐録及出藏記謂支菩薩及竺法護是二人者斯乃迷其姓氏先後故也長安城東出南頭名霸城門俗以其色青故謂之青門也有阿黨耶論語云子曰君子周而不比小人比而不周注云忠信為周阿黨為比比毗至切正義云君子行其忠信而不私相阿黨也生公天真獨秀竺道生法師與僧睿慧嚴慧觀同學齊名時人為之語曰生睿發天真嚴觀窪流得慧義彭亨進寇淵于默塞生睿二公獨標天真獨秀之目者良以悟自天真秀出群士故也此用攝論理量破之理即如理智量即如量智故攝論云順理清淨名如理智十八空論云如理智即無分別智如量智即無分別後智又如理智是一切種智如量智是一切智唯是一智通真通俗通真即空義而名如理智通俗即有義而名如量智佛性論云又此二智有二種相一者無著二者無礙言無著者見衆生界自性清淨是如理智相也言無礙者能通達觀無量無邊諸世界故是如量智相也又如理智為因如量智為果言為因者能作生死及涅槃因言為果者由此理故知於如來真俗等法文句云乃至半滿四宗古立五時今已敘畢更有四時三時之說不能委引略云乃至菩提流支立半滿從鹿苑明半從般若去明滿光統律師立四宗一因緣宗指毗曇二假名宗指成論三誑相宗指大品四常宗指涅槃更有人立五宗於前四加華嚴法界宗復有人立六宗四如前更加法華萬善同歸名為真宗大集染淨俱融法界圓普名為圓宗言三時者華嚴化菩薩為頓三藏化小乘等為漸勝鬘金光明為偏方不定或於漸自為三十二年前為有十二年後為空最後涅槃為常住言四時者三時同前更於無相之後常住之前指法華為萬善同歸記云亦如三種法輪殊乖承稟嘉祥吉藏法師依法華經第五立三種法輪教一始見我身聞我所說即皆信入如來之慧為根本法輪教即華嚴經也二除先修習學小乘者為枝末法輪教即三乘等於所說也三我今亦令得聞是經入如來慧為攝末歸本法輪教即法華經四十年後回三入一也嘉祥舊立此三法輪後師天台須改先說若不改者甚乖稟承清涼觀師華嚴鈔中亦許三種法輪之義故清涼云於一佛乘分別說三言一佛乘者即華嚴也會三歸一即攝末歸本也始見我身聞我所說即皆信受入如來慧即指華嚴為根本也除先修習學小乘者我今亦令得聞是經入於佛慧即攝末歸本也是經即法華也法華攝於餘經歸華嚴也故天台指為乳教乳是酪等諸味之本故也若依難信解義設將已說該於華嚴若比法華亦為易信始成正覺便說一極上根所受不對昔權故比法華成易信耳已上並是清涼之說若欲破之請將記中斥嘉祥之文例破清涼則可知矣今問清涼法華若攝餘經歸華嚴者何不攝餘經歸法華而卻歸華嚴耶況法華部內實無會入華嚴之文何得謬立耶天台但判頓部在初喻之乳味何曾指初為根本邪是經之言既云法華何得謂之歸華嚴邪言自矛盾所立如何耶若云華嚴便說一極者圓教可爾兼別如何況復法華對於昔權既兼華嚴如何卻云法華攝於餘經歸華嚴耶是則最後醍醐上味還歸最初華嚴之乳一何可笑也況將易信立為根本殊乖經旨何者以法華云難信難解最為第一故也何故不將法華第一立為根本卻以易信而非第一是根本耶嗚呼清涼謬之甚矣伏膺之說靡施頂戴之言奚寄嘉祥上智者書云常願伏膺甘露頂戴法橋自顧傭訥不堪指授但佛日將沉群生眼滅若非大師弘紉何以克興伏願廣布慈雲啓發蒙滯吉藏謹當竭愚奉稟誨誘窮此形命遠至來劫所以荊溪引之而詰也又復嘉祥親自疏請智者大師講法華經其疏辭曰吳州會稽縣嘉祥寺吉藏稽首和南伏聞山號㠑嵬道安登而說法峯名𭅕岫慧遠栖以安禪未若茲嶺宏麗接漢連霞濬壑飛流衝天灌日赤城丹水仙宅隩區佛隴香爐聖果福地復經擅美孫賦稱奇智者栖憑二十餘載禪慧門徒化流遐邇昔童壽英彥才解通經法淨後神正傳禪業若非道參窮學德侔補處豈能經論洞明定慧兼照至如周且沒後孔丘命世馬鳴化終龍樹繼後如內外不墜信在人弘光顯大乘開發祕教千年之興五百實復在於今日南嶽睿聖天台明哲昔三業住持今二尊紹係豈止灑甘露於震旦亦當法鼓於天竺生知妙悟魏晉以來典籍風謠實無連類釋迦教主童英發疑盧舍法王善財訪道敢緣前迹諦想崇誠謹共禪衆一百餘僧奉請智者大師演暢法華一部此典衆聖之喉襟諸經之關鍵伏願開佛知見耀此重昏示真實道朗茲玄夜庶以三千國土來稟未聞百劫後生奉遵大義築場戒節㭊木將臨搖落山莊玄黃均野挂巖玉蘂菊岸華榮彌切聲聞之心頗傷緣覺之抱吉藏仰謝前達俯愧詢求兢懼唯深但增戰悚謹請大乘方便經十種方便未檢尋之未見樔應作此巢不同世人以教為因佛智為果亦不同他三四等如慈恩云能詮智慧教門為因所說諸佛智慧為果方便有三或四一進趣方便謂見道前七方便二施為方便謂方便善巧三集成方便謂諸法同體巧相集成四權巧方便謂實無此事應物而說又上文云三說所無其言何在者止觀中以三周為三說也所無者即三周說中皆云無有餘乘及無二亦無三等也又云令釋本地者釋字誤也當為識字初往成就論云一者往成就謂從兜率沒乃至入涅槃往字論文不同或作住字請詳其義焉文句云體同權實同字誤也應云體用記云今云悉檀文恐誤也文句之中應存舊本今之文句已依記文改定而說則令記文於今無用此是挍勘者擅改也上下諸文準斯可識三結成四句三應作二乃至多少廣狹準知玄義中問迹本相望千界塵則少增道數則多本迹法身淺深異耶答法身先滿無增無減約化緣廣狹耳問若爾初住二住化緣多少法身亦應淺深答菩薩位未窮約實證判淺深佛位已滿但約權化有四句廣狹釋籤云三千世界地踊菩薩是本眷屬若望今時迹中眷屬如分別功德品增道損生初六百八十萬億那由他恆河沙衆生得無生法忍復千倍得聞持乃至一四天下及八界塵等比於踊出踊出甚少又本感廣迹感狹迹感廣本感狹俱廣俱狹應亦如是被多世界為廣少世界為狹最初垂應及中間等亦有廣狹今亦不從廣狹以判但以久成為妙中間今日為粗故知但以久近而判本迹終不以法身深淺化緣廣狹等判也有人問云今方便品以何為體他答有人云以後得智為體引唯識說後五波羅蜜皆後得智我今以根本智為體此是慈恩法華玄贊作是說也故彼疏云方便以智慧為性無分別智內冥真境後得智中利他說法能起方便之妙用故以後得智為性唯識等說後五波羅蜜皆後得智性故也唯識論云十波羅蜜一布施二持戒三忍辱四精進五靜慮六般若七方便八願九力十智此十若論性者施以無貪及彼所起三業為性戒以受學菩薩戒時三業為性忍以無嗔精進審慧及彼所起三業為性靜慮但以等持為性彼五皆以擇法為性說是根本後得故此實有十而說六者應知後四第六所攝開為十者第六唯攝無分別智後四皆是後得智攝緣世俗故應知根本後得二智亦是如理如量二智亦同今家所立自他權實情智二諦學者應須辨其粗妙等相又下文云準南嶽意者誤也應云準南方也廢會開覆等玄文甚廣今略引之破三顯一約破情顯智說廢三顯一約教說之開三顯一約理而說住一顯一約佛意說住三顯一約權智說住非三非一顯一此約理性又約人天乘等說覆三顯一約逗後緣說住三用一約弟子本是法身現為聲聞示住於三而常顯一說住一用三此約本願施三乘說本中十義準可思之但以文多卒非可具又云發三菩提心彼婆沙云聲聞辟支佛佛名為三菩提也文句云加趺趺足上也字書云大坐也當知此方未曉加趺但云大坐今佛法坐其相如結二趺相加故云加趺也新婆沙云以兩足趺加致兩䯗如龍蟠結又重疊兩足左右交蟠是故名為結加趺坐又記中云現量色者作釋立量出慈恩宗瑜伽論云現量比量現量有三一者非不現見二者非已思應思三者非錯亂境界如於陽焰而起水想名為錯亂比量有五一相比量二體比量三業比量四法比量五因果比量如見幢故比知有車是相比量言作釋者即六釋也一依主二持業三有財四相違五帶數六鄰近言依主者謂所依為主如說眼識識依眼起即眼之識故名眼識舉眼之主以表於識亦名依士釋云云記云真如究漏漏字誤也應云究滿區區屈曲貌區豈俱切禮云草木茂區萌達注云屈生曰區也若圓四門具如止觀第五圓教觀門及教智行理經論所說諸門不同或文字為門如大品四十二字是也或觀行為門如釋論明菩薩修三三昧緣諸法實相是也或智慧為門如法華云其智慧門是也或理為門如大品明無生法忍無來無去是也依乎教門通于觀門依乎觀門通于智門依乎智門通于理門理門復何所通雖無所通而能遍通是妙門也餘門且置今論教門何者止觀是行無生門是教故也令二乘人不得記等耶此斥北地所計定性二乘不成佛也令佛壽短促等耶自古諸師謂今壽量品久成正覺是神通延壽故今斥之云爾故四意趣中平等意趣只云諸佛咸然不可以他佛替此亦不可以別時意趣釋記聲聞意樂意趣釋迹本長遠等此辨慈恩疏鈔及以古師釋義之失也彼疏文云莊嚴論攝論對法論等皆說四意趣一平等意趣二別時意趣三別義意趣四補特伽羅意樂意趣補特伽羅此翻數取趣以數取諸趣故即是衆生之異號耳詮明法師鈔解此云思量名意理趣為趣思量理趣故云意趣一平等意趣者楞伽經云一字平等過去及我同名佛故二語平等謂三世佛皆有六十四種美妙音聲而說法故三身平等我及諸佛法身相好等無有異四法平等我及諸佛皆得三十七種菩提分法十力四無所畏故故依四種爾乃唱云我是拘留孫佛等然勝觀釋迦本非一體經云彼佛即是我身道理有乖故知祕密談佛意趣據平等理言彼是我以會通其相違故也二別時意趣者言雖說此意在他時言說與意時分有異故曰別時故無性云謂觀懈怠不能於法精勤學者故說是言若稱多寶如來名便得涅槃若唯發願生西方等此意乃是長養先時善根故也三別義意趣者雖談於此意在別義以由言說與義不同故名別義攝論云若以逢事爾所殑伽沙佛於大乘法方能解義無性釋云謂證相大乘法義與教相大乘法義皆有差別意云解義有二不同一證理之時方名解義即證相大乘在初地已去菩薩二聞思時亦名解義即教相大乘在十信前凡夫所聞聖凡階位而不同也四補特伽羅意樂意趣者雖於一法讚毀不同為對所化意樂故爾無性釋云先為慳貪讚歎布施後已樂施毀訾檀那為欲具修勝品善故故於一施讚而復毀自語相違有似乖張觀根授法理合如斯故名意樂意趣者矣所以他宗以四意趣釋法華者亦如下文敘舊以西方無量壽佛以合長者等是以他佛替此而談平等意趣也今家破之謂其閇眼穿鑿也又謂然雖授記聲聞意在別時今家之意既得開權云何却在別時者哉又復若謂發願一念作別時者此定不可故云若將臨終無間十念猛利善行是別時者幾許誤哉又謂迹本長遠是意樂意趣所以或長及短促等於今家意未之然也下去記中有二三處云四意趣故於此中委而引之至下臨文勿迷此說余患學者臨文多迷所以博引諸文示之惑者未知乃生譏誚誠可悲矣是故一家三大部文不易弘傳安以淺識廢多學哉廣如止觀四門料簡各立事譬破法遍中其文甚廣舉其大略三藏乃以龜毛兔角為譬通教乃以如幻等譬別教乃以幣帛裹金土模內像等譬圓教乃以一微塵中有大千經卷等譬文句云非但光宅不識實智等記云四教實智皆無若干豈圓實智更有若干請有眼者熟讀斯文而四明云三千皆實相相宛然以至云理體自有差別法身寂光有胎獄華池等相還合智者荊溪之意否況止觀云第一義中一法尚不可得況有三千乎世諦中尚有無量法何但三千耶輔行云四眼二智萬像森然佛眼種智真空冥寂斯等格言莫是外道斷見耶豈是小乘頑空耶且嘉祥云一者實相名為無量二者實相所生名為無量荊溪破云實相之言應申能生無量之說應申所生雖分能所俱名無量則未可也而四明云實相理體法身寂光相相宛然豈非嘉祥謂之實相名為無量豈非光宅謂之實智乃有若干嗚呼四明云何妄認智者荊溪所破之非執之為是邪悲哉四等慈悲喜捨名四無量華嚴中說亦名四等四等從心無量從境境既無量慈亦無差等心對四故云四等記云八音四辨力無所畏如法界次第等一極好音二柔軟音三和適音四尊慧音五不女音六不誤音七深遠音八不竭音一義無礙辨二法無礙辨三辭無礙辨四樂說無礙辨一是處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力一一切智無所畏二漏盡無所畏三說障道無所畏四說盡苦道無所畏上略引其名目而已若欲消名釋義委在彼中亦窮八脫之源因時名背捨果上為解脫所言八者一內有色相分觀色二內無色相外觀色三淨背捨身作證四虗空處背捨五識處背捨六無所有處背捨七非有想非無想背捨八滅受想背捨若以根本三三昧等而釋此中等慈恩云禪謂色界四靜慮定謂四無色定解脫謂八解脫等言三三昧者一有覺有觀三昧二無覺有觀三昧三無覺無觀三昧近代已來此義全棄等唐朝已來慈恩等師菩薩一乘不分小衍是則五百應真所集三祇四階菩薩須還天竺以由近代不謂此是三藏故耳又復所說開權顯實但開二乘不開菩薩於二乘中其定性者一向趣寂元無大性若其然者經云菩薩聞法疑網皆除雖生滅想於彼得聞如何解會耶自得四聖得字誤也應云自位故下文云若照自位等也達磨多羅此云法尚是阿羅漢佛滅度後八百年出今家諸文多引用之文句云婆沙第七云地獄道成就他化天法彼婆沙云地獄衆生則應成就他化自在天煩惱業及善他化自在天亦成就地獄衆生煩惱業及不善具在論中亦如下文辨之記云是知談法界者未窮斯妙致使惑果事而迷因理此斥弘華嚴師不善華嚴之法界也以彼諸師不知衆生因理本具諸法但說果上諸法相即而已若不談具何能相即故知果上依正融通並由衆生理本者矣然則一家所談法門一曰性體此當正因二曰性量此當了因三曰性具此當緣因具即是假假即空中只一法性有茲三義雖有三義會之彌分派之恆合雖一一遍亦無所在當知他宗談乎法性亦同今家性體性量以彼皆云法性真如與虗空等但闕第三性具之義是故今家諸文斥耳學今家者或只談具或究空寂此則於其圓宗三法偏計一隅是故當知性體量具三義俱陳心性方顯一義有隱圓頓未彰達斯義者諍論息矣文句云幰蓋幰虗偃切以帛張車上故云幰蓋也眇目一目小曰眇眇亡沼切濛朧濛細雨也亦作秪為秪章移切專辭也亦可作只記云重釋究竟為二謂釋結此文誤也應云重釋究竟為三即先重釋三德等三科是也又次文云重釋究竟等又三者此文亦誤也應云重釋究竟等為二謂釋結釋又為三也應以此文在前移前文來此乃無妨也又下文云豈智明發仍存先暗云常在邪終須破盡究竟永淨方名常在而四明云以反本時三障宛然毒害無作何能符合祖師之教深願後德思之詳之然文句中明暗喻文出瓔珞經學者知之論云五道各有自爾力婆沙論云五道生處各有自爾之法如地獄報色斷便還續生處自爾畜生中能飛虗空餓鬼施摶食則到人中有勇健念力梵行勇健者不見果而能修因念力者久遠所作久遠所說而能憶念梵行者能得解脫分達分善根得正決定天中有自然隨意所須之物等淫祀禮記云非其所祭而祭之名曰淫祀淫祀無福注云妄祭神不饗也今亦例然又云諸土各有各有字下合有自爾力三字恐脫落耳婆沙論云方土亦有生處自爾之法如罽賓土秋時牛胭繫金華鬘餘方貴勝所不能得如那伽羅國凡人飲蒲萄酒東方貴人所不能得如東方貴勝衣絹凡人衣氈如北方人貴勝衣氈凡人衣絹故云諸土各有者也自爾力如釋籤玄義引婆沙云六入殊勝本自爾故釋籤云皆有通用故云殊勝自爾之名通於大小然小乘中於一切法立因緣已皆云自爾如青葉紅華非染使然故云自爾通亦如是但是得禪自爾有通雖是作意即是諸禪自爾力也非指權法名為化他若據文句云正頌上種種因緣而上文云四十餘年以三種化他權實逗會衆生故言種種也文句又云化他之權是實智餘助經中又云更以異方便助顯第一義又多僕從而侍衛之餘深法中示教利喜與今餘法不亦同乎而今記云非指權法恐是誤也又前文云故諸佛中並二智各明歎釋結此別仍合無歎等三更請詳之經云盡思共度量盡即忍切思相吏切任也窮也度徒落切文句云毫犛正作里之切十毫曰若作莫袍切者牛尾耳記云如意珠如止觀如意珠者天上勝寶狀如芥粟七寶琳琅非內畜非外入雨寶穰穰大論中說如意珠者出佛舍利若法滅時是諸舍利皆為如意珠矣色法尚爾況心神靈妙而不具法耶文句中云實相不生能生般若者即方便般若之應用耳世人若問若三俱會等此亦慈恩有茲說也彼之所談如今所敘而破者也又復古來亦有此說由聞三僞一真是諸等是字應作者字語勢始便請細詳之文句云若至下除疑中除字須作陳字請尋下文記云得益之者乃至須辨待時此中有三十七字由文句中云佛知三周得益前後不俱故使記中有茲說耳則不可云記中剩長三十七字學者詳之經云瞻仰兩足尊他云佛於二足多足無足一切中尊而云兩足尊者前三類中兩足為貴即人天之謂也亦如大經釋天人師諸佛雖為一切衆生無上大師而天人中能發阿耨菩提之心修十善道而證果等是故稱佛為天人師如我等比比春秋音義作必利切比輩也記云無以經意靁同禮記曲禮篇云毋雷同注云雷之發聲物無不同時應者人之言各當由己不當然也孟子曰人無是非之心非人也此由北宗堅執定性之人永無成佛之理恐他不了論有餘義故今誡之不可以經與論雷同況復論中前二未熟慈恩那忽改未為不而釋義耶所言論涉有餘說者謂彼論中更有餘義未說故也餘義則是不在此會及彼土等論中未說故涉有餘未為究竟盡理故也故大經中文殊問佛如佛所說一切江河必有回曲一切女人必懷諂曲非一切河必有回曲非一切女必懷諂曲佛所說偈其義有餘唯願世尊說有餘義令諸菩薩深信解之論亦例然故云有餘也身子一聞如止觀第六記身子初遇頞說云諸法從緣生是法說因緣是法緣及盡我師如是說身子聞已便得初果及為目連說如上法目連再聞方得初果初句苦諦也第二句集諦也第三句滅諦也由身子根利故不說道諦信法等相具如止觀六十四番彼十乘中第三安心約信法行各四悉檀皆論止觀回轉相資自行化他成六十四如信行人以止安心有四悉檀以觀安心有四悉檀止觀四悉乃成八番信行既然法行亦爾故信法行有十六番信行轉資法行之人亦有八番法行轉資信行之人又有八番二八復成一十六番并前乃成三十二番又以自行化他合辨是則乃有六十四番準彼又有一百二十八番等說文句云胡文或有漢略不書應云梵文或有秦略不書耳今則且取佛法初至及方言未通故云胡文漢語也具在玄籤止觀補注中辨記云若將永滅權論用釋開會實經此責慈恩專用唯識等論定性滅種之文以通法華而於彼土得聞之者故成唯識第三引解深密經阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我以能執持諸法種子及能執受色根依處亦能執取結生相續故說此識名阿陀那無性有情不能窮底故說甚深趣寂種性不能通達故名甚細是一切法真實種子緣繫便生轉識波浪恆無間斷猶如暴流凡即無性愚即趣寂恐彼於此起分別執墮諸惡趣障生聖道故我世尊不為開演慈恩引用此文具如上下委辨三論師意中論百論十二門論弘此三論之師也具如止觀第三文末彼漫引之以為難辭勝鬘云若不知常住所有三歸皆不成就此云何通遠尋根本三乘初業不愚於法若取四念處聞慧為初者此初知真諦常住齊已知也若古昔為初業者先發菩提心早知常住畏怖生死退大取小具在彼文矛盾具如止觀記盾文句作楯誤也楚有賣矛及盾者有來買矛語買者言此矛壞千盾有來買盾語買者言此盾壞千矛買矛者猶在買盾者復至買矛者語賣者言還與汝矛而壞汝盾為得幾盾賣者無答自語相違故矛戈矛也建於兵車長二丈盾干盾也且順大經諍論之文故大經皆云不解我意然彼經中二十三雙涅槃經中迦葉菩薩白世尊言衆生於佛滅後作如是說如來畢竟入於涅槃或不畢竟入於涅槃或說有我或說無我或說有中陰或說無中陰或說有退或說無退或言如來身是有為或言如來身是無為或有說言十二因緣是有為法或說是無為法或說心是有常或說心是無常或有說言受五欲樂能障聖道或說不遮或說世第一法唯是欲界或說三界或有說言施是意業或有說言即是五陰或有說言有三無為或有說言無三無為或有說言有於造色或有說言無其造色或有說言有無作色或有說言無無作色或有說言有心數法或有說言無心數法或有說言有五種有或有說言有六種有或有說言八戒齊法優婆塞戒具足受得或有說言不具受得或有說言比丘犯四重已比丘戒在或說不在或有說言須陀洹人至阿羅漢皆得佛道或言不得或有說言佛性即衆生有或說佛性離衆生有或有說言犯四重禁作五逆罪一闡提等皆有佛性或說言無或有說言有十方佛或有說言無十方佛如是問已佛皆答之一一皆云不解我意如云我於經中告諸比丘一乘一道一行一緣如是一乘乃至一緣能為衆生作大寂靜永斷一切繫縛愁苦苦及苦因令一切衆到於一有我諸弟子不解我意唱言如來說須陀洹乃至羅漢皆得佛道我於經中說須陀洹人間天上七返往來便般涅槃等我諸弟子不解我意唱言如來說須陀洹至阿羅漢不得佛道乃至結云如是諍訟是佛境界非諸聲聞緣覺所知準此數之有二十一雙言二十三雙者開善云二十冶城云二十一章安云佛赴緣異說衆生不解致成諍論凡二十一條今云二十三者誤也開善云二十者以第二十合第十九為一雙故冶城開之成二十一耳又下文云二十二雙應改之云其二十雙又云二十三內應云二十一內也若唯引不成以證定性乃至人不見之徒援權典用證實教此辨慈恩偏計之失故彼疏云法華論說決定上慢根未熟故如來不記菩薩與記者方便令發心故即常不輕菩薩也言未熟者上慢可爾趣寂種性畢竟不熟云何言未準理應言趣寂之人不愚於法信根不熟佛不與記非趣寂者當亦成佛莊嚴論云餘人善根涅槃時盡菩薩善根不爾也涅槃經中說須陀洹等皆當成佛名不解我意故知趣寂定不作佛矣縱二十三內小部不同此辨小乘於前等法所計不同如薩婆多據事而明畢竟涅槃若曇無德及僧祇部約理而言不畢竟滅數人宗於薩婆多部純明無我破諸外道謂之邪我無假名我論人所計同曇無德明有假我破諸外道即陰離陰婆沙論引育多提婆說色界生定有中陰毗婆闍婆說無中陰薩婆多亦言定有中陰論家亦然舉業利鈍惡業強者直入地獄善業強者徑生天人並無中陰數人所計無漏有退如初果位一向無退入思惟中二果用於等智斷惑即有退義羅漢無漏理應不退前兩果退牽羅漢退舉沙井喻上下有甎中間有沙中沙既頺上去到下論人所計無漏不退但禪定退修得欲界電光之定此定難捉有時退失名之為退無漏無退薩婆多說佛身有為僧祇所說佛身無為成論所計亦有亦無約絶言故乃是無為約寄言故則是有為應身有為真身無為薩婆多宗所計因緣則是有為僧祇所說乃是無為薩婆多云心無相續即是無常僧祇所說心有相續即是常義成論復用薩婆提義心有相續即是常也薩婆多說五欲障道僧祗所說五欲不障成論所計有障不障薩婆多云色界根本四禪能發世第一法曇無德云色欲兩界通能發於五種方便無有論明無色界發五方便者唯犢子部三界屏發在凡夫時等智斷惑至無色界而於後時更修無漏以斷於惑至無色界仍前所斷即發方便所以得云三界屏發成論云唯在意地以捨財相應思為正體亦以身口暢之毗曇用薩婆多云施定二業但意地善故身口亦善成論所計無三無為以三無為非異體故數人所計有三無為以三無為有別體故毗曇中計定有造色成論所說造色則無薩婆多計無作有色成論并及曇無德云無作無色僧祇所計不可定言有色無色薩婆多云異體心數一時俱起僧祇部中說無心數佛陀提婆計無異體起亦相次前起為心後起為數成論同此餘部多說有於五道唯犢子部說有六道薩婆多具受乃得成論不具亦得四卷毗曇有犯重捨即是失雜心毗曇但是薉戒除法滅盡及犯重禁並言不捨二根生時不入僧數又非尼攝餘部多言不失四卷毗曇有五時捨一邪見增二法滅盡三命根斷四犯重五罷道一乘三乘諸部之中並無此計何者一三皆是大乘所說非其境界所以無此佛性即離諸部亦無並是近代所計耳犯重之人有性無性文略不云薩婆多云無十方佛僧祇則云有十方佛成論所說若一界中無十方佛若多世界有十方佛言小部者除一乘三乘佛性即離二雙之外餘即小宗部執不同也文句云內心了了久知越州新板知字誤作如字覺即捨身不覺徙之及彗星等徙斯氏切移也彗祥歲切星名也亦謂之孛言其形孛孛似掃彗也華嚴四十三云菩薩從兜率將下時放光照三千大千世界諸辟支佛覺斯光者即捨壽命若不覺者光明力故徙置他方餘世界中涅槃第九云譬如黑月彗星夜現其明炎熾暫出還沒衆生見已生不祥想諸辟支佛亦復如是出無佛世衆生見已皆謂如來真實滅度生憂悲想而如來身實不滅度如彼日月無有滅沒記云願尚牽來如眷屬妙若先值佛發真見諦生猶未盡或在上界或在他方今佛分段作佛或以願力或以通力來生下界輔佛行化斷餘殘思而出三界若殘惑未盡值佛入滅亦自能斷或待後佛慈恩基師引仁王經列獨覺衆又云釋迦出世五百獨覺從山中來至於佛所如何通之然婆沙云問支佛為如佛獨出世為有俱者答或云獨出無俱者以支佛根利勝身子故如身子尚無並出何況五百功德者俱出問若佛不並出而五百功德一時出世何耶答此皆本是聲聞以緣悟菩提故名支佛若本種支佛行者獨出世則如佛也或二十八如止觀第六記楞伽第三云下者至七中者三五上者即生入般涅槃如親族法限至七代如七步蛇四大力故行至七步蛇毒力故不至八步惑力至七道力非八婆沙云應有十四何故云七答中有本有數不出七故但云七又總論生應云七人七天十四中有合成二十八生也如喜根等即遠益人如止觀第八記大論云文殊白佛言昔我先世過無量劫爾時有佛名師子音王時有二菩薩比丘一名喜根二名勝意喜根但說諸法實相一切諸法淫嗔癡相皆是實相無所罣礙勝意持戒清淨毀訾喜根言是人說法入邪見中是時喜根念此之人為惡業覆當墮大罪我今為說甚深之法雖今無益作後世因緣乃說偈云淫欲即是道恚癡亦復然如此三事中無量諸佛道說如是等七十餘偈時三萬天子得無生忍勝意是時身陷地獄喜根今於東方作佛號曰光踰日明王勝意比丘今我身是十種大心發廣大心長養一切善根究竟不退心無厭足見一切佛恭敬供養心無厭足正求一切佛法心無厭足遍行菩薩波羅蜜心無厭足具足一切菩薩三昧心無厭足於一切三世流轉心無厭足嚴淨佛剎充滿十方心無厭足教化成就一切衆生心無厭足於一切剎一切劫中行菩薩行心無厭足修習諸波羅蜜度脫衆生心無厭足經云唯然禮記曲禮篇云父召無諾先生召無諾唯而起鄭玄注云應辭唯恭於諾也唯以水切記云菩提流支流亦作留此云道希北天竺三藏也當後魏時至于此國金輪王出大海減少金輪路現此華乃生施設論云繞贍部洲有轉輪王路廣一踰繕那無輪王時海水所覆無能見者若轉輪王出現于世大海水減一踰繕那此輪王路爾乃出現金沙遍布衆寶莊嚴栴檀香水以灑其上轉輪聖王巡幸洲渚與四種軍俱游此路泥洹經云閻浮提內有尊樹王名優曇鉢羅有實無華優曇鉢樹有金華者世乃有佛世云勤學不如擇師禮記云是故擇師不可不慎也楊子云務學不如務求師師者人之模範也模不模範不範為不少矣但會二乘何二乘等此辨北宗不知二乘有兩教之異不知菩薩有小衍之殊章安云三十心是初依五恆也初地已去是第二依等涅槃釋文云今明凞連至三恆為初依一分八分為二依十二十四為三依十六為四依又云今約地前未斷別惑是初依地上斷別惑作三依是別義也約十信是初依三十心十地斷別惑是圓義也就圓更作通別而說通則四十心共作四依別乃十信為初依初住至六住為第二依七住至九住為第三依十住是第四依又云四依通是師位為世間作依止故通是弟子位弘宣佛法故別則初依是弟子位第四依是師位中間二依亦師亦弟凞連章安云相傳凞連只是跋提今言不爾跋提大凞連小或言廣四丈或八丈在城北跋提在城南相去百里佛居其間凞連未見翻言凞連河未能信受者恐誤也經云若有衆生於凞連河沙諸如來所發菩提心乃能於是惡世受持如是經典不生誹謗俱尸此方翻為角城城有三角也更有諸說具如涅槃疏攝大乘等位如釋籤引攝大乘第七釋第四因果勝相中亦但明歡喜等十地而已十地論唯釋華嚴經十地品耳文句云十七地論五凡夫記云恐是十地論剩七字嘗撿十地經論未見具列五凡夫名然他人引用今不測之後人更尋記文之中乃云恐是十地論剩七字者嘗看群録開元録云真諦三藏梁朝太清二年八月屆于都邑後與沙門寶瓊等二十餘人譯十七地論適得五卷而國有難於是遂輟此與唐譯瑜伽師地論論本是同也今恐文句云十七地論即是此論矣其十七地論今闕本焉瑜伽論云一五識身相應地二意地三有尋有伺地四無尋唯伺地五無尋無伺地六三摩呬多地七非三摩呬多地八有心地九無心地十聞所成地十一思所成地十二修所成地十三聲聞地十四獨覺地十五菩薩地十六有餘依地十七無餘依地此十七地如論具明淨名疏引五凡夫論十地名為聖慧凡夫是則降佛已下皆是凡夫若然十信十住十行十回向十地是五凡夫耶大論四智因果總別大論明四智有多解或言因中總別果上總別言總別者直語道慧及一切智故名為總因果之上各加種故故名為別又云盡智等者毗曇云我知苦乃至我知道無生智者謂我知苦已不復更知乃至我知道已不復更知邐迆相連接貌記云當非不故不得云無此由慈恩改法華論決定上慢根未熟故佛不與記未應言不即根不熟也故今斥之疑通會別理不應然乃至而苦不許公違論文此亦慈恩謂法華經俱會二乘不開菩薩故今斥之余在此地曾問彼宗人云法華若不開菩薩何以經云諸求三乘人若有疑悔者等彼乃答云疑通三乘人會別在二乘余又問云若會別在二乘而菩薩不會者經何故云聲聞若菩薩皆成佛無疑若不會之豈曰成佛及無疑耶若菩薩有疑不會則菩薩之疑永不除耶引證除位除字應作住字如字平呼平字應作去字李陵與蘇武書云主客之形既不相如注中作而去切今記主準此以去聲呼之而傳寫者誤改去字作平字耳更請詳之亦如下文云故別知見信經劫數頗到故也頗字亦是後人妄改應作叵字如前序中宿智頗忘頗字亦是後人妄改未必全爾如止觀第三記若通途說智只是慧俱通權實及以因果如云般若翻為智慧如大論云因名般若果名薩婆若又復智慧俱在於因如云止觀為因眼智為果如來智慧諸佛智慧等此則智慧俱在於果若云方便智慧此則俱在於權如云智慧甚深此則俱在於實如大經中釋別五味亦寄三乘判菩薩位妙玄止觀皆引大經第九云聲聞如乳緣覺如酪菩薩如生熟酥佛如醍醐即別教五味也讀者皆云等此斥弘華嚴人不解華嚴經意又上文云華嚴更加三世說平等句合為十句十種三世等者新舊華嚴皆云有十種說三世所謂過去世說過去世過去世說未來世過去世說現在世未來世說過去世未來世說現在世未來世說無盡現在世說過去世現在世說未來世現在世說平等現在世說三世即一念是為十也非謂華嚴有十種三世矣文句云父具四一父字誤也應云文具越州新本則云文具記云諸釋甚廣於今非要如慈恩疏五門分別五濁之義一釋名二出體三對治四廢立五相攝於是廣說文有四五紙餘隟正作隙綺戟切蟣居豈切蝨所乙切俱盧舍者即二里也踰繕那者亦言由旬此云合也應也計合爾許之量也同此方之驛耳自古聖王一日行量也然有大小或八俱盧舍或四俱盧舍或四十里等剎那怛剎那臘縛等者法苑中翻剎那為一念也翻怛剎那為一瞬也臘縛亦言羅婆雖未見翻準上乃是六十一瞬故也攪古巧切撓奴巧切憀力雕切憀賴也藤徒登切膚甫無切記云十六知見如法界次第一我二衆生三壽者四命者五生者六養育七衆數八人九作者十使作者十一起者十二使起者十三受者十四使受者十五知者十六見者若作三世五陰各計四句謂過去如去等大論云如去等者如人來此間生去至後世亦如是也有云先世無所從來滅亦無所去有云身神和合為人死後神去身不去是名如去不如去非如去非不如去者見去不去有失故說非去非不去是人不能捨神而著非去非不去有云國土世間八方有邊上下無邊總上二法是名有邊無邊有人見有邊無邊俱有過故不說有邊無邊故云非有邊非無邊神及世間常等者外道說神有二種一常二無常若計常者常修福德後受果報故或由行道故神得解脫若計無常者為今世名利故有所作若計常無常者有人謂神有二種一者細微常住二者現有所作現有所作者身死時無常細神是常若計非常非無常者若常則無罪福若無常亦無罪福何者若常則苦樂不異譬如虗空雨不濕風日不能乾若無常則苦樂變異譬如風雨在牛皮中則爛壞以我心故說必有神但非常非無常佛言四種皆是邪見若本劫本見等六十二長阿含十三云佛告善念梵志此本末見不出六十二本劫本見一十八末劫末見四十四合六十二也言十八者有四四句并根本二成十八也初四句者一見二十劫成敗二見四十劫三見八十劫四以捷疾智說一一句皆云神及世間常也第二四句者一我及世間半常半無常二計由戲笑三計失意生四以捷疾智說第三四句者一神及世間有邊二無邊三上下方有邊四方無邊四以捷疾智說第四四句者一我不知不見善惡有報無報耶二我不知不見有他世無他世耶三我不知不見何者善何者惡耶四愚癡暗鈍隨他問答根本二句者一定意知衆生未來無因緣而有二以捷疾智說其次末劫末見四十四句者於中第一有四四句初四句者一有想四句也一我此終後生有色有想二生無色有想三生有色無色有想四非有色非無色有想二四句者以有邊無邊對有想作四句三四句者以有樂無樂對有想作四句四四句者一有想二若干想三少想四無量想第二有二四句初四句者以有色無色對無想作四句次四句者以有邊無邊對無想作四句第三有二四句初四句者以有色無色對非有想非無想為四句次四句者以有邊無邊對非有想非無想為四句此兩二四并前四四合三十二復有斷見七句一若沙門婆羅門作如是論我身從父母而生終歸磨滅二欲界諸天生具足斷滅三色界諸天生具足斷滅四空處五識處六不用處七非想非非想處次常見有五句一計現在五欲自恣得涅槃二初禪三二禪四三禪五四禪並計得涅槃斷常有十二句并前三十二句合四十四句并前十八句合六十二句也具釋如經文句云稠林觀法師云難知曰稠多故名林宕徒浪切過也殞為閔切沒也記云先斷斷都管切兩醫如止觀第三記大經云譬如舊醫純用乳藥如彼外道唯說邪常客醫如來初令制乳如說無常以破邪常成無常已還用真常以破無常新舊二乳乳名雖同邪正義別應云四法一時今文句中已依記文改定而說據理應須存舊文句方見記文而有用也舊本文句但云一時闕於四法但是略耳委釋具如止觀第五記論云三假施設止觀云法假如因成受假如相續名假如相待五衆和合是法假既云和合與因成同也如根莖枝葉故有樹名是受假受謂領納由根莖故樹可領納領納樹故有樹始終即相續假也用是名字取二法相說是二種是名假用於樹名及枝葉名取二名下二種之法樹名之下枝葉為法枝葉名下四大為法二名二法若待非樹有樹名生即相待假也初禪劫命等二禪已去劫短命長等初禪初天壽二十中劫二天壽四十中劫三天壽六十中劫此則名為劫命等也二禪初天壽二大劫二天壽四大劫三天壽八大劫此則名為劫短命長三禪已去準說可知命是不相應行法百法疏云行即行蘊行蘊有二一相應行即心所法二不相應行亦言心不相應行不與心相應故非心法故簡相應行也亦言非色不相應行準百法論不相應行有二十四一得二命三衆同分四異生性五無想定六滅盡定七無想報八名九句十文十一生十二老十三住十四無常十五流轉十六定異十七相應十八勢速十九次第二十時二十一方二十二數二十三和合性二十四不和合性若準俱舍頌云心不相應行得非得同分無想二定命相名身等類論云如是諸法心不相應非色等性行蘊所收俱舍中明五道壽別等活等上六如次以欲天壽為一晝夜壽量亦同彼極熱半中劫無間中劫全鬼日月五百傍生極中劫人間五十年下天一晝夜乘斯壽五百上五增倍倍唯無雲減三什法師云將來世劫盡時刀兵起人壽十歲婆須蜜從忉利天下生王家作太子教衆人言我等祖父壽命極長今人嗔恚無慈心故其壽乃短是故汝等應行慈心衆人從命惡心漸薄其後生子壽二十歲如其轉續至于八萬四千歲也因文句中辨大小劫故引此云當以此文用通諸說如阿閦國亦有女人而無邪欲悲華經云阿閦菩薩願云所有女人成就一切諸妙功德猶如兜術天上天女無有婦女諸不淨事若諸男子發淫欲心至女人所以愛心視須臾之間便得離欲如是女人若見男子有愛欲心便得妊身亦得離於淫欲之想禪波羅蜜明三種瞋一非理瞋二順理瞋三諍論瞋無事生怒是非理瞋名為邪瞋因人來惱而生怒者名順理瞋即正瞋也乃引摩訶衍論說清淨佛土中雖無邪三毒而有正三毒為例今言順理正瞋者即其人也博地之言無教可準餘國之義出自他人此文未知斥何人也或恐斥瑤師如下文中是也慈恩亦云於我有緣以神通力接引於彼遇我得聞是經或是凡夫若是無學求有餘無餘涅槃將此涅槃謂實滅度之想求入證此二種涅槃修二乘行種性所排慈悲所引生彼遇我求佛智慧或雖於餘佛有緣生彼平等意趣故亦說是我也授記品記云但以滅想作凡夫釋曲會經文令成己義若準此說驗知今斥乃慈恩耳學不師安義不中難秦時藍田縣得一大鼎容二十七斛邊有篆銘人莫能識乃以此篆示道安法師安師云此古篆書云魯襄公所鑄乃寫為隸文又有一人持一銅斛於市賣之其形正圓下向為斗橫梁昂者為升低者為合梁一頭籥籥同黃鐘容半合邊有篆銘堅以問安師安云此王莽自言出自帝舜龍集戊辰改正即位以同律量布之四方欲小大器均令天下取平焉安公多聞廣識為若此也堅敕學士內外群臣凡有疑滯皆師於安所以京兆為之語曰學不師安義不中難矣而生五道之言維摩經云而生五道以現其身為大醫王善療衆病應病與藥令得服行却入生死之說寶積經云文殊師利言吾又恣心入諸塵勞生死之內驚入火宅之喻此經云驚入火宅方宜救濟非涅槃一百之文止觀云釋論有二文初以二乘為四百後以二乘為一百今通之論明通意通家以真諦為極過三百已未破化城但入涅槃即指涅槃為四百耳而復以二乘為一百者更明出假菩薩從空出假非涅槃為一百入三界為三百耳小乘之中諸部不同亦有信有十方佛薩婆多部云無十方佛僧祇部云有十方佛成實論云一世界則無多世界則有又大論云聲聞法中有十方佛汝自不解如雜阿含說譬如大雨連注渧渧無間不可知數是諸世界亦復如是我見東方無量世界有成有住其數甚多不可分別如是乃至十方亦然長阿含云有鬼神王請佛偈云大精進人我歸命佛二足中最尊上智慧眼人能知見諸天不解此慧事過去未來今諸佛一切咸皆稽首禮如是我今歸命佛亦如恭敬三世尊如是偈中有十方佛若佛於聲聞法中言有十方佛者衆生當言佛易可遇不勤脫苦若不遇此佛當遇彼佛因此懈怠不勤求度以是故於聲聞法中不言有十方佛亦不言無十方佛也凡夫有反復復應作覆此直是異解等九字恐須作白字書之或云白字即寫白也古本文句此之九字注於文下記主意謂此之九字不可注于文下須作大書即是寫白也今之文句已依記文改定而示乃令記文無用後人更請詳之文句云今不頌順但頌揀誡等此一段文恐是訛略若對上文此中應云今不頌順誡但頌揀許揀復為二初三行半頌上五千退次二句頌上衆已清淨次一句頌許又下釋中云舍利弗善聽即頌上誡許誡令善聽者亦恐誤也但是頌於揀許之許耳非誡許也故長行云汝今善聽當為汝說又下文云諸佛所得下三十三行三句者亦誤也應云三十四行三句也又云從未來世諸佛下者亦誤也應云從未來諸世尊下也記云凡夫上慢有五不同等大婆沙云異生有五謂有漏善及以四果初果起四除第一一來起三除前二不還起二除前三羅漢無慢故知四善根但為一四果為四名五不同矣委如論中辨之各有其意如釋籤大論十戒者一不缺二不破三不穿四不雜五隨道六無著七智所讚八自在九隨定十具足不缺戒是性重四波羅夷也不破戒是十三僧殘也不穿戒是波逸等也不雜戒是定共戒也隨道戒是順理見真也無著戒是於思惑無染也智讚自在約俗諦辨隨定具足就中道明大經十戒者一禁戒二清淨戒三善戒四不缺戒五不析戒六大乘戒七不退戒八隨順戒九畢竟戒十具足諸波羅蜜戒論中前四戒與大經前四次第對之至其第四而不同者論不雜戒即大經不缺戒與論不缺名同義別論取缺壞不任故對四重經取微有缺損故對不雜也論隨道無著戒即大經不析戒論智所讚戒即大經大乘戒論自在戒即大經不退戒隨順戒論隨定戒即大經畢竟戒論具足戒即大經具足諸波羅蜜戒但依此對不須改也今且依大經以不缺等三上文云若依大論即不缺第三若依大經則不缺居首此恐誤矣大論大經十戒列名如向已示妙玄又將不破戒首列請以向列為準并定共道共即六戒須并無著戒方成六戒也又云道共定共判在三藏四果者亦是誤也隨自意中通途善惡夫善惡無定如諸蔽為惡事度為善人天報盡還墮三途已復是惡二乘出苦名之為善二乘雖善但是自度當知生死涅槃俱復是惡六度菩薩慈悲兼濟此乃為善雖能兼濟如毒器貯食食則殺人已復是惡三乘同斷此乃稱妙而不見別理已復是惡別教為善猶帶方便豈非是惡唯圓名善善順實相如此善惡其義則通文句云九部十二部如玄義說小乘九部以小乘中灰斷無如意珠身故無方廣部又無天鼓自鳴故無無問自說部雖有授記以其少故復無授記部此且從別作如是說若乃通途大小兩乘皆論十二部也一修多羅此云法本二祇夜此云重頌三和伽羅那此云授記四伽陀此云不重頌五優陀那此云無問自說六尼陀那此云因緣七阿波陀那此云譬喻八伊帝曰多伽此云本事九闍陀伽此云本生十毗佛略此云方廣十一阿浮陀達磨此云未曾有十二優波提舍此云論議部者別也類也以此十二其類別也新譯恐濫部袟故乃謂之十二分教也經云無二亦無三余於京國見慈恩宗人云三藏奘師準梵本中應云無其第二及以第三以是之故但會二乘不會菩薩乃引下文密遣二人無有二乘說二涅槃等文作證當知他宗如斯釋經與夫天台大義相違所以記中斥云此是極聖誠說而不肯信也具如上下辨之可知文句云本誓既普今衆生等越州新板今字誤作令字又下文約三義釋衆生者衆字去呼故漢書中亦作去呼然則常讀多依平呼解義乃是去呼耳凶許容切惡也欒此字是木名也正作圞圓也從癡有愛則我病生下句相帶來耳壞此字是未燒瓦也若作衃即凝血也若作胚即懷胎一月也恐正作胚疱薄教切膊普各切字應作髆補各切肩胛也腕烏貫切荕字應從竹記云聲嘶忽急嘶先奚切聲散也亦悲聲也略如止觀第四記引入胎經及三十八七日并俱舍五位等佛為難陀廣說胎相六趣不同兼辨六趣中陰等相乃至父母精血不淨相等初入如風雨入舍或在母腹而命終者又母有患而不入胎若不壞者七日一變初七如薄酪二七如厚酪三七如短小藥杵四七如溫石五七五皰開張乃至第三十八七風力所轉頭向産門申兩臂出每於一七各有一風吹令變異如經廣說也俱舍五位即是五七之梵音耳次第對之可以知矣又復應知羯剌藍亦言歌羅邏又羯邏藍此翻和合又云凝滑父母不淨和合凝滑如薄酪也頞部陀此翻皰結於凝酪中生一皰結也閇尸亦言閇手又卑尸此翻肉團結聚成團也羯男亦言鍵南又伽訶那此翻堅肉團堅實也鉢羅奢佉此云枝五七之時有形相之枝故也有人具立受胎章門并世人云法華亦明三乘他宗章疏率多如此宋咸云凡坦然明白之條則五行俱下而詮釋洎卓爾難明之意則一辭不措而闕亡其斯之謂歟然受胎事亦可知之故婆沙云若是男子於母生愛於父生恚彼作是念若無此男子者我當與此女人而共交會父母合會所有精氣見是已有見已生喜生喜之後便乃迷悶以迷悶故中有轉重更不移動是時自見己身在母右脅面向母背而坐若是女人反此可知廣說中有及受胎相請讀婆沙慈恩宗說法華明一佛乘是頓教攝說其三車是漸教收妙莊嚴王品八萬四千得法眼淨是初果等他人或以普門品後現三乘身是說三乘等若菩薩不開何須引昔此斥他宗云不開菩薩之失也具如上辨次文中云四衢者爾雅云四達謂之衢注云交道四出也又云碌碌者多石貌也支佛五級五字誤也經云辟支佛塔應十一層阿難問佛何故爾等此文訛略經云阿難一切四衆起佛舍利七寶塔已應當更起三塔供養所謂支佛羅漢輪王阿難白佛如來出世悲憫衆生滅後起塔得大功德其餘三塔於諸衆生得何等利佛言支佛悟法因緣入深法性能為人天而作福田羅漢生分已盡能為世間福田輪王以十善化物以是應當起塔供養如來塔高一十三層辟支佛塔應十一層羅漢四層輪王無級何以故未脫三界諸有苦故
