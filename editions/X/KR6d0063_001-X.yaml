body:
  text: 妙玄釋籤永嘉沙門釋從義撰釋籤云台嶺台者星名其地分野應天三台嶺者大師云吾聞天台地記稱有仙宮若息緣茲嶺展平生之願也毗壇在常州亦云毗陵吳會須知云常州古者謂毗陵郡也有晉陵公舊宅今為晉陵縣焉會古外切前漢書地理誌云毗陵注云季札所居比江在北東入海楊州川王莽謂之毗壇顏師古云舊名延陵漢改之耳章安高僧傳云名灌頂字法雲俗姓吳常州宜興人也祖世避地東甌因而不反今為臨海之章安焉生甫三月母欲名之夜稱三寶頂仍口放音句清辯時攝靜寺慧拯法師聞而歎曰此子非凡即以非凡為字年七歲出家為拯公弟子遂沐道天台承習定慧春秋七十二貞觀六年八月七日卒于國清寺注後漢書云章安縣名本名日浦光武改名章安故城在今臨海縣東南江陵下文所指即荊州也妙玄云東漸漸音尖尚書禹貢云東漸于海孔安國傳云漸入也釋籤云漢明夜夢迦竺初臨漢明即後漢第二帝名莊光武帝第四子在位十八年永平三年歲次庚申因夢金人項有日光飛來殿庭遂問群臣通人傅毅對云臣聞西域有神其名為佛陛下所夢將必是乎至七年歲次甲子帝令郎中蔡愔等一十八人西尋佛法至月氏國乃遇迦葉摩騰竺法蘭二沙門齎白氎𦘕釋迦像白馬䭾經自西而來至十年歲次丁卯屆于雒陽三寶錄云迦竺並中天竺人未聞姓字隋文御寓隋高祖文皇帝姓楊名堅小名那羅延漢太尉震十四代孫也御寓即御理宇宙也台衡誕應台即天台衡即衡山衡山為南岳在荊州後開為衡州從山為名也台衡即智者南岳所棲之處也誕應即誕育而垂應者也習禪義解翻譯若準皎師所撰僧傳十科次第則須先列翻譯次義解三神異四習禪五明律六遺身七誦經八興福九經師十唱導若依宣律師續高僧傳所列十科初二大同三曰習禪四曰明律五曰護法六曰感通七曰遺身八曰讀誦九曰興福十曰雜科翻者大宋僧傳云如翻錦綺背面雖異其華是一故西竺此方語雖不同佛旨無別矣譯者易也變易梵言令同華語也又譯者傳言之謂也禮記王制云五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯原夫佛法自西而來合云狄鞮而云譯者良以漢朝多事北方譯人兼善西語故云譯也後代所以皆悉倣之文宣王記室王簡栖所集百卷文選注云掌書記文學之任也姓氏英賢錄云王屮字簡栖琅瑘人齊朝起家郢州從事後為輔國參軍所集百卷未獲其本高僧傳云齊竟陵文宣王撰三寶記傳或稱佛史或號僧錄開皇三寶錄云司徒竟陵文宣王府記室王屮撰僧史十卷禮云動則左史書之言則右史書之禮記玉藻第十三有此文也鄭玄注云其書春秋尚書其存者彌天釋氏道安師云事為春秋言為尚書百王齊其風萬代同其軌嘉祥皎法師所集高僧傳會稽上虞縣人未詳氏族住嘉祥寺名慧皎學該內外撰高僧傳十科如前已列大蘇山名也在光州代受法師講金字大品南岳思禪師造金字大品自開玄義命智者代講也法華前方便南岳云汝所入定法華三昧前方便也所發持者初旋陀羅尼也經云以見我故即得三昧及陀羅尼夫三昧是定陀羅尼是慧陀羅尼慧既有三種三昧之定豈無三耶但是經中略而不列耳旋陀羅尼既名為初第一三昧豈非前耶中道法音名之為實旋及百千俱名方便以二方便得入中道故云法音方便耳旋既名初名前百千理合名後又復定慧只是止觀慧觀既乃有三止定豈可不爾故止觀中映望三觀立三止名況三止三觀與三陀羅尼名義雅合故知法華三昧之定不出三止之義良可信矣華頂佛壠唐谿大師住寺之北別峯號曰華頂登眺不見羣山暄涼永異餘處大師於此降伏天魔也天台山西南隅一峯名為佛壟游其山者多見佛像是故云也陳少主再勅頻迎隋文帝有勅請住陳朝五帝第五後主諱叔寶字元秀小字黃奴宣帝嫡長也在位七年年五十二至德三年少主勅書有五口勅有十二請迎大師故曰再勅頻迎也隋文帝有勅書等並在國清百錄中論語包氏引王制論語學而第一篇但云道千乘之國包氏注中亦無萬乘之言今所云者以諸侯千乘天子必當萬乘者也孟子云天子之制地方千里公侯方百里既云千里則萬乘可知矣樂說辯如止觀第一記一義無礙辯二法無礙辯三辭無礙辯四樂說無礙菩薩能於一字中說一切字一語中說一切語一法中說一切法故云樂說無礙辯也託胎靈瑞大師母徐氏夢見香煙五彩輕浮若霧縈迴在懷欲拂去之聞人語云宿世因緣寄託王道何以去之又夢吞白鼠因而有孕誕育徵祥至於載誕夜現神光棟宇煥然兼輝鄰室眼有重瞳髫齔精誠髫小兒髮也齔毀齒也男八月生齒八歲毀齒女七月生齒七歲毀齒大師年甫七歲喜往伽藍諸僧口授普門品一徧即得於長沙像前發大弘誓願作沙門荷負正法故曰精誠也從師訪道出家之後詣曠律師南岳禪師博通律藏深達定慧臣主珍敬徐陵毛喜之臣陳隋二帝之主悉皆貴重師而事之故曰珍敬也緇素歸心緇即法濟禪師大忍法師等也素即袁子雄荊州人等也並延頸侯望尊之尚之臨終示相大師後於一夜獨坐說法連綿良久如人問難焉滅後應驗別傳之中列其十條今略舉一隋主向淨名疏而呪曰昔親奉師顏未敢諮決今承遺旨何由可悟若隨文生解願賜神通其夜得夢王自說法釋難如流見智者從空而來瀉七寶珊瑚於閣上驗者即指三國成一有大勢力人能建此寺又云王家能造此寺寺若成國即清即呼為國清寺之驗也建業在揚州即古之揚州楊字從木者誤也字應從手李巡曰江南之氣躁勁厥性輕揚故曰揚州今為昇州也文句注云余二十七於金陵聽受者昇州地曰金陵水名建業山號蔣山城曰石頭府名江寧亦云建康西晉第四愍帝諱業字彥奇東晉後都建業避愍帝諱遂改建業為建康也晉宋等等其齊梁等六朝都此故也依俙粗魯不分明之皃也髣髴相似不審之謂也漢南曰荊自漢南至衡山之南江南曰揚自京江至南海已來尚書禹貢云惟揚州荊及衡陽孔氏傳云北據淮南距海也又云惟荊州江漢朝宗于海孔氏傳云北據荊山南及衡山之陽也京江在荊州台嶺鶴林如止觀第一記台嶺如前辨鶴林亦云鶴樹拘尸城阿夷羅䟦提河邊樹有四雙佛於中間而般涅槃其林變白猶如白鶴故曰鶴林止觀禪門淨名疏各有餘分說未終摩訶止觀列十大章一大意二釋名三體相四攝法五偏圓六方便七正修八果報九起教十指歸於正修中有十種境即陰入等纔至見境法輪停轉後分弗宣良由夏末所以罷唱焉禪門即是次第禪門禪波羅蜜其中亦乃列十大章一大意二釋名三辨門四詮次五法心六方便七修證八果報九起教十歸趣第六方便文中注云若論初禪已後發諸禪定深妙境界並在第七修證中說此文皆悉未流通也輔行記云但至修證餘三略無維摩經有一十四品大師疏解止到佛道品第八後諸品疏乃是章安述而續之別傳云若說次第禪門一年一徧若著章疏可五十卷若說法華玄義圓頓止觀半年各一遍若著章疏各三十卷大莊嚴寺法慎私記禪門初分得三十卷尚未刪定而法慎終灌頂私記法華玄義并止觀初分各得十卷孔子諸弟子歎孔子智深如窺其宮牆鑽之彌覺其堅仰之彌覺其高論語子張第十九云叔孫武語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮牆賜之牆也及肩闚見室家之好夫子之牆數仞不得其門而入不見宗廟之美子罕第九云顏淵歎曰仰之彌高鑽之彌堅夫子循循然善誘人注云七尺曰仞循循次序皃妙玄云諮詢春秋不傳曰訪問於善為諮諮親為詢釋籤云如涅槃雪山童子聞半偈已傳於石壁經云過去之世佛日未出我於爾時作婆羅門修菩薩行周徧求索大乘經典乃至不聞方等名字我於爾時住雪山中時天帝釋作如是言我今自當而往試之乃變其身作羅剎形宣過去佛所說半偈諸行無常是生滅法我於爾時聞半偈已心中歡喜四向顧望唯見羅剎即作是言善哉大士汝於何處而得如是半如意珠時羅剎云汝今不應問我是義我不食來已經多日我即語言善哉大士若能為我宣說如是半偈竟者我當終身為汝弟子羅剎答云我今飢苦實左能說我即問云汝食何物羅剎答云我所食者唯人血肉我即語云汝但說之我當以身奉施大士羅剎於是即說半偈生滅滅已寂滅為樂我於爾時聞是偈已乃於處處若石若壁若樹若道書寫此偈即時上于高樹之上尋便放身下未至地爾時羅剎復帝釋形而接取之五比丘一陳如二迦葉三頞四䟦提五拘利十九踰城文句記云若十九出家則二十四成道若三十成道則二十五出家不同見別不須和會他宗章記云十二游增一長阿含並說二十九出家三十五成道增一云二十年在外道法中本起因果經說十九出家思惟無相三昧經云三十成道智度論云佛臨滅度時告須䟦陀羅云我十九出家求佛道出家已來過五十歲而不說成道之時或有解云十九出家後五年事仙人行樂行六年行苦行三十成道菩提流支云八年作嬰兒七年為童子四年學五明十年受五欲六年行苦行注四十二章經云十九踰城五載游歷六歲苦行通源記云準普曜經十九出家三十成道故以十一年前後分之余謂經論不同乃是機見有殊若諸師所解請以文句記而定其非妙玄云那由佗亦云那術又云阿庾多此云萬億五十二數中此當第十數也釋籤云具如下文本迹用中各有十義迹中十義一破三顯一二廢三顯一三開三顯一四會三顯一五住一顯一六住三顯一七住非三非一顯一八覆三顯一九住三用一顯一十住一用三本中十義一破迹顯本二廢迹顯本三開迹顯本四會迹顯本五住本顯本六住迹顯本七住非迹非本顯本八覆迹顯本九住迹用本十住本用迹具如疏文三根互轉得利鈍名具如疏第四卷十門解釋三根互轉者轉下中為上於法說周得悟轉下為中於譬說周得悟下根不轉三周乃了十門解釋一有通有別二有聲聞無聲聞三惑有厚薄四根轉不轉五根有悟不悟六有領解無領解七得記不得記八悟有淺深九益有權實十待時不待時頭角聲聞本是菩薩如富樓那等富樓那彌多羅尼此云滿慈子得授記已經文偈云內秘菩薩行外現是聲聞菩薩本是古佛如文殊等文殊師利此云玅德新翻玅吉祥楞嚴經說過去無量阿僧祇劫有佛號龍種上尊王即文殊師利也如止觀發心初云𧂐聚精要名之為心五略有五一發大心明三種心一慮知心二草木心三積聚精要心今文積字誤作𧂐字八相一生兜率天二入胎三住胎四出胎五出家六成道七轉法輪八入涅槃小乘無住胎相大乘無降魔相然亦可論之五百由旬由旬或由延又俞旬喻闍那踰繕那此翻合也應也謂計合應爾許度量也自古聖王一日行之類同此方之驛也或十六里或四十里以由大小乘中所說不同故也言五百者五百有三義一約生死三界為三百方便土為四百實報土為五百二約惑見惑為一百五上分為二百五下分為三百塵沙為四百無明為五百三約觀空觀知三百假觀知四百中觀知五百妙玄云寶所釋籤云寶渚寶所之名出乎法華寶渚之號備如大經故法華云過五百由旬至珍寶所實相可尊喻之為寶此寶之所在於五百由旬之外也大涅槃云譬如商人欲至寶渚不知道路有人示之即至寶渚乃獲諸珍大般涅槃喻之為寶爾雅云水中可居曰洲小洲曰陼今以陸極水際名之為渚然則寶所寶渚其名小別大旨無殊是故諸文互相舉矣又復寶渚寶所亦出諸經論中釋籤云庠序文句階位問答悉庠序也庠謂安詳序即次第蓋非忽卒越次之義也夏曰校商曰庠周曰序爾雅云東西牆謂之序注云所以別內外也通序異外亦可借用學舍養宮並非今意具如文句輔注中辨妙玄云皆安五事如是一也我聞二也一時三也佛住王舍等四也與大比丘等五也亦云六事離佛住王舍城也或云七事開我聞也釋籤云四種阿難正法念經明三種阿難一歡喜持小乘藏二歡喜賢持雜藏三歡喜海持佛藏阿含經明典藏阿難持菩薩藏妙玄云須陀洹此云預流又云逆流又云溝港又云修習無漏釋籤云若數日不食皆化為蟲者物類相感志云數日不煑盡化為飛蟻一名那子樹亦名古度子生嶺南枝柯皮中生子子著木皮也體字訓禮君臣撙節禮記第七云禮也者猶體也體不備君子謂之不成人也今家以體訓禮蓋準此文而互訓也言君臣撙節者禮記云恭敬撙節注云撙猶趨也又云君臣之節禮之經也釋籤云禮記第七云孔子曰大道之行也等此文出禮記禮運篇中昔者仲尼與於蜡賓鄭玄注云蜡者索也歲十二月合聚萬物而索饗之也蜡仕嫁切祭名也夏曰清祀殷曰嘉平周曰蜡也索所百切事畢出游於觀之上觀古亂切喟然而歎仲尼之歎蓋歎魯也言偃在側曰君子何歎故有此云孔子曰大道之行也等言大道者注云謂五帝時也天下為公者注云公猶共也禪位授聖不家之親睦也今大道既隱者注云隱猶去也天下為家者注云傳位於子也禮義以為紀者白虎通云紀者理也張理上下整齊人倫也言偃者仲尼弟子姓言名偃字子游妙玄云金剛藏說佛甚微智空有不二不異不盡地論云何故名金剛藏藏即名堅其猶樹藏又如懷孕在藏是故堅如金剛如金剛藏是諸善根一切餘善根中其力最上猶如金剛亦能生成人天道行諸餘善根所不能壞故名金剛藏金剛藏菩薩偈云微難知聖道非分別離念難得無垢濁智者智行處自性常寂滅不滅亦不生論云此微有二種一說時甚微二證時甚微何故難知偈言非分別離念故非分別者離分別境界故離念者自體無念如是聖道名為甚微智者智行處者自證知故自證知者依彼生故於中智者見實諦義故乃至云此智不住涅槃世間中故如是觀行甚微依止甚微清淨甚微功德甚微第一甚微不同世間三昧故第二第三不同外道自言尊故第四不同二乘故此甚微智復有何相偈曰自體本來空有不二不盡遠離於諸趣等同涅槃相非初非中後非言辭所說出過於三世其相如虗空論云自體本來空智自空故自體空者可如是取如兔角邪不也可如是取異此空智更有異空邪不也可如是取有彼此自體彼此轉滅邪不也云何取此自體空有不二不盡如是取此句顯離三種空攝一離謗攝二離異攝三離盡滅攝有二種頌一有不二不盡二定不二不盡此頌雖異同明實有若非實有不得言定此云何定此定能滅諸煩惱故清涼觀師云意云定即是有故能滅惑今華嚴經文闕有字如何會通此有二意一以不盡攝之謂有體故不盡二西域之經自有二本如論云有二種頌今華嚴經亦無定字義同定本謂定是有無不二故今家學者須知論文次了天台借用之意偈論但有三句而無不異句也其文雖闕其義無虧何者既有不二豈無不異四句備矣大旨全焉所以天台借而復加不異句也況復論云二離異攝既離於異明知不異是故加句良由此矣垢衣內身實是長者籤云開丈六垢衣是同體權實瓔珞長者今謂玄籤既明經體當知內身即內體也內體即是實相法身體既是內用豈非外故知衣瓔勝劣報應即是外用法華已前三佛離明隔於偏小故勝劣用謂之異體今至法華開於丈六劣應垢衣內身體是實相法身故與尊特勝應瓔珞同實相體勝劣既同實相法身法與報應勝劣外用任運相即若不相即則乖法體故以同體實相法身而為經體即是玄籤之正義也故釋籤第十明華嚴法華二處會主雖則舍那釋迦不同但是衣瓔少殊內身不別豈非華嚴舍那尊特勝應瓔珞與夫法華釋迦丈六劣應垢衣二用雖則少分差殊一法身體元無差別乎文句記云若得實意方知四佛體同用殊講華嚴者唯言我佛寧知今昔衣瓔雖殊內身實體等無差別況文句云緣宜不同略為十異種智法界等無差別既是一體而有二用何妨華嚴尊特瓔珞法華丈六劣應垢衣體是法身無有分別雖則相即用是立法差降不同豈可混濫若不爾者玄籤既開垢衣內身即是瓔珞文句及記何故乃云法華師弟隱寂忍之實施拙弊之權身皆卑劣邪莫是吾祖云開智者云著開著不同成天殊謗邪嗚呼往人不曉諸文壽量所以妄有破立誤無量人因法成怨將恐傳法利他之功不補非法毀人之失應知玄籤開垢衣內身即瓔珞長者自論同體相即以申經體之義苟非內身體一安能外用相即體雖相即用自炳然非謂內身體即便將劣應為勝是故法華佛身卑小劣應宛然而垢衣內體常即瓔珞體同用殊斯言有在幸希後德微細揣摩若淨名疏明法華中現尊勝者自指別序放光現相從劣現勝而為表彰耳以淨名疏正解別序現相表發故明華嚴二蘇法華四度現勝身光無量表說實相引法華證云我以相嚴身光明照世間為說實相印從劣現勝暫現表彰其意雖爾收光斂相攝勝從劣卑小宛然故妙玄明釋迦住生身而顯一豈是藏通異體生身乎是知文句明法華佛隱勝應實身施劣應權身及淨名疏從釋迦劣現尊勝有光明無邊乃是論於勝劣之用若舉用明體須指玄籤垢衣內身體同相即苟非勝劣同體安能隱勝現劣丈六宛然從劣現勝而為表彰乎故玄籤此文與淨名疏及文句記等體用須分不可混濫矣復次須知玄籤明開垢衣內身即是瓔珞衣瓔少殊內身不別乃是明於華嚴法華勝劣用異一實體同若文句云衣瓔有異人只是一隱顯有殊何關體別乃是明於華嚴鹿苑勝劣用異一實體同是則今昔時節雖分用異體同復何差別然則玄籤明開垢衣內身體即用異體同乃是跨節開權局此文句中明華嚴鹿苑衣瓔隱顯人一體同乃是明於佛意非今若非佛意機生尚隔豈知隱顯人一體同是故佛意跨節開權今昔雖分體同用異無二無別故得玄籤及以文句明乎今昔衣瓔殊異內身人一也釋籤云頗梨如意二珠頗梨西域寶名也亦云頗胝迦此翻水玉或云白珠大論云此寶出山窟中如意珠者天上勝寶狀如芥粟大論云出自佛舍利中若法沒盡時諸舍利皆悉變為如意珠也妙玄云如薩婆悉達等佛本行經淨飯上云太子生後諸事皆成宜字薩婆頗他悉陀此云一切義成又云悉達多此云財成彎弓說文云持弓關矢也釋籤云捔力正作角字角者試也調達亦云提婆達多又云達兜此云天熱以其生時人天心熱故也瞿夷此云明女太子外家去城八百里姓瞿夷氏舍夷長者名水光婦名月女有城居近其邊生女之時日將欲沒餘明照其家室內皆明因而字曰瞿夷者也太子有三夫人一曰瞿夷二曰耶輸三名鹿野擲象調達撲象殺之而太子擲于城外也華嚴日照三譬經云如來出世譬如日出先照一切諸大山王次照一切大山次照金剛寶山然後普照一切大地幽谷山川之幽邃也爾雅云水注川曰谿注谿曰谷也多跢跢字去聲小兒行也嘙啝韻中作㗻小兒相應也應字去聲嗅有薝蔔此云黃華樹華小而香或云旃簸迦又云占博迦樹形高大華赤甚香其氣逐風彌遠也薝字丁敢切應作瞻字又云恐畏歡喜厭離斷疑者三界皆苦苦故恐畏即苦諦也求涅槃樂樂故歡喜即滅諦也厭離苦因即集諦也斷疑即道諦也又三界苦即世界也歡喜即為人也厭離即對治也見諦斷疑即第一義也須彌此云安明又云蘇迷盧此翻妙高世人判楞伽或同華嚴或同法華具如止觀記已有二處引楞伽文判屬方等輔行第三云經云無位唯此一文上下諸文盡明次位然多辨通別少明藏圓若論智行通具四教以方等部多斥三藏位義復少又彼經別序世尊受請入楞伽城時以神通力作無量寶山山皆有一佛一一佛前皆有羅剎及以眾會十方國土皆於中現此與淨名合蓋現變何殊驗知彼部方等明矣輔行次云楞伽人云此經開權與法華義等若爾何故前後諸文皆斥二乘及以外道故第三云一切愚夫禪者謂二乘此斥三藏也二觀察禪謂離自他得人無我即通教也三真如禪謂知念不起即別教也四如來禪謂入佛地即圓教也故知彼經猶存權乘以大斥小豈與法華邪見嚴王五逆調達畜生龍女敗種二乘皆悉得記作佛是同耶楞伽山也城也此云不可往唯得通人乃能到耳方等如食時般若如禺中毗羅三昧經說四食時一旦時為諸天食二午時為三世佛食三日西為畜生食四日暮為鬼神食雜譬喻經云天人下施人王候之乃至禺中亦復寂然經律異相音疏云禺中者巳時也吳越春秋亦云禺中時春秋左傳昭公五年云日之數十故有十時亦當十位自王已下其二為公其三為卿注云日中當王食時當公平旦為卿鶴鳴為士夜半為皁人定為輿黃昏為𨽻日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公曠其位嬰兒女曰嬰男曰兒也如宋嚴觀法師與此太史官何承天等宋朝京師東安寺慧嚴道場寺慧觀二法師也引周公測影之法者此文出周禮中也周公周公旦也是文王之子武王之弟成王之叔成王幼周公攝位制禮作樂攝政四年欲求地中而營王城故以土圭用測日影得頴川陽城於是建都土圭長一尺五寸夏至日晝漏半立八尺之表表北得影尺有五寸影與土圭等此名地中鄭玄云日影於地千里而差一寸既有表影即餘陰也今云一尺二寸者二字恐誤矣顏氏家訓書證篇云尚書曰惟影響周禮云土圭測影影朝影夕孟子曰圖影失形莊子云蝄蜽問影如此等影字皆當為光景之景也凡陰景者因光而生故即為景淮南子呼為景柱廣雅云晷柱柱景並是也至晉世葛洪字苑傍始加彡而世間輙改治尚書周禮莊孟從葛洪字甚為失矣人不見之等僻者異見具如止觀義例中喻下去諸文亦應準此余甞讀清涼觀師華嚴演義鈔見其文云華嚴是頓頓法華是漸圓驗知止觀義例所斥以至三部記文所破即是清涼觀師之失耳學者知之叡法師僧叡法師什公弟子魏郡人年十八出家六十七卒捃拾捃居運切訓拾也捨收也斂也善星涅槃釋文云羅云庶兄也舊云善星無發迹處實是惡人此不然也佛有兩弟兩子各行善惡阿難行善調達行惡悉皆是權羅云行善善星為惡例知是權也遠法師云善星是佛堂弟庶兒故說為子也闡提古人云具含眾惡不知的翻唯河西道朗翻為極惡言極惡欲之邊者也古人多有異釋等亦如清涼觀師華嚴疏引於古德釋此略有十義一約處相入門以一處中有一切處故是故此天宮等本來在樹下故不須起然是用彼故說昇也二約相入門以一處入一切處故樹下徧天中亦不須起欲用天宮表法升進故云升也三由一切即一故天在樹下四由一即一切樹在天上五約佛身謂此樹下身即滿法界徧一切處則本來在彼不待起也機熟令見故云升也是故如來以法界身常在此即在彼也六約佛自在不思議解脫謂坐即是行住等在此即是在彼七約緣起相由門八約法性融通門九約表示顯法門十約成法界大會門余謂第一義中一尚不可何得十義紛紜乎世諦隨緣義理無量豈獨十義而定乎是故應以無生遣蕩方可辨其法界大用一家深趣與奪由茲苟其不爾執計難忘焉近代藏法師隋末唐初有嘉祥吉藏法師天后朝有法藏法師即賢首也今之所斥恐指法藏師耳此師與荊谿相去不遠故云近代也如法藏師起信疏引智論中說真如在有情中名為佛性在無情中名為法性金剛錍中正破此義以驗於今亦其然也又華嚴經云譬如真如無有少法而能壞亂令其少分非是覺悟善根回向亦復如是普令開悟一切諸法其心無量周遍法界者清涼觀師疏云如遍非情則有少分非是覺悟況經云佛性除於瓦石論云在非情數中名為法性住有情數中名為佛性明知非情非有覺性故應釋言以性從緣則情非情異為性亦殊如涅槃等泯緣從性則非覺非不覺本絕百非言亡四句若二性互融則無非覺悟演義鈔云然此段疏為遮妄執一切無情有佛性義就計此義自有淺深一謂精神化為草木情變非情等二說無情同一性故此釋太過失情無情壞於性相若以涅槃第一義空該通心境涅槃何以簡去瓦礫言無情耶余謂經文其意只是談乎真如無非覺悟豈有少法壞之令此真如非覺悟耶經意顯然而清涼疏記作如遍非情則有少分非覺悟釋者豈其然乎況涅槃瓦石無性自是權教緣了不遍之說智論真如在無情等其文本無何可援據乎故知疏文從如遍非情已下恐為未允從若二性互融已下義與前違余準本宗敢茲評品觀者恕之吾宗學人釋金剛錍不可不知此中之說故知賢首清涼未善談性圓頓安在彼既落非吾宗學者何得諂附哉釋迦姓也此云能仁鹿苑具在大論輔行委引如常所說故不注之閻浮提亦云剡浮又云贍部方志云瞻部此云輪王居處言四輪王所王雖有多少而居處必在南洲也古翻為好金地謂閻浮檀金在洲北岸海中金光浮出海上其傍乃有閻浮樹林其果甚大得神通人方到於彼也善見云樹高二千里圍二百里枝布方圓覆百由旬也釋迦譜云提者翻為洲也智論云此洲有五百小洲圍繞故名閻浮提矣若準西域記音中贍部此翻穢樹也阿僧祇此云無數此乃第五十二數也具如俱舍剎那此云一念也大遒遒即由自秋二切此遒字恐誤也應作猷字訓道也尚書序云以闡大猷故世時念世時念連言世時念者恐寫者誤而重書也或別有意乎伽耶此云城也十寶山華嚴二十一云雪山香山軻梨羅山仙聖山由乾陀山馬耳山尼民陀山斫迦羅山宿慧山蘇迷盧山上文云彌勒初以伏疑潛難等者此一段文並皆誤也準文句中應云文殊廣引先佛曾說法華故彌勒潛疑欲問諸佛赴緣人時各異古佛雖名法華今佛何必如此文殊即以第一偈斷云我見燈明佛等也當知此是彌勒潛疑文殊顯釋前文乃是文殊伏難彌勒顯釋耳又妙玄云二萬億燈明者准經無億字法華懺儀中亦云二萬億也釋籤又云餘二並是燈明之文者亦誤也應云餘二之中一是總諸佛章中之文也又云先列經者列字應作引字又云九三者應云十三也又云而判於他者判字應作簡字上下文中字有誤者准而思之不具出也肇云等僧肇法師京兆人也家貧傭書為業遂因繕寫乃得歷觀經史性好玄微留心莊老甞讀老子乃歎曰美則美矣然而棲神冥累之方未盡善也及見舊維摩經乃曰始知所歸矣師於什公作物不遷論不真空論般若無知論涅槃無名論什公見般若無知論歎云吾解不藉子但辭當相揖耳年三十一卒于長安今玄義所引即不真空論中文也然所引之詞與彼小異彼云夫以名求物物無當名之實以物求名名無得物之功乃至云名不當實實不當名名實無當萬物安在肇公四論者即今流行謂之肇論是也凡言云云如止觀第一記彼云未盡之皃也云者言也說文云象雲氣在天迴轉之形言之在口如雲潤物廣雅云云者有也下文尚有如雲之言也文句記亦云云云者象雲氣之分散如雲在天非可卒量也意言下未說者尚多如雲焉新舊醫如餘文說涅槃第二云譬如舊醫純用乳藥如彼外道唯說邪常客醫如來初令制乳如說無常成無常已還用真常新舊二乳乳名雖同邪正義別妙玄云大論云信行人等大論四十一云菩薩有二種一坐禪二誦經坐禪者觀身骨等諸分和合故名為身即以所觀為譬喻也言頭骨分和合故為頭也脚骨分和合故為脚也頭脚骨分和合故為身也一一推尋皆無根本此是常習常觀故以為喻也不坐禪者乃以草木枝葉華實而為喻矣釋籤云大論四句評聞慧者具如止觀第一記彼引大論九十三云有慧無多聞等四句與今玄義不殊但以有聞有智慧為第四句與今異耳如安息國邊地生人雖生中國不可教化根支不具不識義理著邪見等皆名人身牛也有聞有智慧者名字是聞觀行是慧故觀行即是第四句若直聞真不了二諦此聞非即若直暗證尚未及於有患無聞應非第四恐在第三句耳百論肇法師云論有百偈故以名焉牟子有說行之義如止觀第一記一字誤也文在第四現行印本止觀云人師國寶輔行云後漢靈帝崩獻帝時有牟子即蒼梧太守也深信佛法而斥莊老兼排儒流著論三卷三十七篇第二十一云問曰老子云知者不言言者不知今之沙門設知至道何不坐而行之空談是非豈非賊乎牟子曰老亦有言知而不言不可也不知不言愚人也能言不能行國之師也能行不能言國之用也能行能言國之寶也三品之內唯不能言不能行國之賊耳含於三觀如止觀第五卷破古師中意彼云有人難中論不生不滅未會深理中論師解云不不生不不滅以顯中道此解扶中而傷文失義何者龍樹之意兼通含別不生者不二十五有之生不滅者不三相之滅豈非藏通若生滅皆屬生涅槃皆屬滅雙遮二邊豈非含別若生滅是因緣生法即空假中即空故不生即假故不滅不生不滅即是中道按文解釋兼二含別顯中四義宛然矣妙玄云天竺或云身毒亦云身篤又云賢豆正云印度印度此云日月日月有千名即其一也良以西國聖賢相繼開悟眾生照臨於下其猶日月故以云焉或云賢豆本名因陀婆他那此云主處即天帝也以天帝所護故世久而號之耳言傳教者應云傳授也釋籤云但題云地持經者亦云地持論又名菩薩戒經或十卷或八卷南岳云胡漢此蓋准舊云胡漢耳若東隋已來但曰梵語不道胡言也開皇三寶錄云竊觀上代有經已來賢德筆受無不皆云譯胡為漢且九州地稱西方為天竺者即是總名或云身毒如梵稱此方為脂那真丹震旦也胡國乃是西方邊俗何有佛經號為胡語邪彼方稱梵者梵翻為淨劫初梵天下來於此今仍其本故曰梵音道安法師自號彌天亦云譯胡為漢此乃崑山之一礫未盡美也今南岳天台言胡漢者蓋是準舊所稱而已豈可升堂入室之人不知華梵乎輔行云但是西語咸曰胡音後因黃冠虗稱偽制近代方始胡梵甄分葱嶺已西皆曰梵種鐵門之左並是胡鄉南山四分戒疏云胡本雜戎之地梵唯真聖之都雪山已南三方距海周輪九萬厥名大夏金剛輪者地之中心凡聖大王同居此土若據邊鄙地為之傾此方中岳亦號中華且據軒轅局談中表故河圖云崑崙山東南方五千里號曰神州亦云赤縣爾雅云河出崑崙述其本也尚書禹貢云導河積石傳其末也漢書云張騫尋河至身毒國者語其遠途未窮其實也依佛經云四河本源香山所出分流四海知其始終矣俗云崑崙者經謂香山尋今行者河從雪山但雪山重沓叢雜難分冬夏積雪路非人往故郭璞云河源靈府山於天柱是也今詳諸說天柱其必地心心高則四河分汪斯一正也神州乃崑山東南明知方維兩別斯二正也大夏背山面海神州東南海曲西北無聞斯三正也凡聖大王治必地心此方未聞斯四正也此方黃帝神遊華胥王邵等解即大夏國李聃周穆皆登崑崙明知超勝聖賢同往斯五正也胡本山北由來歸漢今屬突厥不𨽻華胥又復天地初闢未有人物梵天降生此土仍傳本習書語於人是則天語天書唯居大夏自餘胡國所有書語互各不同此土書本但圖鳥迹方言雅鄭代別皆異豈比華胥楷定常古釋籤云破群那中阿含五十有破群那經乃是破群那比丘也成論亦言破群那比丘又第三十云善眼大師及諸弟子學道不虗得大果報如善眼大師如是破群那乃至薩哆富樓奚哆有無量弟子此破群那將是今之所謂邪前文云邪因謂梵天等者大經十六云所謂梵天自在天八臂天性時微塵法及非法是造化主梵即初禪主自在即二禪主八臂即護世主性謂冥初性時謂計時生萬物塵謂計微塵生麤果法及非法謂計善惡行生苦樂受各計所執為萬物因故云是造化主也快馬見鞭影如止觀第二記根利如快馬起惡如僻路聞說如鞭影雜阿含云有四種馬一者見鞭影即便驚悚隨御者意二者觸毛便能如上三者觸肉然後乃驚四者徹骨後方始覺金師之子如止觀第五記彼云身子目連差機說法乃引大經三十四云如我昔於波羅奈國時舍利弗教二弟子一令骨觀二令數息經歷年所皆不得定我即呵之汝二弟子其性各異一主浣衣應教骨觀一主金師金師之子應教數息莊嚴論云浣衣漸淨白如骨也善知韛囊宜數息也下文又指身子差機如止觀第七記者七字恐誤應知即是今之所指至于下文更不重引余甞讀大莊嚴論出曜經等乃是目連教二弟子而不悟道時舍利弗即為教之方能悟也此則經論不同不須和會又恐經論文有不同者言三十四者誤也文在二十四耳生生十因緣如止觀第五記止觀所列從無明至有支輔行云不言生死者此屬未來也今明從過至現以成機緣所以不取以宿種子在無明行中來至今世復依本習起愛取有復由現在聞法發習仰覆世界如華嚴舊經三十八云菩薩有十種出生智慧所謂入一切仰翻覆世界正住倒住世界等又新經第十七亦云妙世界即麤世界麤世界即妙世界仰世界即是覆世界覆世界即是仰世界等皆是寂靜門如止觀第二記二字誤也在第三記寶篋經云文殊師利於東方莊嚴國佛名光相現在說法有大聲聞名曰智燈因文殊問默而不答彼佛告文殊云可說法門令諸眾生得無上道文殊答云一切諸法皆是寂靜門妙玄云天親梵云婆藪槃豆也又云伐蘇畔度翻為世親言天親者即毗紐天居於此地菩薩乃是毗紐天之親也故以名焉舍利弗此云身子珠子等具如文句所辨訶梨䟦摩玄暢法師撰訶梨䟦摩傳云訶梨䟦摩宋云師子鎧佛泥洹後九百年出中天竺國婆羅門子初依薩婆多部出家學阿毗曇後乃背彼師宗造成實論昆勒此云篋藏也又雙非門即是車匿因之入道然此雙亦雙非兩論俱未來此但大論中標指其名耳請讀論文又下文云涅槃論未至此者然今藏中有涅槃論一卷又有本有今無論一卷迦旃延此云文飾應知舊翻新譯彼此方言若新譯者多黜舊翻為訛此亦未必然矣豈可新翻華梵俱正舊譯彼此皆訛哉理而評之梵音有五印之殊漢言有楚夏之別況復結集有內外教法有大小方土有廣略朝代有前後加以法師位次有高下故所見不同但隨機生善耳豈見翻譯言殊一向以新斥舊耶龍樹亦言龍猛梵云那伽閼剌樹那此云龍猛法苑引奘師西國傳云梵音正云龍猛舊訛略故云龍樹耳或云龍是華言樹是梵語譯之為猛故云龍猛也然則龍樹俱是華言以其初生在於樹下由龍成道故得其名佛去世後三百年出年七百歲人不知此謂佛滅後七百年出者誤也龍樹菩薩南天竺人是梵志種天聰奇悟事不再問本為外道有三朋友共學隱身入王宮內百有餘日懷妊者多三人被斬龍樹智深乃去王身七尺得免由此發心出家學道閻浮提內所有文字悉皆通達自謂已是一切智人大龍菩薩愍其若此即以神力接入大海九十日中通解諸經龍王語云天上諸經過此宮中百千萬倍於是龍樹遂修二智深悟無生無著梵云阿僧伽其因修行大乘空觀而得悟道無所著故遂以名焉文行誠信等者論語云子以四教文行忠信忠即誠也此四有形質可舉以教也尚書序云孔子定禮樂刪詩為三百篇書百篇修而不改曰定就而減削曰刪尚書又云垂裕後昆垂優足之道示後世也又云知人則哲能官人安民則慧又云罰弗及嗣賞延于世嗣亦世俱謂子也延及也父子罪不相及而及其賞也又云宥過無大刑故無小過誤犯者雖大必宥之不忌故犯者雖小必刑之釋籤云無性之文全同敗種唯識論第三引深密經云阿陀那識甚微細一切種子如瀑流我於凡愚不開演恐彼分別執為我論釋此云凡即無性愚即趣寂又攝論對法論等皆云定性二乘無性闡提三無二有此則豈非方等折挫敗種者乎五百羅漢造毗婆沙如止觀第六記六字誤也在第一記毗婆沙此云廣說又云五百說婆沙序品中問云誰造此論答曰佛世尊又問曰誰問誰答答曰或有說者舍利弗問世尊答又有說云五百羅漢問佛答釋迦滅後六百餘年北天竺國五百應真同共撰集世尊所說乃至云迦旃延子造等陳如姓也此云火器阿若者名也此云知無如文句辨因身子問等者身子問佛童子無言是何惡業佛言此大菩薩不可輕也無言童子即現神變如經具說又下文云並是一乘者應云三乘也憍尸迦本為人時姓也天帝之殊名耳過去世時波羅奈國有婆羅門姓憍尸迦好修福業與其同伴三十二人共為邑義尸迦命終為忉利主餘為臣宰馬鳴法苑引傳云佛去世後三百餘年出摩耶經云六百年出是東天竺婆羅門種馬鳴者其因說法國王繫馬於眾會前以草與馬馬因聽法垂淚忘食以由馬解菩薩法音故美之為馬鳴者也罽賓亦云迦濕彌羅此翻賤種因立淨人為王鄰國鄙而賤之是故云也西域記云末田地立伽藍於異國買賤人充使伇賤人自立為王諸國鄙之乃云賤種也脅比丘在胎六十年生而髮白由是立誓誓不屍臥故名之爾奢提羅婆夷秀羅未聞所翻八萬四千更有不同之相如止觀第一記小乘中如薩婆多云佛為眾生始終說法為一藏如是至于八萬有云一坐說法以為一藏有云半月說戒以為一藏有云佛自說六萬六千偈為一藏有云塵勞有八萬說八萬法藥且舉大數故云八萬具足須云八萬四千又報恩經第六云四十二字為一藏也法華疏云佛地有三百五十一一皆有十善對於四分六根故成八萬四千矣富樓那九旬化外道如止觀第六記寶篋經云富樓那入于三昧乃見百千尼乾當受化度即為說法反被輕笑三月之中無受化者爾時文殊師利化作五百異道師徒往尼乾所頂禮白云我承名德自遠而至汝是我師我是弟子願見哀納令我不見沙門瞿曇尼乾答曰善哉於是文殊師利威儀殊特讚說三寶亦讚尼乾令彼親附後於異時即便語云我等所行呪術經書若讚說時瞿曇功德入我經中來者乃是瞿曇真實功德乃至廣讚如來功德等于時五百外道得法眼淨八千外道發無上心當知此是先同後異迦絺那如止觀第九記禪法秘要經云阿難白佛此迦絺耶何因緣故五百比丘為其說法都無利益佛言此人過去燃燈佛時出家名為阿純難陀聰明多智憍慢放逸不修念處身壞命終墮黑闇地獄從獄出已生在龍中持戒力故乃得生天天壽終已來生人中持三藏力今得值佛以放逸故而不悟道佛乃為說不淨觀法九十日中爾乃成於阿羅漢果身子不度福增賢愚經云王舍城中有一長者名尸利苾提此翻福增年當百歲乃聞出家功德無量即自思惟我今何不於佛法中出家修道乃辭妻子我欲出家以其老耄大小輕之聞其出家家人歡喜乃作是言何以晚乎今正是時尸利苾提遂出本家往詣佛所欲求出家乃到竹林問諸比丘世尊大仙今在何所比丘答云世尊餘往教化不在又問次佛大師智慧上足為是誰邪比丘即示舍利弗是尸利苾提禮舍利弗而求出家時舍利弗觀此人已謂其年老學問坐禪營佐眾事皆悉不任乃告之曰汝今年老不得出家尸利苾提次問迦葉五百餘人皆悉不許尸利出家是時尸利苾提舉聲大哭我從生來無有大過何以於今不得出家于時世尊聞其聲已即現其前放大光明乃問福增汝何故哭其即以向白於世尊於是世尊種種慰喻乃令連度其出家由是為其說宿世事宿世之事大略如今釋籤中引福增知已修行乃得成阿羅漢初地有教道如止觀第三記或云五地習學世法八地得無功用道等覺一位或有或無破十二品無明稱為妙覺如是等說悉是權施以為入地之方便耳入地自證權門乃開豈有親證而存歷別耶妄生疣贅莊子外篇云附贅縣疣疣結病也釋名云疣丘也出皮上聚高如地之有丘然贅肉也最也聚也廣雅云疣也橫生一肉著體者也縣字平呼上文云亦應云華嚴文無略者前文已云乳教四妙與今不殊故知不須有此云也妙玄云泥洹亦言泥曰又名涅槃此土多翻正取滅度者也阿那波那婆沙二十云入息是阿那出息是般那又入息般那出息阿那先數入息以順生時次數出息以明死時準今家意隨人便宜先後無在摩訶衍此云大乘求那䟦摩求那䟦摩此云功德鎧是罽賓國三藏法師當于宋朝而至此土奉勑住祇洹寺奄然而化未終之前乃自作偈三十六行說證二果付與弟子阿沙羅者今之所引即偈中文欲知其偈可不引乎其偈文曰前頂禮三寶淨戒諸上座濁世多諂曲虗偽無誠信愚惑不識真懷嫉輕有德是以諸賢聖現世晦其迹我求那䟦摩命行盡時至所獲諸功德今當如實說不以諂曲心希望求名利為勸眾懈怠增長諸佛法大法力如是仁者咸諦聽我昔曠野中初觀於死屍肨脹蟲爛壞臭穢膿血流繫心緣彼處此身性如是常見此身相貪蛾不畏火如是無量種修習死屍觀放捨餘聞慧依止林樹間是夜專精進正觀常不忘境界恒在前獨對如明鏡如彼我亦然由是心寂靜轉極身明淨清涼止是樂增長大歡喜則生無著心變成骨鎻相白骨現在前朽壞肢節離白骨悉摩滅無垢智熾盛調伏思法相我時得如是身安極柔軟如是方便修勝進轉增長微塵念念滅壞色正念住是則身究竟何緣起貪欲知因諸妄生如魚吞鈎餌彼及無量壞念念觀磨滅知彼所依處從心猿猴起業及業報果依緣念念滅心所知種種是不別法相是則思慧念次第滿足修觀種種法相其心轉明了我於爾炎中明見四念處信行從事境攝心緣中住苦如熾然釰斯由渴愛轉愛盡如涅槃普見彼三界死炎所熾然形體極消瘦喜自樂方便身還漸充滿勝妙眾相生頂忍亦如是是我於心起真實正方便漸漸略境界寂滅樂增長得世第一法一念緣真諦次第法忍生是謂無漏道妄想及諸境名字悉遠離境界真諦義除惱獲清涼成就三昧果離垢清涼緣不涌亦不沒淨慧如明日湛然正安住純一寂滅相非我所宣說唯佛能證知那彼阿毗曇說五因緣果實義知修行迷者莫能見諸論各異端修行理無二偏執有是非達者無違諍修行眾妙相今我不宣說懼人起妄想誑惑諸世間於彼修利相我已說少分若彼明智者善知此緣起摩羅婆國界始得於聖果阿蘭若山寺道迹修遠離彼於師子國村名劫波利進修得二果是名斯陀含從是多留難障修離欲道見我修遠離知是處空閑咸生希有心利養競來集我見如火毒心生大厭離避亂浮于海闍婆及林邑業行風所吹隨緣至宋境於是諸國中隨力興佛法無問所應問諦了真實觀今此身滅盡寂若燈火滅今謂偈中云爾炎者此翻為所知也釋籤云天帝釋具云釋提桓因又云旃陀羅因陀羅此翻能作又云因陀羅網因陀羅此云主也網者天帝殿上結珠之網其網孔相望更為中表互作主伴也又翻光明具如諸文廣分別說千眼天本為人時聰明於一時中思千種義所以于今號為千眼天也舍脂夫舍脂者天帝婦名也婆蹉婆河西云翻為好嚴飾昔日好衣布施今得麗服也梵音又曰娑婆羅也婆佉婆此云無勝無過超諸天故金剛寶頂此從髻中明珠之名以立號也寶幢亦云勝幢天帝釋與阿脩羅戰而得勝乃立其幢名為勝幢也當分一音如止觀第一記引毗曇中佛為四王作聖語說四諦二解二不解又作毗陀語說一解一不解又作梨車語說四王俱解玅玄云道場觀宋朝京師道場寺慧觀法師也清河人俗姓崔弱歲出家諮稟遠師什公入關乃之什所訪覈異同研詳新舊宋元嘉年中卒年七十一會稽基齊朝山陰法華山慧基法師也吳國錢塘人幼而神悟師祇洹寺慧義法師基公撰法華疏三卷并注解諸經春秋八十五光宅雲梁朝光宅寺法雲法師也光宅者梁武帝潛龍時宅甞七日七夜放光帝曰非我所居乃捨為寺雲師依法華經立四乘教所謂臨門三車教此即權教也三乘四衢等賜教此則實教也雲師姓周義興陽羨人生時在草見雲氣滿室因以雲為名焉七歲出家更名法雲奉勑為光宅寺主雲師年在息慈雅尚經術於玅法華研精累思品酌義理始末昭覽乃往幽巖獨講斯經竪石為人松葉為拂自唱自導兼通難解所以垂名梁代者也甞於一寺講散此經忽感天華狀如飛雪滿空而下延于堂內升空不墜訖講方去儀同陳郡袁昂云有常供養僧學法雲師日夜發願望得慧解忽夢一僧云雲公燈明佛時已講此經那可卒敵也其夷陵縣漁人於網中得經一卷是泥洹四法品末題云宋元徽二年王寶勝造奉光宅寺法雲師以此勘之雲公年始十歲寺無光宅此乃靈瑞而預彰焉又梁武帝請雲公講勝鬘經竟夜便大雨即天監五年冬武帝求雨時也釋籤云誌公姓朱金城人少出家止京師道林寺修習禪慧至宋太始初乃有神異居止無定飲食無時髮長數寸執一錫杖杖頭乃挂剪刀及鏡其有神異具諸傳錄下文云今果下總結者恐誤應云今果下結也次即是下總結也關中即禹貢雍州之域東自同華略河而北西自岥隴原會極于北垂盡其地也漢書云漢興都關中是也鳩摩羅什此云童壽丘慈國人至下第三卷補注中委示其緣丘慈二字正作龜茲生即竺道生法師也本姓魏鉅鹿人生而頴悟值沙門竺法汰遂改俗歸依從師為姓故云竺道生也後入長安從什公受業乃喟然歎曰夫象以盡意得意則忘象言以詮理入理則言息於是乃立善不受報頓悟成佛又著二諦論佛性當有論法身無色論佛無淨土論應有緣論等籠舊說妙有淵旨而守文之徒多生嫌恨與奪之聲紛然俱起又六卷泥洹經先至京師生公剖析經理洞入幽微乃說闡提之人悉當成佛于時大眾以為邪說譏憤滋甚擯而遣之生公乃於眾前正容誓曰若我所說反於經義者請於現身而彰癘疾若與實相不違背者願捨壽時據師子座言竟拂衣而逝其後涅槃大本至此果云闡提悉有佛性生公知已乃卒于世是則生公冥符經說也大唐三藏奘法師至於西域以華請觀音像云若一切眾生實有佛性者惟所散華挂菩薩頸言已散華乃如其願今謂奘師若有生公之知則不應有此祝也儻祝之不吉將不信乎夫卜者決猶豫定嫌疑不疑何卜哉易云中心疑者其辭枝奘師非其枝乎然生公談闡提有性成佛奘師卜後方信以此二師比夫天台可同日而語哉古人尚云一闡提無云無情無未足可怪其此之謂也山家所立不思議境於一念中理具三千若依若正無非三諦三佛性矣又賢首清涼不可復引涅槃中緣了不徧牆壁非性帶權之談及謬據智論在無情中非佛性之語乃謂無情無佛性者幾許誤哉信知天台所立圓乘古今難及矣融道融法師也汲郡林慮人十二出家諮稟什師什師令講法華什自聽之喟然歎曰佛法之興融其人也春秋七十四卒於彭城也叡肇二師上文已注然而生叡并及嚴觀同學齊名時人評云生叡發天真嚴觀窪流得慧義彭亨進宼淵于默塞俗姓宼法名道淵也叡生獨彰天真獨秀之號者良以深造天真秀出群士故也肇什多附通意章安曰問古來傳譯什師命世升堂入室一肇而已肇作涅槃論世人翫味卷不釋手此復云何答曰高僧盛德日月在懷既不親承其門難見然其作論談大不存小非三藏也其言不涉界外非別圓也歸宗指極乃是通教之義耳委如涅槃玄義中辨玅玄云祇洹亦云祇陀又言祇樹亦云善多此翻勝氏即波斯匿王之太子也太子生時父王戰而得勝是故云也西域記云逝多此云勝林也寺基元屬太子須達買之造寺地基有樹太子留之而自捨焉故諸經云祇樹給孤獨園也毗盧遮那此云徧一切處也釋籤云矛盾如止觀第五記矛兵器也長二丈建於兵車也盾傍牌也楚人有賣矛盾者人來買矛即便語云此矛能壞千盾也人來買盾即便語云此盾能壞千矛也其買矛人猶在而買盾人又至其買矛人語賣者言還以汝矛而壞汝盾此則如何賣者無答自相違故引央掘經如止觀第七記央掘經云舍衛城北村名薩那婆羅門子名一切世間現少失其父厥年十二色力人相具足第一言央掘摩羅者即梵音耳此翻一切世間現也西域記云鴦窶利摩羅此翻指鬘央掘經第三云云何名為五所謂彼五根是則聲聞乘斯非摩訶衍所謂彼眼根於諸如來常決定分明見具足無減修乃至身根四句準眼可知但此四根於第三句第五字改云聞齅甞觸也恐煩文故略而不引言彼眼根者即九界也如來常者即佛界也決定分明者即照權實也具足無減修者即三諦圓備也眼根既爾餘四亦然也又玅玄云彌樓山者如下文句補注中辨趣義具如止觀第二記具引本文委釋大品云一切法趣一法大論兩文共釋此句初云云何菩薩為世間趣故發菩提心菩薩為眾生說色趣空乃至種智為眾生故說色非趣非不趣乃至種智次文云為眾生故說一切法趣空無相願是趣不過何以故是空無相中趣非趣不可得故初文以能趣為假具歷色心乃至種智故知具一切法即是假也所趣為空非趣非不趣為中次文以能從所為空是趣不過為假趣不趣不可得為中次乃況出云一切法趣色色尚不可得云何當有趣非趣等何以故一切法趣色能所皆假色不可得一切法亦不可得能所皆空趣不趣不可得即不住二邊正顯中道也學吾宗者熟思此文則於三千三諦具法等義如指諸掌豈可隨情不依聖教而自建立以訓人乎往者不可諫來者猶可追故茲示耳破心微塵如止觀第三記寶性論云有神通人見佛法滅以大千經卷藏一塵中後人破塵而出經卷又華嚴經如來性品云譬如有一經卷如大千界所有一切無不記錄二千小千須彌山王乃至色欲皆記其事時有一人具足天眼見此經卷在一塵內而作是念云何經卷在一塵內而不饒益一切眾生我當方便破塵出卷佛子如來智慧具足在於眾生身中為惑所覆不見不知如來天眼觀已而云善哉善哉云何如來在於身中而不覺知我當教彼悟茲聖道令離顛倒見如來性即令修習八聖道已見如來性增數之相略如止觀第六記止觀云一道為藥如一行三昧或二道謂定及智或三謂戒定慧或四謂四念處或五謂五力六念七覺八正九想十智如是乃至不可稱數也輔行云如增一中亦以增數明人天教故云以此方便了一法二從二法三從三四五六七八九十十一之法無不了又大經中亦從二法乃至十法猶依南岳通云十如清涼觀師謂南岳思大師三種讀此十如者三轉讀文自是天台而清凉云思大師者豈非誤哉豈非誤哉釋十法界名約三諦者具如止觀第五記現今印本即第四也止觀云法界者三義十數是能依法界是所依能所合稱故言十法界又此十法各各因各各果不相混濫故言十法界又此十法一一當體皆是法界故言十法界輔行云初番十字獨呼法界字合呼次番十法字合呼界字獨呼後番十法界三字合呼而此三番初約真諦作所依釋十數是假所依是空以能從所十法皆空是故此十以空法為界次番約俗諦作隔異釋十法差別名之為界是故十法各有界分後番約中道作法界釋十法無非真如法界三諦無形俱不可見然即假法可寄事辨即此假法即空即中空中二體二無二也心性不動假立中名亡泯三千假立空稱雖亡而存假立假號以至廣說具在止觀輔行記中不能委引然則三千三諦之義不思議境其旨微妙淺智奚知世人諍計由來未息余雖不敏甞撰三千論詮辨其義於茲欲言誠難備矣慈恩但立二諦不許三諦者得不違於諸經論乎下文云前二十行重頌廣略等者恐誤準文句中初十七行半頌長行後三行半略開三顯一動執生疑又云廣略二歎者亦誤應云雙歎雙釋央掘經中如來說偈第二卷中佛說偈言汝來央掘摩出家受三歸央掘摩羅說偈答言此乘是大乘說名無礙智乃至第三卷初從一法至十法偈畢佛云善哉央掘摩羅即成沙門稽首佛足成阿羅漢準央掘經央掘摩羅彈訶人天二乘菩薩以至文殊師利畢爾時如來顯示其本云南方去此六十二恒河沙剎土國名一切寶莊嚴佛名一切世間樂見上大精進如來應正等覺在世教化無有二乘純一大乘今央掘摩羅即彼佛也文殊師利乃是北方歡喜世界歡喜藏摩尼寶積佛也是故當知諸佛境界不可思議闍王具云阿闍世此云未生怨也如善相師具如止觀孫劉曹等第五記孫即孫權也字仲謀堅之子䇿之弟方大口目有精光據吳中年七十一在位三十一年劉即劉備也字玄德曹即曹橾也字孟德劉據西蜀曹據魏都漢末三人俱詣相師相者乃云孫劉有社稷之相曹公不蒙相者所記曹公知相者之不逮也乃褰衣以示之相者見已舉聲大哭天下鼎峙四海三分百姓荼毒荼苦菜也此乃引事以證先現之相耳瞿伽離寶積經云俱迦利此翻惡時者修性善惡如止觀第五廣如輔行具明修惡性惡學者知之今不委引習續不斷者自分因也俱舍名為同類因具如止觀第八業境中止觀第九云習名習續自分種子後念心起習續於前前念為因後念為果也俱舍名為同類因者第六云能作及俱有同類與相應徧行并異熟許因唯六種同類因者謂相似法與相似法為同類因如善五蘊與善五蘊染污與染污無記與無記如是展轉相望為同類因餘之五因如俱舍中今不具錄又復應知報因報果就異世明之前習因習果皆名報因此因牽來世果受五道身即是報果數人云報得鴿身是報果多婬是習果論人云鴿身多婬皆是報果婬由貪生貪是習果請將今文子細對當二乘既不生則無後報者中含二十七具如止觀第五記止觀第四明二乘十如中云既後有田中不生故無如是報輔行消釋不引中含之文今所指者良以義同中含之文故也曾撿中含彼梵行經中云云何知業有報謂或有業黑有黑報有業白有白報有業黑白黑白報有業不黑不白無報業業盡是謂知業有報也不黑不白無報者即二乘也輔行之中但引大經及以論文具在于彼又如五分律二十一云佛將耆域往於冢間示五人髑髏耆域徧叩而白佛言第一者生地獄中第二者生畜生中第三者生餓鬼中第四者生人中第五者生天上佛言皆如汝說又以一髑髏示之耆域三叩不知所生而白佛言我今不知此人生處佛告耆域此是羅漢髑髏無生處故當知此亦一乘無報之文也因緣如止觀第五文止觀云智慧莊嚴為因福德莊嚴為緣因緣有逆順順生死者有漏業為因愛取等為緣逆生死者以無漏正慧為因行行為緣俱損生破惑順界外生死亦以無漏慧為因無明等為緣若逆生死即以中道慧為因萬行為緣俱損變易生死因緣既爾餘者逆順準此可知亦合云發三菩提弘誓之心具如止觀第一卷即五略中第一發大心等文也文多今不錄之攝大乘云因緣生死等如止觀第七記攝大乘論師立七種生死一流來生死是迷真之始二反出生死是背妄之初三分段生死謂三界果報四方便生死謂入滅二乘五因緣生死謂初地已上六有後生死謂第十地十無後生死謂等覺如大瓔珞慧眼菩薩問文殊具如止觀第五記彼經第八慧眼菩薩問文殊言如來相好為有報邪無報邪文殊答言如來色身有報法身無報慧眼問曰貪欲內心淨獲大果六度之法非無相報云何而得成法身邪文殊答言如來法身有邪無邪慧眼曰色身是有法身是無如我觀察如來身者非報非無報據此應以四句分別謂色有報法無報事亦報亦無報理非報非無報故不應以無報而為定也下無升見上俱舍十一云離通力依他下無升見上論曰三十三天由自通力能從本處升夜摩天或依他謂得通者及上天眾接往夜摩所餘諸天升上例爾若來若至下見上天然下眼不能覩上界上地良由非其境界故也又云賢聖集者西方賢聖所集具在下藏之末也下文又云增一等者迦葉問云增一阿含獨出生三十七品及諸法餘四阿含亦出生乎阿難報言且置迦葉四阿含義一偈之中盡具佛法等餘如今文所引又下文云次破古者應云初文又二初正敘次破古也心法本妙如止觀云云重釋如虗空如止觀云云妙玄云借三種譬如止觀云云釋籤云若理若修若結若譬等已上四節所指之文並是一家微妙大義皆須得旨廣如止觀不思議境豈可以而具之哉是故學者人於茲委示使聖人之道冷然可見矣淨名滿中云說法等具如淨名疏止觀第一記略釋維摩略疏云不有不無中道法也凡夫有二乘無菩薩正觀中道方等為諸菩薩多說中道是故云也輔行云不有不無義通四教簡三存圓以因緣故諸法生者略疏云歎說法緣起之用也順界內無明因緣則二苦集生欲滅此故則有道滅界外准此始坐佛樹力降魔者坐此成佛故曰佛樹亦云元吉又云菩提初成道時詣此樹坐其菩提樹莖黃白枝葉青潤秋冬不凋如來滅度日其葉頓落魔恐成佛化我眷屬先遣三女八十億兵菩薩降之是故云也得甘露滅覺道成者見四諦理名得甘露正習俱盡故云滅也知常無常數及非數力無畏等名覺道成也妙玄云波羅柰亦云波羅柰又云婆羅痆斯此云江遶城也尸城具存應云拘尸那竭此云角城有三角故也又云位城或云茅城或云仙人城又以名國故云拘尸那國矣五眾生滅涅槃釋文十七云五眾即五陰也生滅即無常也釋籤云若委釋三假具如止觀第五記一因成假二相續假三相待假法塵對意根生一念心起即因成假前念後念次第不斷即相續假待餘無心知有此心即相待假當知此三約心而明也若約色明三假者先世行業託生父母得有此身即因成假從胎相續迄于皓首即相續假以此之身待於不身即相待假又約依報亦具三假如四微成柱即是因成時節改變相續不斷即是相續以此之柱待餘長短即是相待此之三假小乘名為隨事大乘名為隨理思之可見寰中如止觀第一記一字誤也文在第六王者封畿之內名為寰也今亦如是法界為域法王所都法王無偏理性無外受化契理名悟寰中若作此環如莊子注以圓環內空體無際名為環中三仙二天如止觀第十記一迦毗羅此云黃頭頭如金色二優樓僧佉此云休留仙三勒沙婆此云苦行此即三仙也一摩醯首羅此云大自在天二毗紐亦云韋紐亦云韋糅此云徧勝亦云遍淨又云遍悶此即二天也二十五諦如止觀第十記一冥初生覺亦云世性謂世間眾生由冥初而有即世間本性從此生覺即是中陰識也次則從覺生我心此是我慢之我非神我之我也又從我心生五塵五塵生五大謂四大及空塵細大從五大生十一根謂眼等根能覺知故名五知根手足口大小遺根能有用名五業根心能平等合前為十一根也一冥諦二生覺三我心餘有二十一合二十四諦此二十四諦即是我所皆依神我名為主諦成二十五也准涅槃釋文言二十五者其實性生二十四法能所合辨是故云二十五也釋文之中又以百論二十五諦與涅槃經辨別不同如彼委說今不煩引十二牽連增一四十云佛看比丘病已因責諸比丘曰汝為何事故出家為畏王事邪為捨十二牽連邪三世繫續故云牽連玄義中云有河洄澓等文出涅槃第三十卷釋籤謂之引瓔珞者更請撿之上文所言諸邪計中且舉初計者玄中自云非自在等等即等下世性無因故知不獨且舉初計又上文中此正下正釋釋中為二恐多一箇釋字又上文立義云始從無明終至實際為六種者其實須從十如至實際也又上文釋籤云智云導行者應云行云導行也上下文中請細詳度其間訛賺可以見者不復點出也犍度此云法聚略果及略因由中可比二如止觀第三記俱舍第九有此文也此二句上更有二句其二句云三煩惱二業七事亦名果釋曰無明愛取此三以煩惱為性行有此二以業為性識等五生老死二共成七此七以事為性良由惑業等五所依七事者也何故中際廣說因果開事為五惑為二也後際略果事但有二也前際略因惑唯一也由中際廣可以比度前後二際也妙玄云歌邏羅此云和合又凝滑父母不淨和合如蜜凝滑如酪此是初七日之相也阿浮陀亦云頞部陀此翻為皰結此是二七日於凝酪上生一皰結也卑尸亦云閇尸又云閇手此翻肉團此是三七日成其肉聚也若男則上闊下狹若女則上狹下闊伽那此云硬肉狀如溫石即四七日之相也波羅奢訶即五皰開張之相也乃至三十八七日玄義不能具說是故略云如是等也釋籤云俱舍亦云連縛等四剎那是其一也如止觀第七記第八記云俱舍婆沙具有四種十二因緣一剎那二連縛三分位四遠續後三只是三世因緣以約能順生後等受故開三耳若欲釋此名義具如止觀補注之中俱舍十二云百二十剎那為怛剎那量臘縛此六十此三十須臾奘師西國傳云剎那此云一念怛剎那此云一瞬須臾即俄頃之時耳又剎那者如壯士一疾彈指之時已有六十五剎那焉薄拘羅此云善容或偉形功德論云毗婆尸佛時有長者請佛及僧九十日中四事供養有一比丘來求乞藥長者問云何所患苦答云頭痛時長者言此必隔上有水仰攻其頭于時即以呵梨勒果施此比丘比丘服已病即除差是時長者即今薄拘羅也大經十四增數文同大經云或為眾生說一因緣所謂一切有為之法或說二種所謂因果或說三種煩惱業苦或說四種無明諸行生及老死或說五種受之與愛取有及生或說六種三世因果或說七種識與名色六入觸受及以愛取或說八種除無明行及生老死或說九種除於無明及以行識或說十一但除於生或時具說十二因緣次文云欲界十二等者大經二十五云一切眾生雖有如是十二因緣或有未具如歌羅邏時死則無十二從生乃至老死得具十二色界眾生無三種受三種觸三種愛無有老死亦得名為具足十二無色眾生無色乃至無有老死亦得名為具足十二毗婆闍婆提此云分別論也育多婆提此云相應論也又下文云無華無果謂無學者應云無餘也亦應更云少華有果謂學人無華有果謂有餘也妙玄云諸論即地論攝論等也阿梨耶此云藏識也破此如止觀即不思議境引地攝師而推破者也釋籤云四句求夢具如止觀第五文為依心故有夢依眠有夢心眠合故有夢離心眠故有夢邪當知作此四句求夢既皆叵得以四句推心法亦然也三種意生身如止觀第三記楞伽經云一入三昧樂意成身亦云正受即三四五地心寂不動也二覺法自性意成身即八地中普入佛剎也三種類無作意成身即了佛證法也成之與生並從果說此約通教及以接別竪判次位故也今山門家作意生故名為意生今家玄文並云在前三教者以通諸教釋義故也
