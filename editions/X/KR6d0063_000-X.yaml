body:
  text: 天台三大部補注序吾佛出世雖廣說諸經而本懷斯暢唯在於法華西城自阿難結集之後獨天親菩薩作論以通之然但約文申義舉其大略而斯經之大事教化之終始亦晦而未明東夏自羅什飜譯以來造疏消釋者流布縱橫異端非一惟陳隋二帝之師天台智者昔在靈山佛會親承後於大蘇道場證悟發揮妙旨幽贊上乘故以五義釋題四科文句九旬宣演明靜法門解行俱陳義觀兼舉真可謂行人之心鏡巨夜之明燈矣雖天竺之大論尚非其類況震旦之人師而能跂及故章安禪師歎曰斯文若墜將來可悲於是聿遵聖典記諸善言玄文止觀共三十卷時人謂之三大部者即斯是也文旨高遠理趣汪洋苟非亞聖之才派深析重調理剖判而三部之奧義何由可通乎惟荊谿禪師克荷斯道引而伸之推而廣之故有籤記及輔行焉辭尚體要匪同雕刻厥意欲令萬世之下人人開發如來之知見物物咸悟秘密之藏性耳有唐翰林學士梁敬之美云以文字而廣第一義諦即言說而詮解脫者不其然歟是以古今學佛之人鈎深索隱者莫不欽崇以為大訓矣甞試論之一家所傳三部之文及籤記等非但該括聖人一代三學之法抑亦牢籠性相二宗百家之說自非積學洞微洽聞遠見者則未可以率爾膚習傳授於人也余以顓蒙濫讀斯教卷舒鑽仰多歷年所若夫聖人之化源教法之根本則祖師之述作文義已詳矣今復云何更有所補然以妙經之中華梵詁訓大師或有闕而不釋者玄文止觀之內因緣事迹荊谿亦有略而未申者況復籤記及輔行等法相之互指援引之訛賺性相之異同古今之得失自章安荊谿以來星紀綿遠而弘通之士孰能精究得無壅滯乎由是不量淺末摘出大部之文仍博采群籍補其闕略注而顯之勒成一部分為一十四卷自備講道臨文既省撿尋又免迷謬耳儻於先聖之文粗有所益者亦可以流行于世翼助一家之道矣如曰不然以俟來哲天台三大部補注天台三大部補注條箇卷上第一卷台嶺毗檀事章安之事漢明夜夢等事御㝢事誕應事翻譯等事動則左吏書之立處之事慧皎法師撰高僧傳事大師代受法師講金字大品事三定三慧即三止三觀事台山三峯之事陳隨二勅請大師事四辨之事大師一期奇特事依俙髴之事鸖林之事止觀禪門淨名疏名有餘分事諮詢字義之事雪山童子聞半偈等事佛出家成道時節異說等事那由他之事本迹名十義之事三根互轉得利鈍名之事頭角聲聞之事文殊翻名之事積聚積要積字事大小乘八相之事五百由旬有三義事寶處與寶諸之事庠序之事通序五事或六事七事之事四種阿難三處事須陀洹翻名等事體字訓禮等事金剛藏說佛甚微等事體用相即之事如意珠之事悉達翻名之事調達翻名之事瞿夷翻名之事華嚴三譬之事薝蔔翻名之事楞伽經為何部耶事四食時等之事土圭用側日影之事華嚴頓頓法華漸圓立處事捃拾事善星闡提事不動寂場等古人多義事閻浮提之事十寶山之事肇公之事云云事新醫舊醫事菩薩有二種一坐禪二誦經事四句評聞慧事牟子之事天竺名義事胡漢事破群那事四馬事身子目連差機說法事華嚴仰覆世界之事文殊默然答之事天親之事舍利弗之事訶梨䟦摩之事昆勒之事迦旃延事龍樹之事無著之事五百羅漢造婆沙論事陳如之事憍尸迦事馬鳴之事罽賓之事八萬法藏更有不同之相事富樓那九旬化外道事迦絺那之事身子不度福增等事玄二下求那䟦摩之事佛為四王作四語事光宅法雲事誌公之事關中事羅什事道生法師之事祇洹之事矛盾之事鴦掘五根聲聞事大品一切法趣一法等事破心微塵之事三轉讀文自是天台事十法界名義之事習因習果等事佛耆域示五髑髏等事因緣有順逆二種事攝大乘論七種生死之事慧眼菩薩與文殊問答佛之相好有報無報事下無升見上事得甘露滅覺道成之事五眾生滅事三假之事三仙二天之事二十五諦事十二牽連之事略果及略因等事胎內五位事四種十二因緣事大經增數之事四句求夢事三種意生身事第二卷寶篋經之事毗伽羅論之事玄三下四種四諦立處事摩訶狗絺羅之事四食之事頭陀之事諍二諦共墮地獄事菩薩所離五障事佛果出二諦外事古來二十三家明二諦義之事五百身因事五種世法之事會接同異事弄引之事僻執舌本爛人之事毀法毀佛同等事八不淨事真丹之事一止三止一觀等事別教約行約說教證事五行具五法并三物等事爾雅名義事張楷作霧欒巴吐雲事葛仙投錢井呪飛出事捫模事毗尼之事婆沙四評家事三藏佛三十四心斷結事境智之四句事不次第五眼事超越三昧事信力堅固位事伽頻伽鳥譬事三藏菩薩如毒器事煩惱障智障事玄四下孤獨寡鰥事五部律之事四大四性叵得之事五熱事落叉事俱胝之事那庾多之事繫緣止一念觀事白四羯磨事性戒遮戒事戒法等事六十二見事麤住細住欲界定等之事八聖種之事三十六物不淨事特勝通明名義之事一身具天地等事六欲事觀練熏修事成論人云色是無教等事三苦八苦事大經爪上土等事通菩薩淨佛國土事三種慈悲事雙樹枯榮事首楞嚴之事婆藪墮獄所以事八萬諸天因緣事釋迦菩薩曾六牙白象事遞推為尊之事七善之事肇云仰攀等事朝三暮四等事路伽耶逆路伽耶之事旃陀羅之事十八空事法身度生如修羅琴事三摩地事善法堂名義事四果羅漢有九種事順現業等事滅盡定之事遊戲神通事地持中六住之事玄五下淨名經悲田敬田等事三種之施之事薩婆若此云一切智事十梵行事斵輪人等之事開廢廢開次第事如來藏等事大圓境智等四智之事儡同之事安置諸子秘密藏中之事玄六下五百群賊得法眼事月蓋曲躬等事慈童女因緣事諸法般若三十六句事毒皷等事六通事無記化化之事神無方所等事第三卷乘戒四句事并乘戒體之事事理兩戒各三品事俱舍明數之事赤目大魚因緣之事觀心十二部經之事五比丘事太子所乘犍陟事天帝之事調達本事菩薩立處事阿闍世是不動菩薩之事波旬之事就法華會主破四明之事就觀行明五逆事如救頭然因緣事玄七下就天器飯色四土相望十差別事離車之事十六十二惡律儀之事阿彌陀身尊特異義之事佛背痛病患因緣之事佛北首臥因緣之事大經明過去常法華明未來常文事阿䟦致之事今經蓮華金光明法體譬喻事伏犧造八卦等事迷中有佛性譬雪山之藥之事玄八下名身句身文身之事譯經有失三不易事外典五經六七九經事三墳五典之事編簡䇿牘等事天文地理事五行事社稷之事張陵為大蟒所吞嵆康為鐘會所讚等事長爪梵志之事以金錍決其眼瞙等事迷中佛性如石中金等事力士額珠譬事六群之事玄九下佛法有諍處無諍處事冥初生覺之事周璞鄭璞事三德縱橫事二輪二翼等事長者譬佛諸牛喻教等事三藏生法二空之事遠龍印三師之事曹娥事玄十下阡陌之事四阿含名義之事劣三修邪三修等事十仙之事荃之事華嚴法華勝劣事華嚴法華不同十義事高麗九夷之事布師卒後屈三指事諸家判教不同事迦留陀夷埋馬糞事佛性五種名有事佛九惱十惱事八大聲聞八大菩薩事提謂經真偽事六因四緣事大品十喻之事大小乘不許肉食之事八術之事華嚴經本數之事于闐王之事凞連河事身子先目連後入滅事野馬者塵埃等事第四卷文句一下姚秦三藏羅什等事付連理樹之事翻譯名義等事名句文等之事繁芿之事卛爾之事樞楗之事學者養宮之事涅槃經南本北本之事安公三段講說之事梵網之事佛說散華貫華之事阿含名義事鏡中之事論法華判段事江東瑤事雷同之事鑽仰之事岐道逵徑之事過不及之事易云其臭如蘭事華嚴七處八會九會等事篇字義事信宿之事守株之事無緣慈悲之事九轍法師之事筌蹄事去伽耶城等事指掌之事華嚴經十種三世之事師子奮迅之事正像年數不同事大經嬰兒之事臭香覺觸瞪視等事白四之事千車共轍萬流鹹會事佛臨滅時阿泥樓逗大眾勸問事百論名義之事四悉且名義事淨土穢土開三顯一不同事阿難非不傳秘等事根有二種等事聲色法三經之事檀行十事之事聞不聞等四句之事時名有二種等之事離車之事二無知事圓佛并法華已前三佛離明等事四佛體同用殊事通教佛之事本因果妙等之事料簡名義等事佛住之事首楞嚴事迦毗羅事波羅奈事楞伽事四無常偈等事婆羅林事晝夜須臾事尼與僧佛不同住等事楞伽五種性等事三念處事四韋陀之事五繫有二種事四民之事四魔八魔十魔之事佛坐樹下時食乳糜等事天竺印度等名義事六通中三立明名三不立明名事付明通意別事四邪命之事約理性一切眾生菩提事往佛山中為五比丘作供食事供佛福輕供經及供持經者福重事邊際定力入變易事八自在八神變名義等事佛弟子偏好機多事二仙等之事五比丘事聚落之事機微可發事客塵之事河圖之事五比丘并舍利弗目連等出家得道時節事十二遊經名義之事畢鉢羅樹事十六大國事閻浮旦金之事迦蘭陀事阿練若十種功德事四神足定事呵梨勒果之事祇桓之事蠕動之事身子右目連左事文二下仿佯之事𡶅峨之事霹𮦷之事優曇華事瞿伽離之事維那之事舍羅之事提婆五法事眾生瑕穢立戒等事耆域之事得勝堂之事目連不窮佛聲事佛求侍者心在阿難等事十八變之事第五卷阿那律天眼修因之事闍維事塔婆異名事迦旃延度億耳因緣事槃特事前三教治見惑與圓教治見異事草創之事二竺道生之事阿那律空器百味具足因緣事那律不眠願事迦絺那之事阿那半頭天眼之事佛於陶師家為比丘說法事佛噉馬麥因緣之事二鬼爭屍因緣事金藏經事謗支佛墮三途等緣事般舟三昧事畢陵慢緣之事薄拘羅五不死因緣之事流沙事五戒經五品事淨飯令出家釋種數異說事調達阿難等生日并長事善覺八女名之事佛步行所以事佛令難陀發心方便事人行理三則三知識事無諍三昧之事卒土之事輪王乘輪寶周旋四方之事宗廟社稷事目連騰三願等事師子狀之事阿難恐離車世王有怨河中入滅事羅云六年住胎緣事歡喜丸之事居士之事沙彌此云息慈事佛出家成道異說之事定光名義并買華等事十六羅漢之事十八人有學九人無學事華嚴十種六根事耶輸明女名義事羅漢四智事佛三十二瑞應事從師請業事分庭抗禮之事座廗并取與之事偏圓約法權實約教事涅槃經贖命重寶緣之事淨土出世佛說涅槃經不事月上無垢等事波離此云上首事金光明經列大小人不事五障五功德之事藏教三不退位數成論異事法相宗五次第位事瑜伽此云相應等事唯識名義事為字事四十二字事文殊名義事七菩薩之名義之事國王見象師調象慈心生緣事賢劫出世佛之事婆藪從地獄來等事漚和之事三十三天名事賢劫名義之事四天王所領八鬼之事二十八部之事十八梵王等事光音天名義事天竺四大河之事若干之事般遮于瑟之事十寶山事樂乾闥婆之事五孝切他師五角切今家彌天安師權者事羅什權者食針等事四道攝修羅事五屍繫繫五處之事五性并諸法種子等事水火精入身懷妊事日蝕名義事鯤化為鵬等事八邪八風八倒之事闍王入賓吒羅地獄等事別圓位忍事涅槃經付屬人等事觀行五逆之事文三下天台不用天親釋一兩處事涅槃論謗法文事三利之事諡法事今經比丘眾中在菩薩文不事淨名經七淨華之事阿僧祇劫有二種事法華論立十七異名事法身百非事聲光集眾事雲公所感雲母事優婆塞優婆夷事斟酌名義事阿迦尼吒天事六趣眾生事舍利并塔翻名事栴檀香之事師子吼之事天台三大部補注條箇卷下第六卷大種事苦際事小乘十方有佛不事七寶事車者舍也等事輦輿之事欄楯事華蓋之事軒飾之事於大乘六度互相攝事龍受佛衣免鳥難之事四教降魔相等事蒙光得益之事睡眠名義事五蓋之事大小乘俱不許肉食事迦葉袈裟直十萬兩金等事袈裟名義之事陳女衣直五錢事縱橫之事帷幕之事波利質多羅樹之事倉卒之事踟蹰躊躇之事猶豫之事標幟之事十三難不受小戒七遮逆不受大戒事十號開合事香口比丘佛法讚歎功德事以日月燈二能顯佛能之事後分華嚴三乘作佛如來久成有不事楞伽聲聞授記事十種發心事方等聲聞授記之事然燈之事弟子事瑠璃頗梨等事波羅奢華事聯翩事阿黨之事如理如量智事古一代立半滿三時四時四宗等事嘉祥三種法輪等事三種四種方便之事本迹法身淺深有不事方便品體事破癈開會等十義事聲聞支佛菩薩為三菩提事加趺座事區區事門有種種事四意趣事實智事四等事四辨八音十力四無所畏等事八背捨八解脫事三三昧事性體性量性具等事五道各有自爾力事淫祀之事文四下身子初遇頞得道事大經不解我意說事近代所計不同事佛下天時諸支佛入滅事佛世獨覺有無事喜根勝意事十種大心事輪王出世時大海有路事勤學不如擇師之事四依師位等事熈連事十七地論事十信到十地云五凡夫事大論四智因果總別之事他謂法華會於二乘不開菩薩等事智慧二字因果通不通事三乘并佛配五味事十種三世事十六知見事三世五陰各計四句等事本劫本見等六十二句事大經舊醫客醫譬事三假事行陰事阿閦國女無邪欲等事學不師安義不中難之事二乘為一百為四百等之事小乘十方佛有無之事婆娑云異生有五等事大論并大經十戒事善惡無定之事九部十二部名義之事男女受胎相事他師云法華明三乘事起舍利塔并三塔等德之事第七卷關中之事合抱之木生於毫末等之事大經六阿事三因佛性有無人等事玫瑰之事沈水香之事木樒之事童子事二王造佛像等事石像感應之事白虎通之事簫笛琴箜篌琵琶鐃銅鈸事長安之事八轉聲等事鈴聲比丘緣事施香華功德事禮佛塔得十功德之事南無事那先之事彌勒下生時事龍華樹事表幟之事盲人觸象各各解等事三德具四德等事犛牛之事佛眼天眼等事婆沙云善根有三種事順現順生業等事六道中有之相事閻王事經行五處五益事三世因緣譬華果釋事歌利王之事首陀會事色界唯無香味等事帝獻方石天開淥池事文五下二達乃至九達事籠樊之事是我等咎非世尊事眾生事八十神等事為字事波旬并魔之事草創之事六和敬事身子佛號云華光事明行足之事八交道事正像末之事菩薩有十力事大品時三百比丘佛上衣等事華嚴十事轉法輪之事圓音大小並陳之事大經說八喻等事聚落事三皇五帝名義事文帝夢等事囹圄之事帷帳折衝等事九十六道邪正事無色界有細色事八苦等事舊云果報新云異熟事夜光珠等事七辯二十四辨事乘壞驢車正南而游之事五分法身事信行法行事四答事婆伽婆事三十六物之事七慢八慢之事守宮事同類因等流果等事六十二見事七寶譬七科道品事三明六通之事三藏不退數成不同事五種性事文六下新云具壽舊云慧命事荊谿片新譯之事十六行對三空等事三解脫門之事華嚴教主舍那有二義事七科六度收盡事子息之事鄰里之事第八卷涅槃法華十六同異事三聚戒之事加被之事勞謙之事佛九惱等事并因緣事七覺八正前後事華嚴海空有二義事某甲事三苦通別之事示教利喜事牛頭栴檀事文七下世藥有三品事龍興慶雲之事習報因果事密雲之事十號之事為字事大品中佛放光照地獄等事住無住本立一切法之事五無間業因感果二種之事婆沙善根有三事須扇多佛多寶佛事佛菩薩之十身事四無量四品事卒土事五穀之事并百穀精進通別事羅漢增壽變易之事獨覺緣覺之事首楞嚴四種授記之事瓔珞經授帝釋記之事佛六年苦行不知草生等事九拜之事迦陵頻伽之事華嚴十種六根之事三脫對三念事童子沙彌之事諷誦之事權行聲聞不妨塵劫之事四意趣之事四清淨四不壞之事定性入滅界外受生等事七種生死之事三生六十劫四生百劫之事阿僧祇有二說事十仙之事寶渚之事發軫之事權智謂車是無等事有水曰池無水曰隍之事總持之園苑等事微妙淨法身之事二乘知見止齊八萬之事今經四卷為字之事六度互相收之事無女人事土等事乘戒緩急生淨穢土之事生安養三業九品之事身子示嗔等事周利槃特事摩尼珠十種瑩治之事勝幡事羅云密行之事第九卷文八下凞連八恒沙之事十乘十境及破徧橫竪之事誦經觀法事五種眷屬之事多聞智慧四句等事八福田之事持經者被為如來荷擔事就祕藏有今昔異事怨嫉之事四信之事巧拙之事爾乃之事法華教主異義事中論歸教序之八不事一家章疏經與觀相應等事盤桓之事三變土田之事八萬四千法藏之事黃門有五事梁武帝捨身土事十度六度開合之事於西方生蓮生胎生化生之事大論云蓮華有三事初變時有龍宮等事深達罪福相等文釋義事南方無垢之事魔梵釋女成佛之事善覺之八女等事賓頭盧迎王等事大經一切江河必有回曲等事性相二空之事六諦二十五諦之事三罵法之事文九下寂光之事本時弟子本迹身相之事師子奮迅有二義事乘妙者三法妙之事問無益之事否事自受用報云應身事法華教主等事上有下機等事佛性有五名事年記之事佛入胎相大小乘不同事醫曉八種術事功德之事第十卷文十下五法之事調柔地事佛最初顯本否之事五篇七聚事并八萬齊之事大小乘戒制法不同事鳥鼠之事八多羅樹之事好堅樹迦陵頻伽之事今經第六為字事六道胎卵等事彌樓山事命命鳥事燒香有種種事輪王七寶事五佛性事不輕忍難滅前世罪事八自在之事慈恩安國秀公等事普賢色身三昧三義事勝熱赴火尼乾投嚴事小乘制燒身行等事十寶山之事外道計大梵為人父事放大人相等事今經第七為字事十六法華三昧異名事今經教主并弟子事方安壽普四要品事睢辨口賜金等事觀音應驗之事三十二身事南山與天神問答事譬喻經云有人初持戒後癈等事十八變事一眼之龜事知識事少欲知足之事第十一卷止一卷下輔行傳弘之事南山稱歎南岳天台之文之事光道王道之事濫觴之事定光佛事青出藍等事五人捨去太子之事見婬女屠裂進得三果事馬鳴歸富那奢等事悔罪如投湯水等事龍樹之事末田地事華氏城事文帝隨作隋事百錄之事八觸之事獨步之事五處止心事關中影法師事青目注之事波頗三藏事因緣所生法等文事天台傳南岳三種止觀事應天三台事是身無知如草木瓦礫等事博地之事為四王作異語事佛六十四音等事數人數論事十種三世事修發不同一十六句等事五法會難事三十六句感應事性重戒機嫌戒事三品寂光事知恩報恩者發心利益事發菩提心緣多事毗首羯磨之事優填王作佛像事通教佛之事破四明等事四佛體同用殊事耆婆見草皆藥等事迹中四出事六群比丘之事舊云果報新云異熟之事寶梁經等事受信施為肉山事受信施為菌事小乘制婬為始大乘不殺為始等事并大小乘戒事十義釋普事驪龍之事九為老陽事止二下三千八萬威儀事十號開合不同事五逆次第後重事總意四句事䟦陀和事不受別請等事小乘制身口大乘制意事心念有三等事三十二相條因事無上菩提七無上事菩薩地持經亦名地持論事持戒者飢破戒者飽等事三昧功德事六夢事齊戒事二十四戒事釋尊唐土來事海此岸栴檀事出家持八重在家持六重事寶梁經破未得謂得者事大乘人悔罪悟道不人事第十二卷今經并持經者供功德深事分衛事師子吼事波利樹譬佛弟子事三十五佛事滅重罪為清淨律師事一支一境雖復已壞等事識見根見事有四善事墮惡道事央掘殺生條因事五無間事無記事辛有伊川等事張賓元嵩事漢書有九流事遠師抗帝論等事六合者天地四方之事黃龍陽事阿梨吒比丘惡見等事無根信事不曉世語悟深理人等事以九義立一瞿聲等事史遷六氏等事止三下就名有因緣無因緣事三涅槃等事二十三人各各釋二諦義事無脂肥羊等事五十二數名阿僧祇事三藏菩薩帶結願生等事他謂成論義通大乘事婆沙云何不立其掉纏耶事三煩惱二業事理性無次位等事五法三自性事五行事律歷事正量部事大經去菩薩觀土為金事十異九迷十喻九箴等之事逍遙遊事慧立難道士等事開廢廢開之事制多之事止四下三歸功德事薩多七種受戒等事摩得勒伽十種受戒事迦尸國女心出家等事六和十利事不善心等名持戒事四時捨戒事大小乘戒體事第十三卷五篇七聚等事浮囊之事面王比丘事檀越此云施主事三衣事機嫌戒性重戒事八不淨事失性有五等事猶豫事隴右事禪鎮事野干為天帝說法事兩種五鹽事止五弘五上下六韜事臣如檀子等事敬獼猴為帝釋等事不達他根性純教乳藥之事七慢八慢事通大地十大善地等事大乘中遍行五等事未到定事九想八念事五屍五處事須彌芥子相入事表生表作無作事阿伽陀藥事春蒐夏苗等事介爾景福事指南事以三千為指南等事佛性不名一法等事天親龍樹內鑒事均山毫等事秋毫事如猛風吹兜羅𣭞事八風對八卦等事無等等明呪等事五佛性事月增咸事十四難事三無為事優陀那風觸七處之事四微事楞伽經說龍樹事大經十一空事卍字事止六下無色有色等事第十四卷九種般之事十地功德事馬星為身子說法事加被事惡口車匿依梵法治事佛滿三僧祇事釋迦超劫異說事羅旬喻乞食不得等事五部律事五經對五戒事五戒之事五明事五神事六藝事風俗事法華已前無記小久成事圓三諦事十胡五印等事外道通力之事五兵事葵霍隨日芭蕉因雷事止七下九州之事四海四荒事方便有五不善等事宗教有無事起八聖種心生厭離事撰擇長者發心出家事七藏處事空界空故食得出入事不相應行有十四事阿賴耶識事顏氏家訓等事就三身四明從義異義事名通義圓名別義圓事葱嶺鉄門并神州事毒皷譬事分別色無分別色事三無性事鹽梅事背者敗也事巫覡之事蛇影入杯中事三因四緣事五諫事用空明善惡十法事俓侹之事二十五三昧頌事十二時獸之事嘉平請祀事五停門各開三事五輪禪事無想定滅盡定異事八術事十醫之事五分法身滅不滅事二乘十地事龜有十種事六芝事蚤異名事野葛之事天台三大部補注條箇終
