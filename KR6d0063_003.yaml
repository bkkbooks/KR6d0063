body:
  text: 妙玄釋籤永嘉沙門釋從義撰釋籤云然乘戒四句文在大經如止觀第二記淨名疏非行非坐三昧末云大經云若無清淨持戒之人僧則損減若有清淨持戒之人則不失本戒善男子於乘緩者乃名為緩於戒緩者不名為緩乃至云正意欲令乘戒俱急等淨名疏云一戒乘俱急二戒緩乘急三戒急乘緩四乘戒俱緩通論一切善法一切觀行皆是乘戒別論三歸五戒十善八齋出家律儀乃至定共能防身口遮惡道果得人天報名之為戒聞經生解觀智推尋諦緣度等無生理智能破惑纍運出三界名之為乘彼中備云文多不録為上中下如止觀第四卷中止觀第三云持事戒有三品上品得天報中品得人報下品得修羅報持理戒空假中三品各有上中下即空三品者下品聲聞中品緣覺上品通教菩薩即假三品者下品三藏菩薩中品通教出假菩薩上品別教菩薩即中三品者下品別教菩薩中品圓教菩薩上品是佛又云大經第六呼安養者檢文未見然第一卷及三十二只云極樂及安樂世界耳又云一觀三品九品理觀者即乘緩急也事戒緩急者戒急三品即天人修羅也戒緩三品即三惡道也又下文云次神通後明為來意也者也字恐須作者字又玄義下文云名味者如下文補注中辨又下文云託本生等名本事經者恐文隔句相對言耳更請詳之且準俱舍明十六重彼明五十二數初則數始為一十一為十十十為百十百為千十千為萬十萬為洛叉十洛叉為度洛叉十度洛叉為俱胝十俱胝為末陀十末陀為阿庾多十阿庾多為大阿庾多十大阿庾多為那庾多十那庾多為大那庾多十大那庾多為鉢羅庾多十鉢羅庾多為大鉢羅庾多十大鉢羅庾多為矜羯羅此即十六也今文中云億兆等者謹按算經皇帝為數法有十等謂億兆京秭垓壤溝澗正載及論其用乃有三等謂上中下下數十萬曰億中數百萬曰億上數萬萬曰億所言秭者千億也載者言地不能載也故云十千為萬十萬為億十億為兆十兆百億為京十京千億為秭也矜羯羅者亦𠷐迦羅又甄迦羅十矜羯羅為大矜羯羅十大矜羯羅為頻跋羅頻跋羅亦頻婆羅十頻跋羅為大頻跋羅十大頻跋羅為阿芻婆阿芻婆亦阿閦婆十阿芻婆為大阿芻婆十大阿芻婆為毗婆訶十毗婆訶為大毗婆訶十大毗婆訶為嗢蹭伽十嗢蹭伽為大嗢蹭伽十大嗢蹭伽為婆喝那十婆喝那為大婆喝那十大婆喝那為地致婆十地致婆為大地致婆十大地致婆為醯都十醯都為大醯都十大醯都為羯臘縛十羯臘縛為大羯臘縛十大羯臘縛為印達羅十印達羅為大印達羅十大印達羅為三磨鉢耽十三磨鉢耽為大三磨鉢耽十大三磨鉢耽為揭底十揭底為大揭底十大揭底為拈筏羅闍十拈筏羅闍為大拈筏羅闍十大拈筏羅闍為姥達羅十姥達羅為大姥達羅十大姥達羅為跋藍十跋藍為大跋藍十大跋藍為珊若十珊若為大珊若十大珊若為毗步多十毗步多為大毗步多十大毗步多跋為羅攙十跋羅攙為大跋羅攙十大跋羅攙為阿僧企耶故云五十二有六十數忘失餘八又下文云初頌意中二者恐誤應云於中為二也又玄義云若頌心所念法相則名偈陀經者恐誤應云祇夜經更請詳之又復下去分科之中文多訛略更不具出宜自思之妙玄云伊帝目多伽目諸文作曰亦作越又釋籤云辜負者辜罪也負背恩忘德也若李陵與蘇武書云孤負陵心孤獨也又云陵雖孤恩漢亦負德也爴字經音云檢諸字書無如此字若按字義應作攫居碧九縛二切説文云爪持也若作擭字乙擭切手取也或云古麥切掌取也字亦作摑又下文云疏中略辨者文句云佛昔飢世化為亦目大魚閇氣不喘示為死相木工五人先斫魚肉即五比丘也海中自刺者如云菩薩為大薩他婆度大海水惡風吹船語賈人言汝捉我髮我當度汝諸人捉已以刀自殺大海水法不宿死尸即時疾風吹至岸上大慈如是豈非菩薩釋籤云是老死誰老死為人法二空如止觀第六記大論引雜阿含云十二因緣從無明至老死若有人言是老死若言誰老死皆生邪見乃至無明亦復如是若説無誰老死是名生空若説無是老死是名法空乃至無明亦復如是又下文云十二通大者應云通小也大經十四者第十五云無所得者名方等經有所得者名十一部菩薩不修純説方等大乘經典又下文云望於等者應云妄於也妙玄云儒林史記有儒林傳太史公云自孔子卒庠序不行唯建元元狩之間文辭粲如也故作儒林傳又云微塵數品者品字誤也當為偈字如下文補注中又云順耳者耳字誤也當為情字又云身子問佛佛答諸佛智慧門者此舉廣開以顯略耳又云應用觀心十二部經別有小卷流行者文云經者由也心亦由也諸法由心造也直就觀心即空假中名修多羅復重觀之名祇夜觀心空假中能發三智名授記觀心即假空亦空名不重頌觀心空假中非前思後覺名無問自説觀心緣生如物生滅即空假中名譬喻觀心始末即空假中名本事觀心十界地獄乃至諸佛本生即空假中名本生觀心空假中防非止惡名因緣觀心空假中橫竪無不周遍名方廣觀心空假中非世所有名未曾有觀心何故空從緣生故何故假但名字故何故中非二邊故名論義已上略引大意耳又前文明五門中引淨名旃延五義等者疏云旃延因有無入道還約有無以説五義生即是有滅即是無所説既是生滅有無能説必爾故云無以生滅心行説實相法又聲聞四門五義皆是折法生滅有無若訶破旃延有無從容明五義者應云諸法畢竟不生不滅是無常義何得有無從容是無常義耶破下四義類此可知釋籤云五人至具如疏釋頞亦阿濕卑又阿説示此云馬勝亦馬師本行集云阿奢踰時此云調馬又云阿輸波踰祇多此云馬星甘露飯王二子一婆波二跋提本行集云跋提梨迦此云小賢婆沙波此云起氣斛飯王二子一摩訶男二阿那律本行集云摩訶那摩此云大名阿那律此云無貧若準文句第一列五人者一拘鄰二頞三跋提亦名摩男四十力迦葉五拘利太子記云頞摩男拘利三是父親餘二母親也若準文句第五乃列陳如頞拔提十力摩男拘利是則若列拔提應除摩男以是異名故也若準五分律及本行集摩男是斛飯王之子拔提是甘露飯王之子又成兩人不同也若爾今文應添陳如一人也其拔提摩男存沒同異更請詳之應法師云一拘鄰二頞三拔提四十力迦葉五摩男拘利又妙玄下文云喜根雖謗者誤也應云勝意也又云五佛子之流者亦可指五比丘也故前文云昔教五人也又如帝釋發心若太子於最後身成佛之時願為馬載太子出城昔有國王欲以祠祀而得升天時香山中有兩天王女若得其血合手人畜以為階陛爾乃升天民有知者報王曰香山之中有兩道人一名闍梨一名優奔知此神女之所生在王曰呼來為吾求神女吾其升天矣皇孫聞之曰豈有行虗殺生而升天乎夫欲升天當歸命三尊存四非常志寂若空可得升天王曰善哉信矣皇孫將妃辭親而退各乃飛還本所居處第七山中時天帝釋化為獼猴威靈震山皇孫大懼有梵志曰汝無懼也彼來供養獼猴見三道人疑住不前梵志曰進前獼猴乃進以果供養梵志受之四人謂獼猴曰將斯三人至似人形神所曰斯何人哉令升天乎梵志曰斯是國王太子開士之元首當為如來無所著正真覺獼猴曰善哉開士得佛之時吾乞為馬優奔闍梨一願為奴一願為應真佛告舍利弗時皇孫者吾身是也梵志者汝身是也優奔名目連是也闍梨者車匿是也天帝釋者今犍陟是也犍陟者馬名也車匿者守馬之奴也亦如大拿太子見阿周陀阿周陀發願若太子成佛願為神通弟子即目連是佛昔為菩薩時作須大拿太子好喜布施種種珍寶又以國之象寶施於敵國父王於是擯出太子置檀特山中太子到山山中有一道人名阿周陀年五百歲有妙道德太子禮之周陀乃問欲何所求太子答曰求摩訶衍周陀答云太子功德乃爾今得摩訶衍而不久也太子若得無上正真道時我當作第一神足弟子須太拏亦云須達拏又云蘇沙拏此翻善與又云善施又云好愛亦云善牙妙玄云調達是賓伽羅菩薩入大乘論第二卷中作此説也賓伽羅者未聞翻譯阿闍世是不動菩薩普超經云阿闍世王從文殊懺悔得柔順忍命終入賓吒羅地獄即入即出生于上方得無生忍彌勒出時復來此界名不動菩薩薩遮尼乾是大方便菩薩此云不繫具如薩遮尼乾經説佛告文殊我佛國土有諸外道尼犍子等皆是如來住持力故為欲示現不可思議方便境界何以故此諸外道皆是住不思議解脫門故波旬是住不思議解脫亦波旬踰此云惡者維摩經云十方世界作魔王者多是住不思議解脫菩薩蹴踏兩字上子六切又七六切下他合切訛也字應作踏徒蓋切踐也文出淨名經中又下文云六大城者經云舍婆提城婆枳多城毗舍離城瞻婆大城波羅奈城王舍城又下文云聞法生善善字恐誤應作喜字法身菩薩或從生身進道或從法身進道釋籤云他方大士或從釋迦生身佛邊聞法進道或從法身如大論云法身佛為法身菩薩説法此約界外得作此説又妙玄第九明本用中云住迹顯本即是釋迦住生身而顯一等玄籤之文其猶日月懸象著明奈何有目不肯觀瞻誡可悲哉四明云生身本被藏通之機今玄籤中那説法華是生身佛開三顯一他方大士從生身佛聞法進道豈是藏通之生身乎又釋籤第十明法華會主是釋迦垢衣豈是昔日化他之權實乎莫是智者云開荊溪云著大師云瓔珞長者毗陵云生身垢衣矛盾惑衆成增減之愆有天殊之謗乎嗟乎一言已出駟莫追焉秉筆事難招損誰測稻麻竹葦二乘菩薩尚不能知佛智況今碌碌唯談世論何由曉於教門乎且法身佛既約界外當知生身即是界內界內即是同居穢土分段丈六劣應垢衣界外即是方便實報法性尊特勝應瓔珞界內丈六即是釋迦界外尊特即是舍那故知若不約於界外不得説於舍那尊特明文在茲安可不信然於界內丈六身上或現界外舍那尊特如輔行引應持目連不窮身聲然後判云身聲既爾諸相例然坐蓮華臺及色究竟皆是此相而四明立現起高大尊特指華嚴梵網坐蓮華臺藏塵相好又立即劣是勝不現尊特指應持目連不窮身聲及法華光明三十二相等此蓋四明不看輔行云身聲既爾諸相例然坐蓮華臺及色究竟皆是此相豈是不現尊特異於梵網華嚴乎且輔行云身聲既爾諸相例然故知法華放光現相金光明中身放大光普照十方佛光巍巍照無量界莫不皆是從於界內丈六劣應現於界外尊特勝應與夫梵網坐蓮華臺色究竟等尊特勝應相好無別故淨名疏指法華中放光現相名為尊特良由此也四明不曉妄立不現即劣為勝又復妄謂龍尊所讚與華嚴中九十七種大人之相藏塵尊特全不相類今問四明華嚴九十七種大人之相既乃皆云放大光明遍照十方何異龍尊所讚佛光巍巍普照無量世界莫是華嚴九十七種但説放光以光為身非尊特乎莫是有於放起之過成戲劇之論乎若謂龍尊所讚身放大光佛光巍巍不類華嚴九十七種大人之相且法華云放大人相肉髻光等可不類乎不類何名放大人相類則何故龍尊所讚放光巍巍而不類耶四明斥他以法華教主是丈六劣應垢衣生身成減謗之愆又乃斥他以法華放光現相為勝應瓔珞尊特成增謗之過嗚呼哀哉傳法利他之功不補非法毀人之失且妙玄云釋迦住生身而顯一釋籤云法華會主是釋迦垢衣文句及記明法華師弟身俱卑劣皆是隱實而施於權莫是智者荊溪有減謗之愆乎淨名疏説華嚴方等般若法華四度現於尊特勝應光明色像無量無邊仍自問答指法華云我以相嚴身光明照世間證於放光現相以為尊特明文昭著其猶日月莫是淨名疏有增謗之過乎若謂法華但指劣應便是尊特不須現者如何消於四度尊特皆是光明色像無邊耶惜哉四明以增減之愆誣害於他此時雖則朋黨自賢將來如何免於惡業學佛之人豈可不信善惡因果耶釋籤云如閹本根如止觀第六記以不能男不能五欲譬於二乘根敗心死閹者掩也掩閇門也亦曰黃門黃者主中中謂聖人居天下中而理萬民主黃家之門故曰黃門亦云黃昏閇門故云黃門也鄭玄云閹精氣閇藏也亦如止觀記兼引楞伽經若就觀行明五逆者五法逆世故云五逆楞伽第三云殺無明父害貪愛母斷睡眠怨壞陰和合斷七識身若有作者現證實法彼經意兼具如藥草疏中明撗竪不及經中從如來復有無量無邊阿僧祇功德已下文是也於十界中但領二乘不言餘八故云撗不及也七方便中但領其二不言其五故云竪不及也八聖種如止觀第八記在第六記前已曾指今重示耳得繩如止觀第七記籠以四大繫以得繩心在色籠無處不至業繩未斷去已復來籠破繫斷即去不反此準有部立以得得漸以後得得於前得故使往業能至未來故有部中業入過去得至未來身死得謝未來報起得得名義止觀補注具辨餘三趣因略如止觀十心中逆順十心順十心中妄想顛倒起貪嗔癡內具煩惱外近惡友又於他善無隨喜心又復無慙及無愧等又下文云仍不明五聖但是文略者若準玄文言九次第定熏修有漏成無漏是那含業豈非五聖乎是則記中分科應云初明四禪業次明梵王業三滅心下并問答文是明無想業四若舊云聖人下明五那含業學者請子細詳之如救頭然如止觀第七記止觀第三及以第七俱云如救頭然而第三記引大論十三云譬如野干在林樹間夜半逾城深入人舍求肉不得避走竟夜惶怖無計始起欲行慮不免害即便詐死衆人來見有一人云須野干耳言已截去次有人云須野干尾言已截去又有人云須野干牙野干自念取者轉多或取我頭則無活矣即從地起奮力絶勇間關歷涉乃得自濟行人求脫亦復如是生不修行如失其耳老不修行如失其尾病不修行如失其牙至死不修則如失頭然字則是語之助也亦有處説然謂火然如救頭上之火然矣又妙玄下文云兼除四思者此與止觀小超語同故云十六心滿超能兼除又復若是四趣思者則是見惑收也又釋籤中於別益中文闕分結位一科應云釋中又二初正釋次結位也又圓益中亦闕分結位一科應云明圓人中二初釋次此是下結位也又下文妙玄云塗尉者塗即塗乳前記已引大經之文所言尉者譬如癕瘡熱氣正盛且須冷尉熱休冷息初身後身其體不異為熱暫尉熱退如初也又釋籤云初因果二先釋次結者若存此文則須改下三辨依教通別科作次結科也若存第三辨通別科者應除上文初因果等八字須云初文為三也雖作兩説而前義是也後説則於文不便矣又下文云四大聲聞得記於他方作佛弘經者誤也準經乃是持品五百羅漢等於他方國土弘經耳而妙玄云授記品末者以品末云其數五百皆當授記故至第四經初受記而於持品方乃發願他方弘經耳若云作佛是弘經者何必四大弟子耶故知誤矣又上文云實報七益亦恐文誤應云權實七益也又下文云大音顯悟者老子云大音希聲今借其語耳又迹門後十不二門意趣宏深余嘗撰圓通記三卷學者詳之可消衆滯也又下文云前三引迹後三引本者亦誤也如後三中只是體用引本證云甚大久遠耳權實引證文在迹中藥草品偈耳已今引證文在迹中方便品耳引證之意者以本迹雖殊而理事等法無別故也又將久後之言密在於本故得引之也又下文云除彌勒等二十五字者亦恐不然也余案經文雖在本門而彌勒等不知塵界猶是不知如來舉迹而譬之耳何哉以經文中第三合譬云是諸世界若著微塵及不著者盡以為塵一塵一劫我成佛已來復過於此百千萬億那由他阿僧祇劫文句釋云直下塵被點之界已不可説況不下塵寧當可説下塵不下塵界尚不可説下塵不下塵塵豈可説耶況復過是寧可説耶而彌勒等不知五百千萬億那由他阿僧祇三千界塵被點之界豈非猶是喻迹耶然此若望化城品中之喻此則為遠矣若望不下塵界一一各有五百千萬億那由他阿僧祇國猶未成遠又望下塵不下塵塵亦未成久況又過此百千萬億那由他阿僧祇劫豈非前來所舉之喻猶是迹中耶舉此近迹巧喻長遠故云我成佛已來復過於此百千萬億那由他阿僧祇劫也況本因則又過此矣妙玄云藉草藉慈夜切釋名云所以自薦藉也周易大過卦云初六藉用白茅陸德明釋文云在下曰藉今此文意即是布草于地薦進以待於佛而坐之耳通佛行因然燈與記者若準諸文乃是三藏第二僧祇良以瑞應經是小乘故也今此恐約顯露不定教義又與大品文同故得謂之通佛因也例如提謂經中三百人得忍等是顯露不定通於大乘之説也故瑞應云菩薩得記定而入定便逮清淨不起法忍即時輕舉身升虗空去地七仞等故知瑞應經文亦可通於藏通二教也釋籤云綩綖經音云相傳謂之坐蓐也今家意者綩衣繡裳也綖席也正作筵鋪陳曰筵藉之曰席也此綖字天子覆冠耳亦可通用又下文云麥者經音云麥上粳也特牛者特徒得切牡牛也牡莫厚切譬如諸天共寶器食如止觀第三記在第四記輔行第八云故淨名疏四土相望十種差別以銷天器飯色不同一同居自異二同居與方便不同三方便自異四方便與實報不同五實報自異六實報與下品寂光不同七與中品寂光不同八與上品寂光不同九諸土總對寂光不同十諸土非垢寂光非淨又應須知欲界諸天隨其貴賤好惡不同其福厚者隨其所思無不具足飲則甘露盈林食乃百味俱至其福薄者雖有飲食恆不稱心是故經云隨其福德飯色有異上者見白中者見黃下者見赤先了此已次可合法也阿私陀此云無比仙人名也離車此云邊地主又云隨耶利亦云隨舍利或云隨舍種又云律車亦云栗昌或梨昌又栗呫婆此云仙族王種呫昌涉切又下文云六恆者經無六恆之言但云供具六倍於前耳章安云即六恆也又云繞無量匝者經云三匝耳又云又阿闍世王及其夫人者列衆文中除迦葉阿難闍王及夫人也闍王至下文梵行品方來耳阿難至陳如品方來耳迦葉至將欲茶毗時方來耳涅槃列衆有五十二如別所示又云視毒者即毒蛇視能殺人者也十六惡律義涅槃經云一為利餧食羔羊肥已轉賣二為利買已屠殺三為利餧養豬豚肥已轉賣四為利買已屠殺五為利餧養牛犢肥已轉賣六為利買已屠殺七為利養雞令肥肥已轉賣八為利買已屠殺九釣魚十獵師十一劫奪十二魁膾十三網捕飛鳥十四兩舌十五獄卒十六呪龍報恩經説有十二種一屠兒二魁膾三養豬四養雞五捕魚六獵師七網鳥八捕蟒九呪龍十獄吏十一作賊十二王家常差捕賊又下文云廣三寸身大如臂者誤也準爾雅云博三寸首大如擘擘音迫注孟子云巨擘大指也郭璞注爾雅云身廣三寸頭大如人擘指今文所引即注文云廣三寸也又云無邊身者章安云菩薩妙色即邊無邊無邊即邊非邊非無邊邊即無邊故同虗空無邊即邊故從彼來此雙遮雙照不可思議也如阿彌陀壽實有量而名無量若壽無量如何得有觀音補處斯文著明亦猶日月奈何有目而不仰觀四明云藏通補處彰佛有量別圓補處顯佛無量是知觀音補法身處愈彰尊特無量之無量矣嗚呼四明既乃謬判十六觀經彌陀八萬四千相好而為法性舍那尊特常壽無量又復謬為舍那尊特常壽無量立補處義斯蓋不知今釋籤文若壽無量如何得有觀音補處今文既云若壽無量如何得有觀音補處故知尊特常壽無量不論補處復知補處但補生身實有限量之無量耳不補尊特實無量也亦知十六觀經彌陀六十萬億由旬之身謂之身量無邊但是同居界內分段生身實有量之無量耳不是界外法性尊特實無量也四明妄將法華文句實有量而言無量指大小二本之彌陀謬判十六觀經之彌陀是法華文句實無量復為無量尊特立補處之義顛亂祖誥舉世濫傳但聞四明之言便謂至真之道習俗生常非適今也四明又謂藏塵相好是千百億釋迦復謂華嚴佛身委論八相名為尊特良由不讀梵網戒疏兩重本迹遂乃謬判舍那尊特常壽無量以為釋迦劣應無常八術既混二用莫分儻以釋迦為舍那蓋以舍那為毗廬必也正名乎可不思惟之須知華嚴藏塵相好乃是現於界外舍那報佛法性尊特常壽無量定無前後補處之談若乃界內菩提樹下七歲出家三十成道丈六釋迦有量無常方論前後補處之説是故升於諸天宮殿皆言前佛曾來處此是故此處最吉祥等莫不皆約界內丈六生身説之四明不曉報應混沌生法雷同便將坐蓮華臺具藏塵相好為千百億釋迦立補處之事舉世濫傳執能改正豈非魔蔽之甚乎倚臥背痛如止觀第八記涅槃經現病品迦葉白佛佛已離病何緣於今自言有病默然而臥而不説於大乘經典又不治於諸惡比丘云何默然右脅而臥興起行經佛告身子昔兩力士一剎利姓二婆羅門因共相撲時剎利姓左手捉腰右手捺頭蹙折其脊撲地即死時剎利姓即我身是婆羅門姓今調達是以是因緣今雖成佛猶患背痛此約示迹用病化他倚今文作猗者誤也北首臥等如止觀第一記在第七記言北首者增一阿含云表於佛法久住北天若長阿含佛告阿難安我頭南首面向北則使佛法久住北天機見不同不須和會波波城闍頭園有長者名周那周那恐是純陀梵音不同耳波波闍頭未知所翻又下文云下答文中如長壽品作寄金譬等者誤也此非佛答之文乃是迦葉設三十六問之前諸比丘白佛之辭耳若乃佛答迦葉之問長壽者乃是金剛身品耳又妙玄云彼經雖一兩處説者如章安解佛讚迦葉三十六問云我初坐道場亦有菩薩來問此義乃是元初圓滿始坐非方便道場又引第二卷云我已久於無量劫來成佛亦如法華成佛久遠此豈非是大經中明過去常耶又法華一兩處説未來常者即壽量品長行中寄常住不滅四字明之既其不滅益至未來又方便品未來佛章世間相常住是也又下文云口唱真淨大法者此文出如來神力品是地涌菩薩所唱耳非多寶也多寶只言如是如是釋迦所説皆是真實耳真實之義雖然不異真淨大法而在文須分故知玄籤引文差誤矣又釋籤解流通利益云迹門冥利但見與記不云入位如分別功德品即是顯也迹門菩薩至此復益及本門新得等者恐誤也以妙玄明流通益他而釋籤作正宗自益而解故也又非化功歸己之義更請思之又下文云如下疏中云速願我如得如佛如者此文中有三箇字誤一者疏字當為觀字二者速字當為亦字三者得字當為速字請將下文對之自見其誤也妙玄云阿跋致此云不退轉又下文云浮槎者槎鉏加切水中浮木也鳥迹成文而寫字者即倉頡初觀鳥迹而寫字也倉頡皇帝時史官也又伏犧時已有文字也蛛羅引絲等如金光明玄義中説之然彼釋名有五初通別乃至當體今此亦然何者妙法蓮華經通別具矣梵云薩達磨等此云妙法等翻譯明矣以草蓮華喻妙法譬喻彰矣於中仍破光宅及他師等豈非斥古喻法不周乎然後正喻本迹十妙豈不例彼橫竪喻法之具足乎又引經中優曇靈瑞似於蓮華豈非附文乎若附經文的云蓮華者如云名妙法蓮華及衆寶蓮華等此亦標名彌可信矣又云蓮華非譬當體得名乃至云皆法理而制事等豈非當體乎又問云定是法蓮華定是草蓮華答定是法蓮華等豈非例彼當體章後之料簡乎而彼云利鈍兩存今云被上中下根何曾異哉又彼云從法立名非借世金以譬法等今云利根即名解理不假譬喻等不亦同耶但今題目妙法是法蓮華是喻復通當體當體乃是即法作譬法理制事不假譬喻以擬法耳此約利根上機也若以蓮華擬於本迹十妙之法即是中下之鈍根也今解蓮華既有法蓮華及草蓮華彼解金光明亦有即法作譬以譬擬法但彼之法自指經文之法性耳題目是事無法可指也故全法性作金光明即法作譬類今法蓮華法理而制事也以金光明譬法性同今草蓮華喻妙法也故今亦可義有二途應須兩存親近疏遠例亦有焉豈非蓮華及金光明雖通兩解只一譬喻雖是一事須存利鈍即法作譬以譬擬法但彼附文以當體為親近良由彼經不以光明喻法性故但是今家以義推之耳今此雖定是法蓮華而附文云如優曇華此乃以譬擬法為親近也良由彼此題目單復有異所以親疏不同也世人不達妄説云云波利質多羅此云園生樹也亦作員字又作圓字故俱舍云圓生樹根深廣五由旬香氣殊妙枝條傍高廣百由旬其香亦遍百由旬理實圓生也或云間錯莊嚴言此樹衆雜色華周匝莊嚴也或云圓妙莊嚴也少喻遍喻如大經者經有兩文第五云少喻第二十七云八喻少喻在八喻之外八喻具如火宅喻文句補注中引之釋籤云伏犧造八卦伏者以聖德伏物也犧者教人取犧牲也亦云包犧言取犧而包之也又云庖犧言取其犧牲以供庖廚也八卦者乾坤震巽艮坎離兌也尚書序云古者伏犧氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉神農造五穀神農母曰女登有神龍首感女登而生炎帝人身牛首班固云教人耕農故曰神農五穀者穀實也五種成實名之為穀黍稷麥稻麻名為五也貨狄造舟世本云共鼓貨狄造舟二人並黃帝之臣墨子曰工倕作舟呂氏春秋曰虞姁作舟維父造臼杵世本中説羅父造臼杵父音甫如云尼父尚父皆男子之美稱也尤造兵應劭曰尤古天子也瓚曰孔子三朝記説尤庶人之貪者也尤作亂不用帝命於是黃帝乃徵師諸侯與尤戰於涿鹿之野殺之黃帝造冠冕黃帝少典之子也姓公孫名軒轅冠貫也所以貫韜髮也黃帝冠黃冠冕白虎通云辨之為言樊持髮也以爵韋為之與服志曰爵辨一名冤廣八寸長二寸容成造歷世本云容成造歷漢書律歷志云黃帝造歷尸子云羲和造歷岐伯造醫説文云巫彭初作醫也隸首造數算數也周禮有九數方田粟米差分少廣商切均輸方程嬴不足旁要世本云隸首作數皋陶造獄尚書有臯陶謨一篇臯陶舜臣也嵆仲造車右史考記云黃帝作車少昊時加牛禹時奚仲加馬周公作指南車伯益造井説文云八家一井字須作井古者伯益之所作也蒙恬造筆秦將蒙恬其先齊人也筆述也述事而言也案尚書中候玄龜負圖出周公援筆以時文寫之曲禮云史載筆士載言此則秦之前已有筆矣蓋諸國或未之名而秦獨得其名恬更為損益耳説文云楚謂之聿吳謂之不律燕謂之弗秦謂之筆蔡倫造紙後漢蔡倫字敬仲用樹皮敞布魚網為紙奏上皇帝天下稱焉未見造網人準例可悉周易下繫辭云古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為罔罟以佃以漁蓋取諸離注云離麗也罔罟之用必審物之所麗也魚麗于水獸麗于山世本云包犧臣芒所作也又下文云蓮房者爾雅云荷芙渠其莖茄其葉其本蔤其華菡萏其蓮實其根藕其中的的中薏注云薏中心苦也的蓮中子也蓮謂房也莖下白蒻在泥中者也別名芙蓉江東呼荷薏音憶華戶爪切蔤音密音遐茄音加蒻而灼切荷莖入泥之處也卷荷在心即的中薏也團圓盤屈即卷荷在心也出㲉殼外者恐誤應云出皮殼外也然此㲉字通空谷苦角苦候三切若作入聲則成兩字重疊若作去聲則非鳥子須哺以是而知應云皮殼也噞魚檢切喁魚容切魚口上下之貌也釋大經意如止觀第一記經云譬如雪山有一味藥在深叢下人無能見過去有王造作木筒以接是藥藥乃從地流出集木王既沒已其後是藥或酢或鹹或甜或苦或辛或淡是藥真味停留在山猶如滿月凡人薄福而不能得復有聖王出現於世以福因緣即得是藥真正之味經合喻云如來祕藏其味亦爾為諸煩惱叢林所覆無明衆生不能得見其一味者喻如佛性以煩惱故出種種味所謂地獄乃至毗毗舍首陀佛性雄猛難可沮壞輔行中云真味實理也在山譬理在陰也郁伽長者郁伽此云威德梵天初下如疏及止觀第七記大意如前廣引注畢尋思可了無勞更云感通傳此是南山律行精明致感諸天共論此事委在傳中又下文云初法本又二者誤也應云初散釋又二也句身味身者古人譯經翻文為味味即是字字能顯於名句如味能顯食鹹淡也百法疏云一名多名謂之名身一句多句謂之句身一字多字謂之文身言文身者為名句依而顯所表顯有四義一扇二相好三根形四鹽如次能顯風涼大人男女及味也故喻文身能顯於理古人以文為味但是所顯非能顯也婆沙問曰何謂多名身答衆多名合聚故也豈非以聚釋身乎婆蹉婆此云好嚴飾摩佉婆此云無勝因陀羅此云光明千眼者一時知千義斷千事金剛身者身堅固也又云五陰亦名顛倒等者章安云五陰是有漏故名顛倒五陰是苦諦境故名苦諦又為念處所觀故名念處除色一陰餘四陰即四識住陰通內外名四食今文闕之能通名道因陰實法有假名時衆生體即無相名第一義身心慧之三修有為之解脫十二因緣五陰為體五陰能成三乘之身餘文可見言四食者揣食即今飯食可以分段故觸食即依報衣服強耎等思食即業食也識食即意也名詮自性句詮差別具如文句補注中示又妙玄云起自毫末等者老子德經云合抱之木生於毫末九層之臺起於纍土千里之行始於足下亦如文句補注中辨又釋籤下文云何不專憑一理者何字請依舊本作可字為定又下文云先且積者恐誤應云先正借也梵書十二字者曾問京師梵學筆受彼雖寫出一十二字然亦未委虗實故此不録以待後賢尋之耳又下文云即具十妙者即字當為色字也又云遍攝故不棄者應云遍攝故何所棄無所攝故何所不棄引證中云者云字恐剩也故安師云譯經有五失及三不易譯梵為秦如嚼食與人令人嘔噦符秦道安法師常山扶柳人姓衛氏家世英儒安公每稱譯經者有五失三不易易音異或音亦又以鼓切一者胡言盡倒而使從秦是一失本也二者胡經尚質秦人好文傳可衆心非文不合是二失本也三者胡經委悉至於歎詠叮嚀反覆或三或四不嫌文煩而今裁斥是三失本也四者胡有義説正似亂辭尋説向説文無以異或一千或五百刈而不存是四失本也五者事以合成將更傍及反騰前辭已乃後説而悉除此是五失本也然則智徑三達之心覆面所陳聖必因時時俗有易而刪雅古以適今時是一不易也愚智天隔聖人叵階乃欲以千載之上微言傳使合百王之下末俗是二不易也阿難出經去佛未久大迦葉令五百六通迭察迭書今離千年而以近意裁彼結集之羅漢兢兢若此末代之凡夫平平若是豈將不知法者猛乎斯三不易也涉茲五失徑三不易譯胡為秦可不慎乎羅什法師云天竺國俗甚重文藻但改梵為秦雖得大意殊隔文體有似嚼飯與人非徒失味乃令人嘔噦也噦乙劣切嘔烏后切一塵有大千經卷如止觀第三記前曾指示今重點耳無窄隘等如止觀第六記經云又解脫者無有窄狹譬如隘路乃至不受二人並行解脫不爾如是解脫即是如來三藏觀境不能即事名為隘路故大經云聲聞緣覺猶如隘路不受二人並行色空相即故名為並滅色存空故云不並滅色之空名為隘路也準舊本文在第五記又妙玄下文云云何將實相證於因果者此由古人解乘體通因果引普賢觀因果是實相為證而章安責古人不合引彼因果是實相之文來證乘體通於因果之説故云云何將實相證於因果釋籤解此恐誤也又下文云慈悲是軒者訛略也應云是幰蓋也又下文云綱紀者白虎通云大者為綱小者為紀綱者張也紀者理也所以張理上下整齊人倫也子者慈也慈應作孳孳者恤下之謂也晡字但是申時餔字方是申時食也齊桓公正而不譎論語憲問第十四云晉文公譎而不正齊桓公正而不譎正義云此章論二霸之事也譎詐也晉文公召天子而使諸侯朝之是詐而不正也齊桓公伐楚實因侵蔡而遂代楚乃以公義而責包茅之貢不入問昭王南征而不還是正而不詐也周公制禮周禮儀禮並周公所作禮經三百威儀三千禮記者本孔子門徒共撰所聞也後儒各有損益子思作中庸公孫尼子作緇衣漢文時博士作王制孔子刪詩古詩多矣仲尼刪之上取商下取魯凡三百十一篇秦皇焚書亡其六篇今之存者三百有五毛公作傳乃謂毛詩也經謂五經七等九也白虎通云易書詩禮樂曰五經也古者以易書詩禮樂春秋為六經至秦焚書其樂經亡矣今以易書詩禮春秋為五經焉唐章懷太子注後漢書云書禮樂易詩春秋論語即七經也禮有周禮儀禮禮記春秋有左氏公羊穀梁兼易書詩通而言之名九經也三墳墳大也尚書序云伏犧神農皇帝之書謂之三墳言大道也五典典常也尚書序云少昊顓頊高辛唐虞之書謂之五典言常道也古人書簡等古者殺青為簡以韋編之編簡成篇如今連紙為卷也春秋左傳序云大事書之於䇿小事簡牘而已文選注云大竹名䇿小竹名簡木板名牘又云六韜者周書篇名也或云祕讖也文武虎豿龍犬故云六也天文者天有日月星辰以成文章也地理者地有川原隰以為條理也東震等者具如周易説卦中明之一卦生七者如坎震為屯艮坎為蒙等也坎水良山震雷也八純者乾也卦名者六十四卦名也乾坤等是也卦系者系胡計切正作繫易有上下繫詞也象彖者六十四卦皆有之也彖吐亂切斷也斷都亂切統論一卦之體明其所由之主故云彖也象者精象擬象也出意也言者明象也盡意莫若象盡象莫若言也五行如止觀第六記五者金木水火土也行者為天行氣也地之承天猶妻之事夫臣之事君故也此起黃帝感玄女星精而説之也木者少陽主東方火者陽尊主南方金者少陰主西方水者陰卑主北方土者大包主中央而王四季也社謂后土稷謂后稷略如止觀第六第十記白虎通云王者所以有社稷何也為天下求福報功也人非土不立非穀不食土地廣博不可遍敬故封土立社示有土尊也五穀衆多不可遍祭故封稷而祭也周禮注云社稷土穀之神有德者配食焉然而各以土地所生太社唯松東社唯柏南社唯梓西社唯栗北社唯槐在第四記禮記王制云獺祭魚然後虞人入澤梁豺祭獸然後田獵夏桀無道置網四方殷湯聖君乃除三面如文可見張陵為大蟒所吞嵆康為鍾會所譖而記傳云得仙謬矣李膺蜀記云張陵後漢順帝時人客學於蜀乃入鵠鳴山中山在益州晉原縣西也自稱天師侮慢人鬼即身受報漢嘉平末為蟒蛇所吸子衡奔出尋無所畏負清議之譏誡乃假設權方以表靈化之迹生縻鵠足置石崖頂謀事辦畢剋期發之至建安元年遣使告曰正月七日天師升玄都東民山獠蟻集關外雲臺治民等稽首再拜言伏聞聖駕玄都臣等長辭蔭接尸塵方享九幽方夜衡入久之乃出而詭稱云吾旋駕辰華爾各還所治淨心持行存師念道衡便密抽遊罥鵠直衝虗空民獠愚戇僉言登仙魏志云張魯字公祺祖父陵客蜀學道在鵠鳴山中造作道書以惑百姓從陵受道者出米五斗世號米賊陵死子衡傳業衡死魯復傳之陵為天師劉焉傳云陵為蟒蛇所螫弟子亦相次餧蛇却云白日升天欺詐妖妄傳記所明也晉書云嵆康字叔夜譙國人也少有奇才博覽經籍拜中散大夫魏志云鍾會字士秀頴川長社人繇之少子也少敏慧夙成為祕書郎遷鎮西將軍鍾會有憾於嵆康時呂安兄巽姦通安妻巽為大將軍長史遂搆誣將害安鍾會為大將軍所善會因勸大將軍誅康與呂安同罪又譖云嵆康臥龍也其後嵆康與呂安俱斬于東市神仙傳中乃云得仙不亦謬乎長爪緣如止觀第五記大論云有一梵志名曰長爪亦號先尼亦名婆蹉亦名薩遮迦亦名摩揵提計一切論可破一切語可壞一切執可轉故無實法可信可敬難世尊云一切論可破佛以一句責之云汝見是忍不思惟良久不得一法入心乃云沙門置我二負門中若我答忍是負門粗衆人皆知云何自言不忍而今言忍若我答言我見不忍是負門細人無知者即答佛言是見亦不忍佛言不忍是見將何破他長爪於是得法眼淨勤學爪長無暇翦之故云長爪此文及輔行文簡略難見文句云長爪語佛言一切法不忍忍即安義言一切法我皆能破使不安耳佛問汝見是忍不餘如今文可見也又上文云論力者梵志名也而若者若字訓汝或當為各字也又妙玄云有非有非無為有者準止觀中乃是具足四句有句中第四句耳無非有非無為無者乃是無句中第四句耳又云此之無量相故云相入者恐訛略也更請詳之一指二指等如止觀第五記大經第八迦葉問佛云何佛性難見難入佛言譬如百盲為治眼故造詣良醫是時良醫即以金錍決其眼膜以一指示之問云見不答云不見二指問之亦言不見三指問之答云少見經合喻云無量菩薩雖行六度乃至十住猶未能見如來説已則便少見此乃別教十住所以未見章安疏云即以三諦而為三指初指譬真諦則不見性故云不見二指譬真俗二諦亦不見性故云不見三指示之譬一諦三諦名為見性故云少見即圓十住金錍如教是故云也張儀等文出史記列傳今云世家者誤也鬼谷在頴川陽城因人居故乃云鬼谷先生耳六國時縱橫家也秦繫而誡者誡門人不為通又使不得去數日後而乃見之乃坐於堂下也慧王慧當作惠字也檄胡狄切符檄也二尺書也皎也喻彼使皎然也背蹤者哀王倍從約而因儀請成於秦儀歸相秦三歲而哀王復背秦也范蠡文在史記世家今云列傳者誤也世家子弟世世有祿秩家也初句踐兵敗栖於會此耻也後滅吳蠡乃請誅以昔兵敗句踐見辱於會稽故自請誅也間行者間字去聲顏師古注前漢書云間空也投空隙而行不公顯也間道間出微行亦然也投間空隙私出故也若微賤者故云微行也後漢書云間語注云私也正于陶者正當作止陶即定陶也居無何者居無幾何也顏師古注前漢書云無幾何者言無多時也幾居豈切熊渠次飛者漢書云佽飛射士注云佽飛官有一令九丞在上林苑中結矰繳弋鳧鴈歲萬頭以供祀宗廟也又取古勇人以名官若熊渠之類也佽便利也取其便利輕疾若飛故云佽飛也秦左弋官武帝改名佽飛也佽亦作次飛亦作非呂氏春秋云荊有勇士次非也中庶人者應作忠恕字論語云夫子之道忠恕而已矣學數者學小乘數論也善地則彈中者善地論人則彈中論師也是門無礙等者大品云世尊是門利根菩薩所入佛言鈍根菩薩亦可入中根菩薩散心菩薩亦可入是門無礙若菩薩一心學者皆入是門懈怠少精進妄憶念亂心者所不能入精進不懈怠正憶念攝心者能入如喜見城千二百門者大論云須彌山頂有三十三天宮其城七重名為喜見九百九十九門一一門邊皆有十六青衣鬼神守護三藏觀生空得道三藏觀生空得道已者恐剩上句也石中有金如止觀第六記尼犍經中王名嚴熾有大薩遮來入其國王出遠迎乃為王説大王當知依煩惱身觀如來身何以故此身即是如來藏故一切煩惱諸垢藏中佛性滿足如石中金木中火地中水乳中酪麻中油子中禾藏中金模中像孕中胎雲中日是故我言煩惱之中有如來藏又云佛藏十喻為有者文在方等如來藏經佛即如來也十喻者一未敷華二萎華三密蜂四粳糧五金在不淨六貧家有寶七菴羅果八斃物褁金九貧女懷貴子十冶鑄真金像然此兩經十喻皆是有門耳力士額珠如止觀第三記經云譬如王家有大力士其人眉間有金剛珠與餘力士角試相撲而彼力士以頭抵觸其額上珠尋沒膚中都不自知是珠所在其處有瘡即命良醫時有良醫善知方藥即知是瘡因珠入體是珠入皮即便停住是時良醫尋問力士卿額上珠為何所在力士驚答大師醫王我額上珠乃失去耶是時良醫慰喻力士汝今不應生大愁苦汝因鬬時珠入體中今在皮裏影現于外是時力士不信醫言時醫執鏡以照其面珠在鏡中明了顯現疏解此云佛所統處名曰王家大力士者以譬衆生有降魔外之力用也其人眉間喻中道也理性圓淨名金剛珠遇緣起惑名為相撲乃以身見觸中道體名為抵觸而其正理在斷常內名沒膚中機召於佛名命良醫聖智達知名知入體理性虗通名現于外鏡譬圓經照信心面文明理顯諦信明了六十二見如止觀第二第五記前已指示今重更耳修陀未知翻譯六群南山云以本六人同共朋從遊處即以為號多論云二人善解算數陰陽説法論議而性多欲難途跋難是也二人深通射道善解毗曇而性多癡迦留陀夷闡陀是也二人善於音樂種種戲笑説法論議而性多嗔馬師滿宿是也五人是王種迦留陀夷是婆羅門種八十八使如止觀第五記前已曾指妙玄云須跋陀羅此云善賢又上文云如中論下兩品者中論前二十五品申大乘三教後兩品申三藏小乘生滅因緣破六十二見也又云通修論三十七者即相生道品也苦下空無我二行為空也無常及苦二行為無作也十二禪等者等其九想背捨等也三番縮觀者即中上二忍及世第一也故智妙中以財易錢以錢易金以金易珠即喻此也大樹不宿怨鳥文出大論如輔行第七引之雪山毒草藥王文出大經也三十七品是寶炬陀羅尼文出大集經耳妙玄又云離十相故名空三昧等釋籤引大經解十相者玄籤之文恐誤也經中自明無相三昧無有十相耳言十相者謂色聲香味觸生住滅男女等十也今文欠一聲相剩一異相也經明空三昧乃云於二十五有不見一實耳無作三昧乃云二十五有不作願求耳又第二十五卷明大涅槃遠離十相謂生老病死色聲香味觸無常等十也無垢稱王即維摩詰耳釋籤云示人無諍如止觀第六記大論云佛法有二一者諍處二無諍處餘經已説諍處今欲示人無諍處故説摩訶般若波羅蜜經然大論中本斥三藏以為諍法即以衍門為無諍也佛教本意示人無諍諍者人過何關法乎但三藏門拙故易生諍冥初生覺如止觀第七記在第十記前已指引外道之智八萬劫前冥然不知故云冥也但見最初中陰初起以宿命力恆憶想之故云初也從此生覺故云生覺也從覺生我心等周璞鄭璞如止觀第十記璞者玉也鄭重玉璞若有得者與其厚賜周人聞之規其厚賜周人風俗乃以死鼠而為玉璞以將詣鄭鄭人笑之其人悟已答鄭人云楚人鳳凰其實山雞以其楚王重鳳故其不識鳳者路行見擔山雞人乃問之曰此何鳥也擔者知其不識乃戲之曰此鳳凰也其人聞之買以上王得之便死楚王聞之愧而召問王亦謂實乃以十萬而賜之以地人釋地義偷安莊老如止觀第五記惡魔比丘退戒還家誇談莊老以佛法義偷安邪典押八萬十二之高就五千二篇之下以道德逍遙之名齊於佛法解脫之説非但古然今時甚有皆將儒老比齊吾教播在筆舌孰能辨之悲夫又云涇濁渭清者誤也應云涇清渭濁也三德縱橫如止觀第三中小乘師説般若種智已圓果縛尚在解脫未具身猶雜食一優二劣譬之橫川走火又云先有相好之身已得種智般若後滅身智方具解脫既有上下前後譬之縱三點水大乘師説法身是體本自有之了因般若無纍解脫此二當有隔生跨世此則名縱又云三德無前無後一體具足以體從義而有三異此乃體橫而義縱耳二輪二翼如止觀第五記馳二輪而致遠譬定慧之橫周鼓兩翅而高飛喻定慧之竪遍所以車有二輪則能遠載鳥有二翅堪任飛升又妙玄云即空故方便淨者恐即空故是圓淨涅槃耳又釋籤云言該攝者者若牒玄文則該攝字應作巧修字也又云約行相攝者應云約位相攝也一止等如止觀第三文前曾指引止觀記具注解長者喻佛諸牛喻教色有種種隨其機也同共一群理一也付放牧人弘教也令逐水草被機也唯為醍醐常住也不求乳酪人天二乘也𤛗已自食弘者自益也長者命終佛入滅也為賊抄掠盜佛教法也無有婦女無慈也得已自食利養也當誤何計而得之耶欽慕也我等無器非根也無安置處持戒非常住本也可以盛之人天陰果也雖有盛處不知鑽搖漿猶難得況復生酥無定慧方便名不知鑽搖似道尚難況復真常乎加之以水起見也一切皆失起見墮惡失人天果也彼文先明橫竪等者輔行云若望偏乘名橫名竪若不思議非橫非竪又圓十乘自明橫竪如初妙境窮實相底名竪包十法界名橫乃至離愛入住名竪不著似法名橫又妙玄云取理難當者當字去聲理非難易難易在人耳得其門則易不得則難矣又云所通是別圓者若準玄文所通但在於圓耳以是圓接通別故也笑而拾去者拾字應作捨字也三藏生法二空如止觀第六記空於我所名為法空空於我人名衆生空如云是老死誰老死若説無誰老死是名生空無是者死名為法空乃至無明亦復如是迦羅迦鎮頭迦章安云並未見翻但應知是甘毒二果耳六卷云迦留治牟也快馬見鞭影如止觀第五記前已指引闍提首那未見翻譯又妙玄云何無差別者何字誤也應作則字又釋籤云次二句句釋者多一箇句字也又云初釋簡宗體者釋字合在初字之上也又云縱容者縱字合作從字七恭切又云將陪者陪加也助也又云次破用權實及名為宗可見者恐多及名兩箇字也又云次諸經下辨諸部中因果不同初大品等者此又脫落應於不同字下更云初文又三也又云答中三標列釋者應云答中二初標次列釋也又云二者從復次去於圓自為四句者誤也應云從圓漸者初入此圓已去於圓自為四句也復次已去但是重明圓家自論之四句耳又云亦以初文以為初句次從初發心住進修二住為圓漸者亦誤也何者偏圓相對論四句乃以漸圓為初句耳若於圓家自論四句則以圓漸為初句漸漸為第二句漸圓為第三句圓圓為第四句故妙覺位亦名漸圓亦名圓圓也又妙玄云漸圓三句者應云圓漸三句也又云遠疑者應云近疑也上來所注請細對當文之前後也遠師慧遠法師姓賈氏鴈門樓煩人師事彌天道安法師安常歎云使道流東國其在遠乎卜居廬阜三十餘年影不出山迹不入俗春秋八十三而卒龍師印師齊朝京師中興寺僧印法師姓朱壽春人依廬山慧龍法師咨受法華龍師亦是當世名匠印師雖學於衆典而偏以法華著名乃講法華二百五十遍年六十五卒漢順帝時等此一段文頗有訛略今具引本文後點訛略按後漢書列女傳云孝女曹娥者會稽上虞人也父盱能絃歌為巫祝漢安二年五月五日於縣江泝濤迎婆娑神溺水死不得尸骸娥年十四乃沿江啼哭晝夜不絶聲旬有七日遂投江而死至元嘉元年縣長度尚改葬娥於江南道傍為立焉注云娥投衣於水祝曰父尸所在衣當沉衣乃隨流至一處而沉娥遂與衣俱沒會稽典録云上虞長度尚弟子邯鄲淳字子禮時甫弱冠而有異才尚先使魏朗作曹娥文成未出會朗見尚尚與之飲宴而子禮方至尚問朗文成未朗辭不才因試使子禮為之操筆而成無所點定朗嗟歎不及遂自毀其草也案元嘉年即後漢第十桓帝之時也今云順帝恐誤也順即第七帝耳度徒故切姓也尚名也有息等皆訛略也喈音皆至後漢時者應云漢末即第十二獻帝之時也楊修字德祖後為曹操所殺也史記孝女傳者即後漢書列女傳也肝應作盱況于切迎伍君者迎婆娑神耳邯鄲者復姓也淳者名也黃絹是色絲即絶字也幼婦是少女即妙字也外孫是女子即好字也齋臼是受辛即辭字也乃是絶妙好辭耳又下文云次文次如文者應云初如文也又下文云師子後跳即未來者恐誤也準文句中師子譬現在又奮迅將前乃表未來耳將前豈非前跳乎又妙玄云慕覓弘經下方出現慕覓弘經下方出現者此中多兩句剩八箇字也妙玄云阡陌南北為阡東西為陌又釋籤云第五會二品及三十七品者若準下文應云三品及三十九品也又下文云宿慧益多者慧字應作世字增一從一事增至十事也中集一切中經也雜集比丘比丘尼諸天帝釋等雜事也長集一切長經也三修有邪三修劣三修勝三修邪即外道所計常樂我也劣即小乘所修無常苦無我也勝即大涅槃常樂我也十仙十仙外道也一闍提首那二婆私吒三先尼四迦葉五富那六淨梵志七犢子梵志八納衣梵志九弘廣十須跋陀羅三十六問即是經中云何於此經等偈是也梁武帝云有三十二問河西云有三十四問中寺安云有三十五問開善云有三十六問光宅云有三十七問章安依河西云三十四問耳今云三十六問者依開善也增減在人無勞苦諍五行從病行品已去等文是也十功德從高貴德王品去是也筌筌取魚器也兔網也作此蹄字足也莊子外物篇云筌者所以在魚得魚所以忘筌蹄者所以在兔得兔所以忘蹄陸德明云筌香草也可以餌魚或云積柴水中使魚依而食焉一云魚笱也蹄兔罥也又兔弶也係其腳故曰蹄罥古縣切弶巨亮切今家意者作此蹄字依俗之説也説文作若言蹄是足者能詮不成若言蹄是迹者其義亦疏尋迹得兔義豈然乎釋籤云近代已來讀山門教者仍有此説誤哉清涼觀師有茲説也彼華嚴鈔云今此翻明法華劣此彼是一家此有三家一不同也彼之一家但是聲聞此之三家是佛菩薩二不同也彼唯三請此有五請三不同也彼唯因人請此有佛請四不同也乃至廣説如彼疏鈔當如觀師雖學天台不得意故有茲形斥具如文句補注中辨又新華嚴第八十卷普賢以頌説佛功德佛智廣大同虗空普遍一切衆生心隨衆生心種種行令其所見各不同或見釋迦成佛道已經不可思議劫或見今始為菩薩或見始生或見滅今謂但是今日初成有機自見經於不思議劫非謂便見久遠本成所以但言成道不思議劫亦無本行菩薩道之言及以實成久遠之語故未可同法華本門久成長壽故知但是一機或見初成佛道即短而長是故已經不思議劫亦無拂迹仍存始成若不爾者至法華中河所拂耶故法華中彌勒等四請如來四誡之後方談久成豈華嚴中不請不誡而普賢因人輒拂如來之果迹耶又復經中皆言或見斯是如來不思議力令諸衆生各見不同各見不同豈非祕密故法華前密論如來成道已經不思議劫亦無所妨但未顯露故知顯露拂迹顯本唯在法華壽量品中故知密見自是一邊不可便濫通途大體故天台解壽量品云下方菩薩本目所化皆不執近若乃他方舊住菩薩俱有二種一從法身應生者往世先得無生或已發迹顯本設未得聞報盡受法性身於法身地自應得聞長遠之説故知應生不執近也二者今生始得無生及未得者咸有執近文句記云不同界內經歷五味跨涉本迹七請五誡方乃得聞以見一分法身理合得聞長遠今普賢云或見成道不思議劫有何不可耶又復華嚴後分至於法華涅槃設使成道久遠已經不思議劫亦何乖爽故金光明文句解空品云若指般若則此經非方等攝若不指般若諸經不廣明空義此復云何答諸經前分結集人應作次第而其後分皆攝入前例且舉一以類諸如方等陀羅尼經次第在法華前而經中云先於靈山已為聲聞授記豈非方等至於涅槃以此推之言次第者是前分也互相指者是後分也結集者以後分明義氣類若同向前集之或者不知言乖次第實不乖也金光明經是方等後分故指般若為已廣説空無妨也若其然者大佛頂首楞嚴經云波斯匿王年六十二又云是名妙蓮華定性聲聞及諸一切皆獲一乘寂滅場地豈非亦是方等後分經耶人不見之尤多異説清涼觀師初學天台所見既僻乃遭荊溪諸文破之而清涼師遂棄天台却宗賢首雖復遵稟天台止觀而反斥於天台判教豈不教觀胡越解行矛盾哉故清涼云經云成道不思議劫舉此以遮天台之謬謂彼學者多云華嚴雖則玄妙而有二事不如法華一兼別義是故不説聲聞作佛二説如來始成正覺不説本師壽量久成故今疏中指此經文即是華嚴説久成處若以此後不該於前則法華壽量不能廢於我始坐道場於三七日中思惟等迹也不説聲聞作佛者約不共義既無厭捨曾何棄之況一成一切成無一衆生不具佛智今謂清涼雖學天台深不見於天台之道所以棄背妄生譏毀以惑未學天台教者是可哀也善財未見彌勒普賢文殊之時行布宛然豈非兼別二乘不聞何況受持故雖在座如聾如瞽何曾授記若謂授記應問作佛名號及劫國等何所謂乎且法華前諸部中圓顯實是同何曾不明二乘作佛但不彰灼對二乘説耳又復何曾不説一切衆生皆具佛智何得約此而為難耶顯實雖同開權局此何得引於諸佛菩薩不厭不捨二乘為難耶佛雖不厭捨而二乘未悟故至法華中方開悟作佛是以法華前佛意無所隔但説時未至故有兼帶等清涼不知此妄斥天台師此義若不辨天台宗須壞故今述祖道以對於清涼後賢或覽之無謂余狂簡餘如上下文此不委説也況大唐靈感傳天神謂南山云但説六度等行即入華嚴但是授聲聞記作佛即入法華天神面於佛前親承斯旨清涼何得建立華嚴授二乘佛記顯如來遠本豈非乖戾之甚乎問何以得知清涼觀師元學天台答大宋僧傳云五臺山清涼寺澄觀於大曆年中詣蘇州湛然法師習天台止觀法華維摩經疏等云云又下文云四請三誡者應云四誡也又下文云三結歸文二結勸者誤也應云三結歸文三結勸文並可見也及疏文中廣以十義一始見今見二開合不開合三竪廣橫略四本一迹多迹共本獨五加説不加説六變土不變土七多處不多處八斥奪不斥奪九直顯真實開權顯實十利根初熟鈍根後熟前文中云摩訶袒持此云大祕要妙玄云盧舍那此云淨滿又云光明遍照釋籤云高麗麗呂支切東夷國名也論語云子欲居九夷正義云一玄菟二樂浪三高驪四滿飾五鳧臾六索家七東屠八倭人九天鄙今家學者多有不曉故特示之三論中論百論十二門論梁武敕十人止觀詮等攝山止觀寺僧詮法師也大乘海嶽聲譽遠彰其餘九人未聞其號興皇伏虎朗陳朝楊都興皇寺法朗師也姓周氏徐州沛郡人母劉氏夢神人乘樓閣入懷夢中如言身與空等因而有孕朗公以梁大通二年於楊都寶志禪師受諸禪法又於詮師稟受智論中百十二門論并華嚴大品經永定二年奉勑住興皇寺春秋七十五太建十三年九月二十五日中夜而卒栖霞得意布陳朝攝山栖霞寺慧布師也師事僧詮聽三論等學徒數百翹楚一期洞達清玄妙知論旨皆無與上時人號之為得意布亦言思玄布詮師講解聽者猶迷每有客問必待慧布而答之也布師以陳禎明元年十一月二十三日卒終後屈三指長干領語辨長干寺玄辨法師也禪衆文章勇陳郡楊都大禪衆寺慧勇師也姓桓母張氏夢登佛塔獲二金菩薩俄育二男並幼而入道長則慧聰次則慧勇勇依靈耀寺則師為和上後依詮師受學住大禪衆寺春秋六十九初僧詮受業朗公玄旨所明唯存中觀自非心會析理何能契此深言而頓迹幽林禪味相得及後四公往赴三業資承詮公命曰此法精妙識者能行朗等受旨不敢厝言及詮公化往四公放言各擅威容也又下文云若法相宗徒者徒字應作途字故金錍云一家宗途也今此即是一家所用法相宗旨大途多依大論故也妙玄云虎丘山岌師虎丘山在蘇州岌師未詳氏族宗愛法師未詳氏族莊嚴旻師梁朝楊都莊嚴寺僧旻法師姓孫吳郡富春人七歲出家住虎丘山為僧回弟子從回受五經一聞能記安貧好學與法雲法開等學於柔次二師夕則合帔而臥日乃假衣而行大明數論統究經律柔次二師於普弘寺共講成實旻於末席論議詞旨清辨致言宏邈次公放麈尾而歎云老夫受業於彭城精思此之五聚有十五番以為難窟每恨不逢勍敵必欲研盡自至金陵纍年始見竭於今日矣且誠思之晚講當答及晚上講才復數交詞義遂擁次公動容顧四座云後生可畏斯言信矣時靈根寺道超勤學願如旻師忽夢人云僧旻法師毗婆尸佛時已能講説君今始習云何等也著論疏百有餘卷年六十一大通八年二月卒定林柔次二師定林寺僧柔法師姓陶丹陽人精勤戒品委曲禪慧方等衆經大小諸部皆悉洞明年六十四卒京師謝寺慧次法師姓尹冀州人師徐州法遷志而無倦超然孤拔于時智藏僧旻等並依次公請業年五十七開善開善寺也佛馱三藏學士光統慧光法師姓楊定州人也年十三從佛陀禪師受三歸佛陀異其眼光外射遂度出家乃名慧光初習毗尼後弘經論任國僧都轉為國統故云光統也耆闍廩師鍾山耆闍寺安廩法師姓秦氏二十五出家聽嵩高少林寺光公十地一聞領解頓盡言前又受禪法悉究玄門陳永定年敕住耆闍寺年七十七至德元年卒北地禪師或謂羅什云佛一圓音平等無二無思普應機聞自殊非謂言音本陳大小後魏菩提留支云如來一音同時報萬大小並陳出異解竟吾祖之後更有諸家判教不同今輒録之陳真諦三藏立二教一漸二頓漸約漸悟菩薩大由小起具有三乘之教名之為漸即涅槃等經若直往頓機大不由小起唯菩薩乘如華嚴經唐海東新羅國元曉法師造華嚴疏立四教一三乘別教如四諦教緣起經二三乘通教如般若經三三乘分教如瓔珞梵網經四一乘滿教如華嚴經唐吉藏法師立三教一根本法輪教即華嚴經二枝末法輪教即三乘等於後所説三攝末歸本法輪教即法華經唐江南印法師立二教一釋迦經名屈曲教以逐根性隨計破執故二平道教即舍那經以逐根性自在説故唐波頗三藏立五教一四諦教即四阿含經二無相教如般若經三觀行教謂華嚴經四安樂教即涅槃經五守護教即大集經護正法故唐三藏及慈恩基法師依解深密經立三時教引彼經云勝義生菩薩白佛言世尊初於一時在婆羅痆斯仙人墮處施鹿林中唯為發趣聲聞乘者以四諦相轉正法輪雖是甚奇甚為希有而亦有上未為了義第二時中唯為發趣修大乘者依一切法皆無自性無生無滅以隱密相轉正法輪雖更甚奇是亦有上猶未了義世尊於今第三時中普為發趣一切乘者依一切法皆無自性本來寂靜以顯了相轉正法輪最為希有名真了義準此經文阿含等經為第一時總密説有不明有者有何性耶大般若等為第二時總密説空不明空者亦空何性華嚴等經為第三時顯了説有有依他圓成顯了説空空所執性又金光明三種法輪謂轉持照又大涅槃醫師服乳亦有三時今依新經頓教大乘但唯一時約漸次故有此三時又云隨機判教等云云唐賢首藏法師立五教一愚法小乘教二大乘始教三終教四頓教五圓教小乘指阿含等經始教亦名分教以深密經第二第三時中同許定性二乘俱不成佛所以合之以為一教此既未盡大乘法理故立為始有不成佛故立為分終教亦名實教定性二乘無性闡提悉當成佛方盡大乘至極之説故立為終以稱實理復名為實頓教但一念不生即名為佛不依地位漸次而説準思益經得諸法正性者不從一地至於一地楞伽亦云寂滅真如有何次第圓教明一位即一切位一切位即一位依普賢法界帝網重重主伴具足已上諸師判教依天台宗則無取焉當今之世盛流布者唯慈恩賢首二家耳原夫性相二宗本自西域那爛陀寺同時有二論師一名戒賢二名智光戒賢遠承彌勒無著近踵護法難陀依深密經瑜伽等論立三時教即是唐朝弉三藏及慈恩基師之所用也二智光論師遠承文殊龍樹近依青目清辨準般若經中觀等論亦立三時教以無相大乘為真了義謂佛初在鹿苑説小乘明心境俱有次於中時為彼中根説法相大乘境空心有唯識道理猶未全入平等真空第三時中説無相大乘心境俱空平等一味為真了義清涼觀師云然此二家明三時教並不能斷一代時教以各有據互相違故以深密等經未居最後故且約一類之義故分三耳若以天台之意觀上二家三時之教一者時不整足二者判教未周三者定執一經非諸大教況一代之旨五時之義施開廢等豈彼留心哉清涼觀師元講天台後依賢首以彼五教和會天台四教云愚法小乘即天台三藏始即通教終即別教圓教則同又云天台所以不立頓教者以四教中皆有一絶言故今乃開者頓顯絶言別為一類即順禪宗也余謂賢首五教豈同天台四教耶如三藏指鹿苑方等中小乘等豈同賢首獨指四含耶又彼但云人空此具人法二空豈得同耶若謂四教絶言即是頓者此大不可何者四教絶言之理理具真中及以權實彼立頓教自是大乘那得同耶又彼圓教自指華嚴豈同天台五時之中唯除鹿苑顯露無圓彼妙此妙無二無別耶然賢首雖用五教至于撰述深讚天台乃是升堂入室之者位次著明曾無形斥但由觀師自立華嚴以為頓頓以法華經而為漸圓又以華嚴圓融行布無二無別違背天台所立義耳況彼全用天台深義如坐禪儀式安心行門三諦三智之談三德三觀之説諸佛不斷性惡衆生不斷性善具德真如融通妙理舉一即三以三為一身土互融依正不二大事因緣如是等義莫不引之以為心要至於圭峯不本師祖於禪源詮及諸疏鈔妄生排斥評品天台有識觀之能無嗟愍學今宗人不得其意却謂終教是今圓俗頓教是今圓真圓教是今圓中嗚呼謬矣如何將今三諦對彼三教乎識者自知不能破也大宋僧傳寧僧録等立三輪教一顯教輪謂諸乘經律論也以摩騰為始祖二密教輪謂瑜伽灌頂五部護摩三密曼拏羅法也以金剛智為始祖三心教輪直指人心見性成佛謂禪法也以菩提達磨為始祖即以心傳心也今謂若爾且華嚴等諸大乘經何嘗不直指人心見性成佛耶寧公識見太是淺末幸希後德試為詳之是老死等如止觀第六記前已引之如食檀耳章安云若見佛自行乞食到純陀舍食檀耳羮中夜入滅興向雙林以火焚身而入涅槃此是小機所見迦留陀夷此云粗黑非時入聚落為俗打殺埋馬糞中後出入滅作結戒緣起也佛性有五種名如止觀第三意仍少別大經二十五云一切衆生皆悉有於首楞嚴定亦名般若亦名金剛三昧亦名師子吼亦名佛性彼證止觀義兼三德故云意仍少別也生身乃至九惱大論云一梵志女孫陀利謗五百羅漢亦被謗二旃遮婆羅門女繫大杇作腹謗三提婆達多推山壓佛傷足大指四迸木刺腳五毗留璃王興兵殺釋種佛時頭痛六受阿耆達多婆羅門請而食馬麥七冷風動故脊痛八六年苦行九入婆羅門聚落乞食不得空鉢而還復有冬至前後八夜寒風破竹索三衣禦寒又復患熱若準興起行經乃有十惱一孫陀利謗二奢彌跋謗三頭痛四骨節煩疼五背痛六木鏘刺腳七達多擲石八婆羅門女旃沙謗九食馬麥十六年苦行大論音云釪杇杅皆非應作盂盆也均提沙彌至如止觀第四記後人尋之第九記云三學之中非但慧道經生不失戒定亦然何者戒是有為色法定是有為心法命朽之時形俱無作戒體雖謝無作戒業得得不滅以隨業道至未來故小乘事法尚至未來又下文云乳𮙬等者𮙬應作湩竹用切又多貢切乳汁也𤛓古候切取乳也與汝作乳種者應云汝與我乳湩也蜎狂兗切爾雅云蜎蠉井中小蛣蟩赤蟲也蠉香兗切蜎應作翾亦作蠉許緣切小飛也蠕而允而兗二切動也喜出息償錢畢復觸他人者常喜出錢外人來從就其舉錢日月適至便乃責息他償錢畢復謾抵人言未畢也坐此者坐字慈臥切被罪也言出息者如子息也子息者氣在人身中所稟以生也今人出錢生子亦云息者例此故也又下文明爪上土引大經三十一云者華嚴之中既將少許之土與大地之土而為校量故知十地菩薩之法不可比佛也又云華嚴甚深但為今序者應云無量義甚深也八千聲聞得授記別如止觀第七記大涅槃云譬如暗夜若諸營作一切皆息其未訖者要待日明學大乘者要待無上大涅槃日是經出世如彼果實多所饒益安樂一切能令衆生見如來性如法華中八千聲聞得受記別即持品中八千人也毗舍遮此云噉精氣噉人及五穀之精氣也亦云毗舍闍富單那此云臭鬼中之勝者又云主熱病鬼於諸如來常如止觀第七前曾指引八大聲聞舍利弗目連迦葉空生滿願離越那律阿難八大菩薩文殊師利不虗見寶英棄諸惡趣棄蔭蓋光世音辨積超度無虗迹提謂諸師咸云此是偽經今謂天台靈山親承豈引偽經誤人者哉三寶録云舊録別載有提謂經一卷與諸經語同但曇靖加足五行五方用石糅金致成疑耳今以一卷成者為定其曇靖於北臺撰提謂波利經二卷文云東方太山漢言代嶽陰陽交代故云代嶽於魏世出應云魏言乃曰漢語不辨時代此一妄也太山即此方言乃以代嶽譯之兩語相翻不識梵魏二妄也六因四緣如止觀第八記俱舍云能作及俱有同類與相應遍行并異熟許因唯六種大論云六因者所作因共因自種因遍因相應因報因四緣者因緣次第緣緣緣增上緣新譯次第緣名等無間緣緣緣名所緣緣餘二名同又云若俱舍因緣五因性等者俱舍云因緣五因性此中性者是緣種類於六因中除能作因所餘五因是因緣性六因如向所列大品十喻如止觀第五記大論第七云一如幻二如焰三水中月四虗空五如響六如城七如夢八如影九如鏡像十如化又下文云有二十一字者但有二十字耳一切法趣如止觀第二記如前指引下佛答中仍云菩薩不應食肉故知仍存小教中開此判恐誤何者彼經佛答經文具云一切諸肉有無量緣菩薩於中當生悲愍不應食之所謂衆生從無始來生死輪回曾作父母兄弟眷屬云何於中取之而食乃至云我若聽許聲聞食肉我則不名住慈心者我於諸處説遮十種許三種者是漸禁斷令其修學今此經中自死他殺凡是肉者一切悉斷大慧我不曾許弟子食肉亦不現許亦不當許大慧凡是肉者於出家人悉是不淨若有癡人謗言如來聽許食肉亦自食者當知是人惡業所覆必當永墮不饒益處大慧二乘菩薩尚唯法食豈況如來乃至偈中云食肉無慚愧生生常顛狂諸佛及菩薩二乘之所嫌象腋與大雲涅槃勝鬘等及此楞伽經我皆制斷肉先説見聞疑已斷一切肉四卷十卷楞伽經文大意是同但是其文有廣略耳故知楞伽與涅槃經同斷三乘不應食肉非謂楞伽但制菩薩不禁二乘故知今云存小教開則是誤矣以諸大乘並皆不許三乘食肉故也又下文云除化樂者若準梵網至化樂天説十禪定乃至四禪並皆説法故也又八術如止觀第八記大經云復有明醫曉八種術從遠方來章安云有十種醫謂圓初心中心後心三教菩薩兩教二乘斷結外道苦行外道空見外道八術一治身二治眼三治胎四治小兒五治瘡六治毒七治邪八知星內合佛知八正道能治八倒之病也又三達五眼名為八術又云常樂等四及非常非無常等四總成八術者恐誤也應云無常等四及常等四也中道雙非八倒皆破故云非常非無常等復能雙照二用宛然故云能常能無常也今明雙照故云八術也若指雙非即是八術之體耳又下文明二鳥雙遊引涅槃疏其間頗有訛略今粗點出餘如疏中不具引也今文云無量中一下應更添云非一非無量而一而無量也今文云問為凡與聖共等者誤也應云問為凡與凡共行聖與聖共行凡與聖共行也今文云二解不分者應云不明也今文云事理相即者應云即事而理即理而事也今文云凡共聖等如前三句者應云凡凡共行凡聖共行非凡非聖共行約人約法分別俱成也是則與前三句不無小異也又引淨名云無慧方便縛名愛見悲等者準彼經中無方便慧縛即愛見之心成就衆生耳無慧方便縛即住三毒而植德本耳有方便慧解有慧方便解翻此可知妙玄引涅槃初成道等釋籤中云且借祕密余嘗讀涅槃疏與此大異疏云舊解坐道場亦曾問者或言是華嚴中譯經不盡其文未至或言是偏方不定教文亦不來或言是祕密教非顯露攝義皆不然今明坐道場乃是元初圓滿始坐非方便道場正對過去之問非一化之始也上皆疏文若爾今云祕密不亦違耶不然凡消經文為正引用從傍應以疏文為正玄籤引類為傍其例實多亦無大過龍宮三本觀師云一略本即今所傳八十卷及舊譯六十卷是此是十萬偈中之略譯未盡故二下本經即摩訶衍藏是文殊共阿難於鐵圍山間結集此經收入龍宮龍樹菩薩往龍宮見此大不思議經有三本下本有十萬偈四十八品龍樹誦出流傳于世西域記説遮拘槃國此本全也三中本即彼所見有四十九萬八千八百偈一千二百品四上本有十三千大千世界微塵數偈一四天下微塵數品此上二本非人心力所持故不流傳五普眼經即海雲所持以大海量墨須彌筆書此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分此經前後三譯第一第三具如今文第二大唐永隆元年中天竺三藏地婆訶羅此云日照於西京太原寺譯出入法界品內兩處脫文一從摩耶夫人後至彌勒菩薩前中間天主光等十善知識二從彌勒菩薩後至三千大千世界微塵數善知識前中間文殊申手過一百一十由旬案善財頂十五行經依六十卷為定又罽賓三藏般若譯成四十卷于闐亦云瞿薩旦那此云地乳其王是毗沙門王像欲剖出不飲人乳神像之地前忽然隆起其狀如乳乃用飲之地乳所育因為國號俗云渙那國胸奴云干遁國諸朝云豁旦國印度云屈丹國摩竭提此云善勝又云無惱害阿蘭若亦云阿練若又云阿練兒此云無諍熙連河相傳云跋提是也今言不爾跋提大凞連小或廣四丈或八丈在城北跋提在城南相去百里跋提此云金沙熙連未見翻準音義中云尼連禪河即凞連是此云不樂著河又下文云諳臆者臆字應作憶字又云對並破會等者請尋玄文第一卷言斷奠者上丁貫切決也下丁定切不老也若音為殿乃訓定也又下文云長壽品去十四品明涅槃義等者誤也涅槃疏云初從如是訖流血灑地是召請涅槃衆二從純陀品訖大衆問品是開演涅槃施三從現病品訖德王品是示現涅槃行四從師子吼品訖品是問答涅槃義五從迦葉品訖經是折攝涅槃用召請是序分餘四是正宗分也舍利弗滅度緣出增一第九此因目連入城乞食為諸梵志打損身肉目連來告舍利弗云欲取滅度舍利弗言汝今小停我先入滅已上撮彼經意耳又上文云故令者令應作今也又云方第者第應作等也又云下卷者即第二卷也聞文殊得記者聞應作問也此文似煩應除下一問字也野馬者塵埃也邑外曰郊郊外曰牧牧外曰野野中塵埃奔走如馬故也文出莊子又妙玄別教五味中聲聞下欠如乳兩字次各釋文自為四如止觀第三記即偏圓中引涅槃經明四教五味之文廣在彼云妙玄云誕公僧傳中有江西釋智誕亦善經論其人是乎前文云長阿含行品者應云遊行品尸舍婆村村或作林四大教者應云從佛聞者是第一也從和合衆聞是第二也從多比丘聞是第三也從一比丘聞是第四也又云淨名室內者應云室外也又云滿於傍正者應云判於傍正也
